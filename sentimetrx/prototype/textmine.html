// ─────────────────────────────────────────────────────────────────────────────
// FILTERS TAB
// ─────────────────────────────────────────────────────────────────────────────
function FiltersTab({schema,parsedData,filters,setFilters,columnAliases,derivedFields,setDerivedFields,onClose,onDirtyChange,applyRef}){
  const [pendingFilters,setPendingFilters]=React.useState(()=>Object.fromEntries(Object.entries(filters).map(([k,v])=>{
    if(v.type==="cat")return[k,{type:"cat",values:[...v.values],excludeBlanks:v.excludeBlanks||false}];
    if(v.type==="daterange")return[k,{type:"daterange",values:[...v.values],includeBlanks:v.includeBlanks!==false}];
    return[k,{type:"range",values:[...v.values],includeBlanks:v.includeBlanks!==false}];
  })));
  const [dirty,setDirty]=React.useState(false);
  const [numericRanges,setNumericRanges]=React.useState({});
  React.useEffect(()=>{if(onDirtyChange)onDirtyChange(dirty);},[dirty,onDirtyChange]);

  // Sync pendingFilters when external filters change (e.g. chip removal)
  React.useEffect(()=>{
    setPendingFilters(Object.fromEntries(Object.entries(filters).map(([k,v])=>{
      if(v.type==="cat")return[k,{type:"cat",values:[...v.values],excludeBlanks:v.excludeBlanks||false}];
      if(v.type==="daterange")return[k,{type:"daterange",values:[...v.values],includeBlanks:v.includeBlanks!==false}];
      return[k,{type:"range",values:[...v.values],includeBlanks:v.includeBlanks!==false}];
    })));
    setDirty(false);
  },[filters]);

  // Build augmented schema including derived fields
  const augSchema=React.useMemo(()=>{
    const derived=derivedFields.map(d=>({
      field:d.derivedField,
      type:"categorical",
      values:d.type==="age"?AGE_GROUP_ORDER:GEN_ORDER,
      isDerived:true,sourceField:d.sourceField
    }));
    // Only show fields that are not open-ended, id, or ignored — respects user schema overrides
    return[...schema,...derived].filter(f=>f.type!=="open-ended"&&f.type!=="id"&&f.type!=="ignore");
  },[schema,derivedFields]);

  // Build numeric data ranges
  React.useEffect(()=>{
    const ranges={};
    augSchema.filter(f=>f.type==="numeric").forEach(f=>{
      const vals=parsedData.map(r=>parseFloat(r[f.field])).filter(v=>!isNaN(v));
      if(vals.length)ranges[f.field]=[Math.min(...vals),Math.max(...vals)];
    });
    setNumericRanges(ranges);
  },[augSchema,parsedData]);

  const fieldLabel=(f)=>(columnAliases&&columnAliases[f])||f;
  const activeCount=Object.keys(filters).length;

  const updatePending=(field,update)=>{
    const next={...pendingFilters,[field]:update};
    setPendingFilters(next);
    setDirty(true);
  };

  const removePending=(field)=>{
    const next={...pendingFilters};
    delete next[field];
    setPendingFilters(next);
    setDirty(true);
  };

  const applyNow=React.useCallback(()=>{
    const real=Object.fromEntries(Object.entries(pendingFilters).map(([k,v])=>{
      if(v.type==="cat")return[k,{type:"cat",values:new Set(v.values),excludeBlanks:v.excludeBlanks||false}];
      if(v.type==="daterange")return[k,{type:"daterange",values:v.values,includeBlanks:v.includeBlanks!==false}];
      return[k,{type:"range",values:v.values,includeBlanks:v.includeBlanks!==false}];
    }));
    setFilters(real);
    setDirty(false);
    if(onClose)onClose();
  },[pendingFilters,onClose]);
  React.useEffect(()=>{if(applyRef)applyRef.current=applyNow;},[applyNow,applyRef]);

  const clearAll=()=>{setPendingFilters({});setFilters({});setDirty(false);};

  // Detect potential age/yob fields not yet derived
  const numericFields=schema.filter(f=>f.type==="numeric");
  const potentialDerived=numericFields.filter(f=>{
    const kind=detectAgeField(f.field,schema);
    return kind&&!derivedFields.find(d=>d.sourceField===f.field);
  });

  const removeDerived=(sourceField)=>{
    setDerivedFields(prev=>prev.filter(d=>d.sourceField!==sourceField));
    // Also clear any filters on the derived field
    const d=derivedFields.find(x=>x.sourceField===sourceField);
    if(d){const next={...pendingFilters};delete next[d.derivedField];setPendingFilters(next);const r={...filters};delete r[d.derivedField];setFilters(r);}
  };

  return(<div style={{padding:24,overflowY:"auto",height:"100%"}}>


    {/* Applied filter chips */}
    {activeCount>0&&(<div style={{display:"flex",flexWrap:"wrap",gap:7,marginBottom:20,padding:"10px 14px",background:T.accentBg,borderRadius:10,border:"1px solid "+T.accentMid}}>
      <span style={{fontSize:11,fontWeight:700,color:T.accent,alignSelf:"center",marginRight:4}}>Active:</span>
      {Object.entries(filters).map(([field,f])=>{
        const lbl=fieldLabel(field);
        const desc=f.type==="cat"?[...f.values].slice(0,2).join(", ")+(f.values.size>2?" +"+( f.values.size-2):""):f.values[0]+"–"+f.values[1];
        return(<span key={field} style={{display:"flex",alignItems:"center",gap:5,fontSize:11,fontWeight:600,padding:"3px 10px",background:"white",borderRadius:12,border:"1px solid "+T.accentMid,color:T.text}}>
          {lbl}: {desc}
          <button onClick={()=>removePending(field)||setFilters(prev=>{const n={...prev};delete n[field];return n;})} style={{background:"none",border:"none",cursor:"pointer",color:T.textFaint,padding:0,fontSize:13,lineHeight:1,marginLeft:2}}>×</button>
        </span>);
      })}
    </div>)}

    {/* Derived fields note — derivation is configured in Schema tab */}
    {potentialDerived.length>0&&(<div style={{display:"flex",alignItems:"center",gap:8,padding:"10px 14px",marginBottom:16,background:T.blueBg,borderRadius:8,border:"1px solid "+T.blue+"30"}}>
      <span style={{fontSize:13}}>ℹ️</span>
      <span style={{fontSize:12,color:T.blue}}>Derived fields (Age Group, Generation) are configured in the <strong>Schema</strong> tab → Source Data.</span>
    </div>)}



    {!parsedData.length&&(<div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",paddingTop:60,gap:12,color:T.textFaint}}>
      <div style={{fontSize:40}}>⊞</div>
      <p style={{fontSize:14,margin:0}}>Load data first to configure filters.</p>
    </div>)}

    {/* Filter fields */}
    {augSchema.length>0&&(<div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(280px,1fr))",gap:14}}>
      {augSchema.map(f=>{
        const lbl=fieldLabel(f.field); // derived marker shown separately
        const pf=pendingFilters[f.field];
        const isActive=!!filters[f.field];

        // ── Shared blank count ────────────────────────────────────────────
        const blankCount=parsedData.filter(r=>{const v=r[f.field];return v==null||String(v).trim()==="";}).length;

        if(f.type==="categorical"||f.isDerived){
          const allVals=f.isDerived?(f.type==="categorical"?f.values:[]):(f.values||[]);
          // selectedVals: null means "all selected" (no filter), Set means explicit selection
          const selectedVals=pf&&pf.type==="cat"?new Set(pf.values):null;
          const allSelected=!selectedVals||selectedVals.size===allVals.length;
          const noneSelected=selectedVals&&selectedVals.size===0;
          const excludeBlanks=pf&&pf.excludeBlanks===true;

          const toggle=(v)=>{
            const cur=selectedVals?new Set(selectedVals):new Set(allVals);
            if(cur.has(v))cur.delete(v);else cur.add(v);
            if(cur.size===allVals.length&&!excludeBlanks){removePending(f.field);}
            else{updatePending(f.field,{type:"cat",values:[...cur],excludeBlanks});}
          };
          const selectAll=()=>{
            if(excludeBlanks){updatePending(f.field,{type:"cat",values:[...allVals],excludeBlanks:true});}
            else{removePending(f.field);}
          };
          const excludeAll=()=>updatePending(f.field,{type:"cat",values:[],excludeBlanks});
          const toggleBlanks=()=>{
            const newExclude=!excludeBlanks;
            if(!selectedVals&&!newExclude){removePending(f.field);}
            else{updatePending(f.field,{type:"cat",values:selectedVals?[...selectedVals]:[...allVals],excludeBlanks:newExclude});}
          };

          const pillBtn=(label,onClick,disabled,active)=>(
            <button onClick={disabled?undefined:onClick} style={{
              fontSize:10,fontWeight:600,padding:"2px 9px",borderRadius:12,cursor:disabled?"default":"pointer",
              background:active?T.accentBg:disabled?T.bg:"transparent",
              border:"1px solid "+(active?T.accent:disabled?T.border:T.borderMid),
              color:active?T.accent:disabled?T.textFaint:T.textMid,
              opacity:disabled?0.5:1,transition:"all .1s"
            }}>{label}</button>
          );

          return(<Card key={f.field} style={{padding:"14px 16px",border:isActive?"2px solid "+T.accent:"1px solid "+T.border}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10,gap:6}}>
              <div style={{flex:1,display:"flex",alignItems:"center",gap:5,minWidth:0,overflow:"hidden"}}>
                <SectionLabel style={{margin:0,fontSize:11,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{lbl}</SectionLabel>
                {f.isDerived&&<span title={"Derived from: "+f.sourceField+" ("+f.type+")"} style={{flexShrink:0,fontSize:9,fontWeight:700,padding:"1px 5px",borderRadius:5,background:T.blueBg,color:T.blue,border:"1px solid "+T.blue+"30",cursor:"default",letterSpacing:".03em"}}>⟳ derived</span>}
              </div>
              <div style={{display:"flex",gap:5,flexShrink:0}}>
                {pillBtn("Select All",selectAll,allSelected&&!excludeBlanks,false)}
                {pillBtn("Exclude All",excludeAll,noneSelected,noneSelected)}
              </div>
            </div>
            <div style={{display:"flex",flexWrap:"wrap",gap:6,maxHeight:140,overflowY:"auto"}}>
              {allVals.map(v=>{
                const sel=allSelected||(!!(selectedVals&&selectedVals.has(v)));
                return(<button key={v} onClick={()=>toggle(v)} style={{fontSize:11,padding:"3px 10px",borderRadius:20,background:sel?T.accentBg:"transparent",border:"1px solid "+(sel?T.accent:T.border),color:sel?T.accent:T.textMid,cursor:"pointer",fontWeight:sel?600:400,transition:"all .1s"}}>{v}</button>);
              })}
            </div>
            {blankCount>0&&(<div style={{marginTop:8,paddingTop:8,borderTop:"1px solid "+T.border}}>
              <label style={{display:"flex",alignItems:"center",gap:7,cursor:"pointer",fontSize:11,color:excludeBlanks?T.red:T.textMid}}>
                <input type="checkbox" checked={!excludeBlanks} onChange={toggleBlanks}
                  style={{width:12,height:12,accentColor:T.accent,cursor:"pointer"}}/>
                Include blanks <span style={{color:T.textFaint}}>({blankCount})</span>
              </label>
            </div>)}
          </Card>);
        }

        if(f.type==="numeric"&&numericRanges[f.field]){
          const [absMin,absMax]=numericRanges[f.field];
          const curMin=pf&&pf.type==="range"?pf.values[0]:absMin;
          const curMax=pf&&pf.type==="range"?pf.values[1]:absMax;
          const inclBlanks=pf?pf.includeBlanks!==false:true;
          const setRange=(min,max,ib)=>{
            const incl=ib!==undefined?ib:inclBlanks;
            if(min===absMin&&max===absMax&&incl){removePending(f.field);}
            else{updatePending(f.field,{type:"range",values:[min,max],includeBlanks:incl});}
          };
          const pctLeft=((curMin-absMin)/(absMax-absMin||1)*100);
          const pctRight=(100-(curMax-absMin)/(absMax-absMin||1)*100);
          return(<Card key={f.field} style={{padding:"14px 16px",border:isActive?"2px solid "+T.accent:"1px solid "+T.border}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
              <SectionLabel style={{margin:0}}>{lbl}</SectionLabel>
              {isActive&&<span style={{fontSize:10,color:T.accent,fontWeight:700}}>{curMin} – {curMax}</span>}
            </div>
            <div style={{display:"flex",justifyContent:"space-between",fontSize:11,color:T.textMid,marginBottom:4}}>
              <span>{absMin}</span><span>{absMax}</span>
            </div>
            <div style={{position:"relative",height:20,marginBottom:8}}>
              <div style={{position:"absolute",top:"50%",left:0,right:0,height:4,background:T.border,borderRadius:2,transform:"translateY(-50%)"}}/>
              <div style={{position:"absolute",top:"50%",left:pctLeft+"%",right:pctRight+"%",height:4,background:T.accent,borderRadius:2,transform:"translateY(-50%)"}}/>
              <input type="range" min={absMin} max={absMax} step={(absMax-absMin)/100||1} value={curMin}
                onChange={e=>setRange(Math.min(Number(e.target.value),curMax),curMax)}
                style={{position:"absolute",width:"100%",top:0,height:"100%",opacity:0,cursor:"pointer",zIndex:2}}/>
              <input type="range" min={absMin} max={absMax} step={(absMax-absMin)/100||1} value={curMax}
                onChange={e=>setRange(curMin,Math.max(Number(e.target.value),curMin))}
                style={{position:"absolute",width:"100%",top:0,height:"100%",opacity:0,cursor:"pointer",zIndex:2}}/>
            </div>
            {blankCount>0&&(<label style={{display:"flex",alignItems:"center",gap:7,cursor:"pointer",fontSize:11,color:inclBlanks?T.textMid:T.red}}>
              <input type="checkbox" checked={inclBlanks} onChange={e=>setRange(curMin,curMax,e.target.checked)}
                style={{width:12,height:12,accentColor:T.accent,cursor:"pointer"}}/>
              Include blanks <span style={{color:T.textFaint}}>({blankCount})</span>
            </label>)}
          </Card>);
        }

        if(f.type==="date"){
          const allVals=f.values||[];
          // Convert all date values to timestamps for slider
          const dateTimes=allVals.map(v=>parseDate(v)).filter(Boolean).map(d=>d.getTime());
          const absMinTs=dateTimes.length?Math.min(...dateTimes):0;
          const absMaxTs=dateTimes.length?Math.max(...dateTimes):0;
          const curMinTs=pf&&pf.type==="daterange"?pf.values[0]:absMinTs;
          const curMaxTs=pf&&pf.type==="daterange"?pf.values[1]:absMaxTs;
          const inclBlanks=pf?pf.includeBlanks!==false:true;
          const fmtDate=(ts)=>{if(!ts)return"";const d=new Date(ts);return(d.getMonth()+1)+"/"+(d.getDate())+"/"+d.getFullYear();};
          const setDateRange=(minTs,maxTs,ib)=>{
            const incl=ib!==undefined?ib:inclBlanks;
            if(minTs===absMinTs&&maxTs===absMaxTs&&incl){removePending(f.field);}
            else{updatePending(f.field,{type:"daterange",values:[minTs,maxTs],includeBlanks:incl});}
          };
          const pctLeft=absMaxTs>absMinTs?((curMinTs-absMinTs)/(absMaxTs-absMinTs)*100):0;
          const pctRight=absMaxTs>absMinTs?(100-(curMaxTs-absMinTs)/(absMaxTs-absMinTs)*100):0;
          const msPerDay=86400000;
          const stepMs=Math.max(msPerDay,Math.round((absMaxTs-absMinTs)/200));
          return(<Card key={f.field} style={{padding:"14px 16px",border:isActive?"2px solid "+T.accent:"1px solid "+T.border}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
              <SectionLabel style={{margin:0}}>{lbl} <span style={{fontWeight:400,color:T.textFaint}}>({allVals.length} dates)</span></SectionLabel>
              {isActive&&<span style={{fontSize:10,color:T.accent,fontWeight:700}}>{fmtDate(curMinTs)} – {fmtDate(curMaxTs)}</span>}
            </div>
            <div style={{display:"flex",justifyContent:"space-between",fontSize:10,color:T.textFaint,marginBottom:4}}>
              <span>{fmtDate(absMinTs)}</span><span>{fmtDate(absMaxTs)}</span>
            </div>
            <div style={{position:"relative",height:20,marginBottom:8}}>
              <div style={{position:"absolute",top:"50%",left:0,right:0,height:4,background:T.border,borderRadius:2,transform:"translateY(-50%)"}}/>
              <div style={{position:"absolute",top:"50%",left:pctLeft+"%",right:pctRight+"%",height:4,background:T.accent,borderRadius:2,transform:"translateY(-50%)"}}/>
              <input type="range" min={absMinTs} max={absMaxTs} step={stepMs} value={curMinTs}
                onChange={e=>setDateRange(Math.min(Number(e.target.value),curMaxTs),curMaxTs)}
                style={{position:"absolute",width:"100%",top:0,height:"100%",opacity:0,cursor:"pointer",zIndex:2}}/>
              <input type="range" min={absMinTs} max={absMaxTs} step={stepMs} value={curMaxTs}
                onChange={e=>setDateRange(curMinTs,Math.max(Number(e.target.value),curMinTs))}
                style={{position:"absolute",width:"100%",top:0,height:"100%",opacity:0,cursor:"pointer",zIndex:3}}/>
            </div>
            <div style={{display:"flex",justifyContent:"space-between",fontSize:11,color:T.textMid,marginBottom:6}}>
              <span style={{color:T.accent,fontWeight:isActive?700:400}}>{fmtDate(curMinTs)}</span>
              <span style={{color:T.textMid}}>→</span>
              <span style={{color:T.accent,fontWeight:isActive?700:400}}>{fmtDate(curMaxTs)}</span>
            </div>
            {blankCount>0&&(<label style={{display:"flex",alignItems:"center",gap:7,cursor:"pointer",fontSize:11,color:inclBlanks?T.textMid:T.red}}>
              <input type="checkbox" checked={inclBlanks} onChange={e=>setDateRange(curMinTs,curMaxTs,e.target.checked)}
                style={{width:12,height:12,accentColor:T.accent,cursor:"pointer"}}/>
              Include blanks <span style={{color:T.textFaint}}>({blankCount})</span>
            </label>)}
          </Card>);
        }

        return null;
      })}
    </div>)}

    {dirty&&(<div style={{position:"sticky",bottom:0,paddingTop:16,paddingBottom:4}}>
      <button onClick={applyNow} style={{width:"100%",padding:"11px",fontSize:13,fontWeight:700,background:T.accent,color:"white",border:"none",borderRadius:10,cursor:"pointer",boxShadow:"0 4px 12px rgba(232,98,42,.35)"}}>Apply Filters</button>
    </div>)}
  </div>);
}

// ─────────────────────────────────────────────────────────────────────────────
// COMPARE TAB
// ─────────────────────────────────────────────────────────────────────────────
function CompareTab({themes,parsedData,schema,breakdownField,setBreakdownField,aiActive,aiMode,onOpenKey,columnAliases,onDrillTheme}){
  const [comparing,setComparing]=useState(false);
  const [aiInsights,setAiInsights]=useState(null); // {overallInsight, comparisons:[{themeName,insight}]}
  const [error,setError]=useState(null);
  const [viewMode,setViewMode]=useState("group"); // "group" | "theme"
  const catFields=schema.filter(f=>f.type==="categorical"||f.type==="date").map(f=>f.field);
  const fieldLabel=(f)=>(columnAliases&&columnAliases[f])||f;

  // ── Client-side stats ────────────────────────────────────────────────────
  const compStats=useMemo(()=>{
    if(!themes||!themes.themes||!breakdownField||!parsedData.length)return null;
    const openField=themes.fieldName;
    const totalRows=parsedData.length;
    // Build group → rows map
    const groupMap={};
    parsedData.forEach(r=>{
      const key=String(r[breakdownField]??"(blank)");
      if(!groupMap[key])groupMap[key]=[];
      groupMap[key].push(r);
    });
    const groupKeys=Object.keys(groupMap).sort();
    // For each group compute: total rows, per-theme match count, unclassified count
    const groupStats=groupKeys.map(gk=>{
      const rows=groupMap[gk];
      const groupTotal=rows.length;
      const groupPct=Math.round(groupTotal/totalRows*100);
      const themeCounts=themes.themes.map(t=>{
        const matches=rows.filter(r=>commentMatchesTheme(String(r[openField]||""),t));
        return{themeId:t.id,themeName:t.name,count:matches.length};
      });
      const classifiedCount=rows.filter(r=>themes.themes.some(t=>commentMatchesTheme(String(r[openField]||""),t))).length;
      const unclassified=rows.filter(r=>String(r[openField]||"").trim().length>0&&!themes.themes.some(t=>commentMatchesTheme(String(r[openField]||""),t))).length;
      return{group:gk,groupTotal,groupPct,themeCounts,unclassified,classifiedCount};
    });
    // For each theme compute total matches across all groups (for share %)
    const themeStats=themes.themes.map(t=>{
      const totalMatches=groupStats.reduce((s,g)=>{
        const tc=g.themeCounts.find(tc=>tc.themeId===t.id);
        return s+(tc?tc.count:0);
      },0);
      const perGroup=groupStats.map(g=>{
        const tc=g.themeCounts.find(tc=>tc.themeId===t.id);
        const count=tc?tc.count:0;
        const mentionRate=g.groupTotal>0?Math.round(count/g.groupTotal*100):0;
        return{group:g.group,count,share:mentionRate,groupTotal:g.groupTotal,groupPct:g.groupPct};
      });
      return{themeId:t.id,themeName:t.name,totalMatches,perGroup};
    });
    return{groupStats,themeStats,groupKeys,totalRows};
  },[themes,breakdownField,parsedData]);

  const runAiInsights=useCallback(async()=>{
    if(!themes||!breakdownField)return;
    setComparing(true);setError(null);
    try{
      const openField=themes.fieldName;const groups={};
      parsedData.forEach(r=>{const key=String(r[breakdownField]??"(blank)");if(!groups[key])groups[key]=[];groups[key].push(r);});
      const groupSummaries=Object.entries(groups).map(([k,rows])=>({group:k,texts:rows.map(r=>String(r[openField]||"").slice(0,200)).filter(Boolean).slice(0,6)}));
      const sysPrompt="You are a qualitative research expert. Return ONLY raw JSON, no markdown, starting with { and ending with }.";
      const userMsg="Compare how these themes appear across groups.\n\nThemes: "+JSON.stringify(themes.themes.map(t=>t.name))+"\n\nGroups (field: "+breakdownField+"):\n"+JSON.stringify(groupSummaries)+"\n\nReturn: {\"comparisons\":[{\"themeName\":\"x\",\"insight\":\"sentence\"}],\"overallInsight\":\"paragraph\"}";
      const raw=await callClaude(userMsg,sysPrompt);const parsed=parseJSON(raw);
      if(!parsed)throw new Error("Parse failed: "+raw.slice(0,300));
      setAiInsights(parsed);
    }catch(e){setError(e.message);}
    setComparing(false);
  },[themes,parsedData,breakdownField]);

  // ── Render helpers ───────────────────────────────────────────────────────

  if(!themes)return<div style={{display:"flex",alignItems:"center",justifyContent:"center",height:"100%",flexDirection:"column",gap:14,padding:40}}><div style={{fontSize:48,color:T.border}}>⇄</div><p style={{fontSize:14,color:T.textMute,textAlign:"center",margin:0,lineHeight:1.7,maxWidth:320}}>Mine themes first, then compare how they vary across groups.</p></div>;

  return(<div style={{padding:24,overflowY:"auto",height:"100%"}}>
    <div style={{marginBottom:22}}>
      <div style={{display:"flex",alignItems:"baseline",gap:14,flexWrap:"wrap"}}>
        <h2 style={{fontSize:20,fontWeight:800,color:T.text,margin:"0 0 6px"}}>Group Comparison</h2>
        <span style={{fontSize:11,color:T.textMute}}>
          <span style={{color:T.green,fontWeight:800}}>★</span> over-indexed 
          <span style={{color:T.red,fontWeight:800}}>★</span> under-indexed 
          <span style={{color:T.textFaint,fontSize:10}}>(p &lt; 0.05, min n=30)</span>
        </span>
      </div>
      <p style={{fontSize:13,color:T.textMid,margin:0}}>Compare how each theme manifests across segments.</p>
    </div>

    {/* Controls */}
    <Card style={{padding:"18px 20px",marginBottom:18}}>
      <div style={{display:"flex",alignItems:"flex-end",gap:16,flexWrap:"wrap"}}>
        <div style={{flex:1,minWidth:200}}>
          <SectionLabel>Compare themes by</SectionLabel>
          <div style={{display:"flex",flexWrap:"wrap",gap:7}}>{catFields.map(f=>{
  const sch=schema.find(s=>s.field===f);
  const isDerived=sch&&sch.isDerived;
  const lbl=fieldLabel(f);
  const tip=isDerived?"Derived from: "+sch.sourceField:"";
  return<button key={f} onClick={()=>{setBreakdownField(f);setAiInsights(null);}} title={tip}
    style={{padding:"6px 14px",fontSize:12,fontWeight:breakdownField===f?700:500,
      background:breakdownField===f?T.accentBg:"transparent",
      border:"1px solid "+(breakdownField===f?T.accent:T.border),
      color:breakdownField===f?T.accent:T.textMid,
      borderRadius:7,cursor:"pointer",display:"inline-flex",alignItems:"center",gap:5}}>
    {lbl}
    {isDerived&&<span style={{fontSize:9,fontWeight:700,padding:"1px 4px",borderRadius:4,background:isDerived&&breakdownField===f?T.accent+"20":T.blueBg,color:breakdownField===f?T.accent:T.blue,border:"1px solid "+(breakdownField===f?T.accent+"40":T.blue+"30"),lineHeight:1.2}}>⟳</span>}
  </button>;})}</div>
        </div>
        <div style={{display:"flex",gap:8,alignItems:"center",flexShrink:0}}>
          {/* View toggle */}
          <div style={{display:"flex",background:T.bg,borderRadius:20,padding:2,border:"1px solid "+T.border}}>
            {[["group","By Group"],["theme","By Theme"]].map(([m,lbl])=>(
              <button key={m} onClick={()=>setViewMode(m)} style={{fontSize:11,fontWeight:viewMode===m?700:500,padding:"4px 12px",borderRadius:18,background:viewMode===m?T.accent:"transparent",color:viewMode===m?"white":T.textMute,border:"none",cursor:"pointer",transition:"background .15s"}}>{lbl}</button>
            ))}
          </div>
          <button onClick={runAiInsights} disabled={comparing||!breakdownField||!aiActive} style={{padding:"8px 16px",fontSize:12,fontWeight:700,background:aiActive&&breakdownField?T.accent:T.border,color:"white",border:"none",borderRadius:8,cursor:aiActive&&breakdownField?"pointer":"not-allowed",opacity:aiActive?1:.55,display:"flex",alignItems:"center",gap:6}}>
            {comparing?<><Spinner color="white"/>Analysing…</>:"✦ AI Insights"}
          </button>
        </div>
      </div>
      {!aiActive&&<div style={{marginTop:8,fontSize:11,color:T.textFaint}}>Turn AI on in the top bar to generate insights.</div>}
    </Card>

    {error&&<div style={{marginBottom:16}}>{aiErrorMessage(error,onOpenKey,runAiInsights)}</div>}

    {/* AI Overall Insight */}
    {aiInsights&&aiInsights.overallInsight&&<Card style={{padding:"16px 18px",marginBottom:18,borderLeft:"4px solid "+T.accent}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:8}}>
        <SectionLabel style={{margin:0}}>Overall Insight</SectionLabel>
        <span style={{fontSize:10,fontWeight:700,padding:"2px 8px",borderRadius:10,background:T.accentBg,color:T.accent,border:"1px solid "+T.accentMid}}>✦ AI Generated</span>
      </div>
      <p style={{fontSize:13,color:T.textMid,margin:0,lineHeight:1.7}}>{aiInsights.overallInsight}</p>
    </Card>}

    {/* Stats cards */}
    {compStats&&breakdownField&&(()=>{
      const {groupStats,themeStats,groupKeys}=compStats;

      if(viewMode==="group"){
        // One card per group value — bars show themes
        return(<div>{groupStats.map(g=>{
          const aiThemeInsight=aiInsights?.comparisons;
          // Max share across themes for this group (for bar scaling)
          // maxShare = max mention rate (labelPct) in this group — bar scale aligns with sig test
          const maxShare=g.themeCounts.reduce((m,tc)=>Math.max(m,g.groupTotal>0?Math.round(tc.count/g.groupTotal*100):0),1);
          return(<Card key={g.group} style={{padding:"16px 18px",marginBottom:12}}>
            <div style={{fontSize:14,fontWeight:700,color:T.text,marginBottom:14}}>
              {fieldLabel(breakdownField)}: <span style={{color:T.accent}}>{g.group}</span>
              <span style={{fontSize:12,fontWeight:400,color:T.textMute,marginLeft:6}}>({g.groupPct}% of dataset · {g.groupTotal.toLocaleString()} responses)</span>
            </div>
            {(themes.themes||[]).map((t,ti)=>{
              const tc=g.themeCounts.find(tc=>tc.themeId===t.id);
              const count=tc?tc.count:0;
              const ts=themeStats.find(ts=>ts.themeId===t.id);
              const themePctInGroup=g.groupTotal>0?Math.round(count/g.groupTotal*100):0;
              const share=themePctInGroup; // same unit as maxShare for correct bar scaling
              const pal=THEME_PALETTE[ti%THEME_PALETTE.length];
              // sig: k=count in group, n=groupTotal, K=totalMatches, N=totalRows
              // tests: is this group's mention rate (themePctInGroup) different from other groups?
              const sig=sigTest(count,g.groupTotal,ts?ts.totalMatches:0,compStats.totalRows);
              return<CompareBar key={t.id} label={t.name} themeName={t.name} groupLabel={g.group} labelPct={themePctInGroup} count={count} share={share} maxShare={maxShare} color={pal.border} sig={sig} onBarClick={onDrillTheme?()=>onDrillTheme(t,g.group):null}/>;
            })}
            {g.unclassified>0&&<CompareBar label="Unclassified Comments" labelPct={g.groupTotal>0?Math.round(g.unclassified/g.groupTotal*100):0} count={g.unclassified} share={null} maxShare={maxShare} color={UNCLASSIFIED_COLOR} isUnclassified/>}
          </Card>);
        })}</div>);
      }

      // View by theme — one card per theme, bars show groups
      return(<div>{themeStats.map((ts,ti)=>{
        const pal=THEME_PALETTE[ti%THEME_PALETTE.length];
        // labelPct for By Theme = count/groupTotal (mention rate) — consistent with sig test
        const perGroupWithRate=ts.perGroup.map(g=>({...g,mentionRate:g.groupTotal>0?Math.round(g.count/g.groupTotal*100):0}));
        const maxShare=perGroupWithRate.reduce((m,g)=>Math.max(m,g.mentionRate),1);
        const aiInsight=aiInsights?.comparisons?.find(c=>c.themeName===ts.themeName)?.insight;
        return(<Card key={ts.themeId} style={{padding:"16px 18px",marginBottom:12,borderLeft:"4px solid "+pal.border}}>
          <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:14}}>
            <span style={{fontSize:14,fontWeight:700,color:T.text,flex:1}}>{ts.themeName}</span>
            <span style={{fontSize:11,color:T.textMute}}>{ts.totalMatches.toLocaleString()} total matches</span>
          </div>
          {[...perGroupWithRate].sort((a,b)=>b.mentionRate-a.mentionRate).map(g=>{
            // sig: k=count, n=groupTotal, K=totalMatches, N=totalRows
            const sig=sigTest(g.count,g.groupTotal,ts.totalMatches,compStats.totalRows);
            const themeObj=themes&&themes.themes?themes.themes.find(t=>t.id===ts.themeId):null;
            return<CompareBar key={g.group} label={g.group} themeName={ts.themeName} groupLabel={g.group} labelPct={g.mentionRate} count={g.count} share={g.share} maxShare={maxShare} color={pal.border} sig={sig} onBarClick={onDrillTheme&&themeObj?()=>onDrillTheme(themeObj,g.group):null}/>;
          })}
          {aiInsight&&<p style={{fontSize:12,color:T.textMid,lineHeight:1.6,borderTop:"1px solid "+T.border,paddingTop:10,margin:"10px 0 0",fontStyle:"italic"}}>✦ {aiInsight}</p>}
        </Card>);
      })}</div>);
    })()}
  </div>);
}

// ─────────────────────────────────────────────────────────────────────────────
// UPLOAD MODAL
// ─────────────────────────────────────────────────────────────────────────────
function UploadModal({onLoad,onClose}){
  const [tab,setTab]=useState("file"); // "file" | "paste"
  const [pasteText,setPasteText]=useState("");
  const [dragOver,setDragOver]=useState(false);
  const [error,setError]=useState("");
  const [fileName,setFileName]=useState("");
  const fileRef=React.useRef();

  const processText=(text,name)=>{
    setError("");
    try{
      const t=text.trim();
      let rows;
      if(t.startsWith("[")||t.startsWith("{")){
        const d=JSON.parse(t);
        rows=Array.isArray(d)?d:[d];
      } else {
        const firstLine=t.split("\n")[0]||"";
        const isTSV=(name&&name.toLowerCase().endsWith(".tsv"))||(firstLine.includes("\t")&&!firstLine.includes(","));
        rows=parseCSV(t,isTSV?"\t":",");
      }
      if(!rows.length)throw new Error("No data rows found.");
      onLoad(rows);
      onClose();
    }catch(e){setError("Could not parse file: "+e.message);}
  };

  const handleFile=(file)=>{
    if(!file)return;
    setFileName(file.name);
    setError("");
    const reader=new FileReader();
    reader.onload=(e)=>processText(e.target.result,file.name);
    reader.onerror=()=>setError("Could not read file.");
    reader.readAsText(file);
  };

  const handleDrop=(e)=>{
    e.preventDefault();setDragOver(false);
    const file=e.dataTransfer.files[0];
    if(file)handleFile(file);
  };

  const tabBtn=(id,label)=>(
    <button onClick={()=>{setTab(id);setError("");}} style={{
      flex:1,padding:"8px 0",fontSize:13,fontWeight:tab===id?700:500,
      background:tab===id?T.bgCard:"transparent",
      border:"none",borderBottom:"2px solid "+(tab===id?T.accent:"transparent"),
      color:tab===id?T.accent:T.textMute,cursor:"pointer",transition:"all .15s"
    }}>{label}</button>
  );

  return(<div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.55)",zIndex:2000,display:"flex",alignItems:"center",justifyContent:"center"}} onClick={onClose}>
    <div style={{background:T.bgCard,borderRadius:16,width:520,display:"flex",flexDirection:"column",boxShadow:"0 24px 64px rgba(0,0,0,.28)",overflow:"hidden"}} onClick={e=>e.stopPropagation()}>

      {/* Header */}
      <div style={{padding:"20px 24px 0",borderBottom:"1px solid "+T.border}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:14}}>
          <div>
            <h2 style={{fontSize:18,fontWeight:800,color:T.text,margin:"0 0 3px"}}>Load Data</h2>
            <p style={{fontSize:12,color:T.textMute,margin:0}}>Upload a CSV, TSV or JSON file, or paste your data directly.</p>
          </div>
          <button onClick={onClose} style={{background:"transparent",border:"none",fontSize:20,color:T.textMute,cursor:"pointer",padding:"0 4px",lineHeight:1}}>✕</button>
        </div>
        <div style={{display:"flex",background:T.bg,borderRadius:"8px 8px 0 0",padding:"2px 2px 0"}}>
          {tabBtn("file","📂  Upload File")}
          {tabBtn("paste","⌨  Paste Data")}
        </div>
      </div>

      {/* Body */}
      <div style={{padding:"22px 24px 20px"}}>
        {/* Fixed-height panel container — prevents any jump when switching tabs */}
        <div style={{position:"relative",height:230}}>
          <div style={{position:"absolute",inset:0,opacity:tab==="file"?1:0,pointerEvents:tab==="file"?"auto":"none",transition:"opacity .15s"}}>
            <div
              onDragOver={e=>{e.preventDefault();setDragOver(true);}}
              onDragLeave={()=>setDragOver(false)}
              onDrop={handleDrop}
              onClick={()=>fileRef.current.click()}
              style={{
                border:"2px dashed "+(dragOver?T.accent:T.borderMid),
                borderRadius:12,padding:"36px 24px",textAlign:"center",
                background:dragOver?T.accentBg:T.bg,
                cursor:"pointer",transition:"border-color .15s, background .15s"
              }}>
              <div style={{fontSize:32,marginBottom:8}}>📄</div>
              <div style={{fontSize:14,fontWeight:700,color:dragOver?T.accent:T.text,marginBottom:4}}>
                {fileName?"✓  "+fileName:"Drop your file here"}
              </div>
              <div style={{fontSize:12,color:T.textMute}}>
                {fileName?"Click to choose a different file":"or click to browse — CSV, TSV or JSON"}
              </div>
            </div>
            <input ref={fileRef} type="file" accept=".csv,.tsv,.json,.txt" style={{display:"none"}}
              onChange={e=>handleFile(e.target.files[0])}/>
          </div>

          <div style={{position:"absolute",inset:0,opacity:tab==="paste"?1:0,pointerEvents:tab==="paste"?"auto":"none",transition:"opacity .15s",display:"flex",flexDirection:"column",gap:10}}>
            <textarea
              value={pasteText}
              onChange={e=>{setPasteText(e.target.value);setError("");}}
              placeholder={`Paste CSV, TSV or JSON here…\n\nCSV example:\nid,text,date,segment\n1,"Great product",2024-01,Enterprise\n\nJSON example:\n[{"id":1,"text":"Great product"}]`}
              style={{
                flex:1,width:"100%",padding:"10px 12px",fontSize:12,
                border:"1px solid "+T.border,borderRadius:8,
                background:T.bg,color:T.text,outline:"none",
                resize:"none",fontFamily:"monospace",lineHeight:1.6
              }}/>
            <button
              onClick={()=>processText(pasteText,"")}
              disabled={!pasteText.trim()}
              style={{
                width:"100%",padding:"9px 0",fontSize:13,fontWeight:700,
                background:pasteText.trim()?T.accent:T.border,
                color:"white",border:"none",borderRadius:8,
                cursor:pasteText.trim()?"pointer":"not-allowed",flexShrink:0
              }}>Parse & Load</button>
          </div>
        </div>

        {error&&<div style={{marginTop:12,fontSize:12,color:T.red,background:T.redBg,border:"1px solid "+T.red+"30",borderRadius:7,padding:"8px 12px"}}>⚠ {error}</div>}
        <p style={{fontSize:11,color:T.textFaint,marginTop:12,marginBottom:0,lineHeight:1.6}}>
          Supported formats: CSV, TSV (tab-separated), JSON array of objects. Data stays entirely in your browser.
        </p>
      </div>
    </div>
  </div>);
}

// ─────────────────────────────────────────────────────────────────────────────
// MAIN APP
// ─────────────────────────────────────────────────────────────────────────────
function App(){
  const [rawText,setRawText]=useState("");
  const [showUploadModal,setShowUploadModal]=useState(false);
  const [parsedData,setParsedData]=useState([]);
  const [schema,setSchema]=useState([]);

  const [aiEnabled,setAiEnabled]=useState(()=>getAiEnabled());
  const [aiMode,setAiMode_]=useState(()=>getAiMode());
  const [showApiKeyModal,setShowApiKeyModal]=useState(false);
  const aiActive=!!(apiKey&&aiEnabled);
  const [samplePct,setSamplePct]=useState(0);
  const [lastRunPct,setLastRunPct]=useState(null);
  const [showThemeEditor,setShowThemeEditor]=useState(false);

  const toggleScore=useCallback((field)=>setScoreFields(prev=>{const n=new Set(prev);if(n.has(field))n.delete(field);else n.add(field);return n;}),[]);
  const [columnAliases,setColumnAliases]=useState({});

  const openFields=schema.filter(f=>f.type==="open-ended").map(f=>f.field);

  const ignoredFields=schema.filter(f=>f.type==="ignore"||f.type==="id").map(f=>f.field);

  const [activeField,setActiveField]=useState(null);
  const [themes,setThemes]=useState(null);
  const [samplingInfo,setSamplingInfo]=useState(null);
  const [selectedTheme,setSelectedTheme]=useState(null);
  const [themeDetail,setThemeDetail]=useState(null);
  const [drillTheme,setDrillTheme]=useState(null);
  const [breakdownField,setBreakdownField]=useState(null);
  const [selectedValues,setSelectedValues]=useState(new Set());
  const [loading,setLoading]=useState(false);
  const [loadingDetail,setLoadingDetail]=useState(false);
  const [error,setError]=useState(null);
  const [themesView,setThemesView]=useState("distribution");
  const [filters,setFilters]=useState({});
  const [derivedFields,setDerivedFields]=useState([]);
  const [catValueMaps,setCatValueMaps]=useState({});

  // ── Two-level nav ────────────────────────────────────────────────────────
  // topTab: "data" | "textmine" | "charts" | "statistics"
  // subTab: per-section sub-tab id
  const [topTab,setTopTab]=useState("data");
  const [subTabs,setSubTabs]=useState({data:"data",textmine:"themes",charts:"charts",statistics:"descriptives"});
  const subTab=subTabs[topTab]||"data";
  const setSubTab=useCallback((id)=>setSubTabs(prev=>({...prev,[topTab]:id})),[topTab]);
  const navigateTo=useCallback((top,sub)=>{
    setTopTab(top);
    if(sub)setSubTabs(prev=>({...prev,[top]:sub}));
  },[]);

  // ── Persisted sub-panel state (survives tab switches) ───────────────────
  const [chartType,setChartType]=useState("bar");
  const [commentsBreadcrumb,setCommentsBreadcrumb]=useState([]);
  const [commentsOrigin,setCommentsOrigin]=useState("themes");
  // Descriptives
  const [descSel,setDescSel]=useState(null);
  // Correlations
  const [corrType,setCorrType]=useState("pearson");
  const [corrSelCell,setCorrSelCell]=useState(null);
  // Group Tests
  const [groupTestType,setGroupTestType]=useState("auto");
  const [groupNumF,setGroupNumF]=useState("");
  const [groupCatF,setGroupCatF]=useState("");
  const [groupCatF2,setGroupCatF2]=useState("");
  // Regression
  const [regrOutcome,setRegrOutcome]=useState(null);
  const [regrPredictors,setRegrPredictors]=useState(new Set());

  // ── Lazy filter: track which sub-panels have been visited since last filter change ──
  // Only panels in visitedSinceFilter get fresh filteredData; others recompute on next visit
  const [visitedSinceFilter,setVisitedSinceFilter]=useState(new Set());
  const [pendingFilterData,setPendingFilterData]=useState(null); // the filteredData at time of filter change
  const filtersRef=useRef(filters);
  useEffect(()=>{filtersRef.current=filters;},[filters]);

  const effectiveScoreFields=useMemo(()=>{
    const s=new Set(scoreFields);
    Object.entries(catValueMaps).forEach(([field,cfg])=>{
      if(cfg.useForScoring&&cfg.mode==="numeric")s.add("__mapped__"+field);
    });
    return s;
  },[scoreFields,catValueMaps]);

  const schemaRef=useRef(schema);const catFieldsRef=useRef(catFields);const activeFieldRef=useRef(activeField);
  const breakdownRef=useRef({field:breakdownField,values:selectedValues});const parsedDataRef=useRef(parsedData);const samplePctRef=useRef(samplePct);
  useEffect(()=>{schemaRef.current=schema;},[schema]);
  useEffect(()=>{catFieldsRef.current=catFields;},[catFields]);
  useEffect(()=>{activeFieldRef.current=activeField;},[activeField]);
  useEffect(()=>{breakdownRef.current={field:breakdownField,values:selectedValues};},[breakdownField,selectedValues]);
  useEffect(()=>{parsedDataRef.current=parsedData;},[parsedData]);
  useEffect(()=>{samplePctRef.current=samplePct;},[samplePct]);

  useEffect(()=>{
    if(!parsedData.length)return;
    const s=buildSchema(parsedData);
    setSchema(s);setThemes(null);setSamplingInfo(null);setSelectedTheme(null);setThemeDetail(null);
    setDrillTheme(null);setError(null);setSchemaEdited(false);
    const of=s.filter(f=>f.type==="open-ended").map(f=>f.field);
    setActiveField(of[0]||null);setBreakdownField(null);setSelectedValues(new Set());
    setFilters({});setDerivedFields([]);setCatValueMaps({});
    setTopTab("data");setSubTabs({data:"data",textmine:"themes",charts:"charts",statistics:"descriptives"});
    setVisitedSinceFilter(new Set());setPendingFilterData(null);
    setDescSel(null);setCorrSelCell(null);setGroupNumF("");setGroupCatF("");setGroupCatF2("");
    setRegrOutcome(null);setRegrPredictors(new Set());
  },[parsedData]);

  useEffect(()=>{const of=schema.filter(f=>f.type==="open-ended").map(f=>f.field);setActiveField(prev=>of.includes(prev)?prev:(of[0]||null));},[schema]);

  // When filters change, mark all tabs as needing refresh except the currently visible one
  const filterChangeRef=useRef(0);
  useEffect(()=>{
    filterChangeRef.current++;
    // The currently visible sub-tab stays live; all others are marked stale
    const currentKey=topTab+"."+subTab;
    setVisitedSinceFilter(new Set([currentKey]));
  },[filters]);

  // Mark a tab as visited (so it gets current filteredData)
  const markVisited=useCallback((top,sub)=>{
    const key=top+"."+sub;
    setVisitedSinceFilter(prev=>{if(prev.has(key))return prev;const n=new Set(prev);n.add(key);return n;});
  },[]);

  const handleTypeChange=useCallback((fieldName,newType)=>{const newSchema=schemaRef.current.map(f=>f.field===fieldName?recomputeForType(f,newType,parsedData):f);setSchema(newSchema);setSchemaEdited(true);if(newType!=="open-ended"){const remainingOpen=newSchema.filter(f=>f.type==="open-ended");if(remainingOpen.length===0){setThemes(null);setSamplingInfo(null);setSelectedTheme(null);setThemeDetail(null);setDrillTheme(null);}}},[parsedData]);
  const getBreakdownInstr=()=>{const bd=breakdownRef.current;if(!bd.field)return null;const vals=bd.values.size>0?[...bd.values]:null;if(!vals)return"For each unique value of '"+bd.field+"', count responses and rate sentiment 0-10.";return"For these values of '"+bd.field+"' ("+vals.join(", ")+"), count responses and rate sentiment 0-10.";};

  // Build filtered data
  const filteredData=useMemo(()=>{
    if(!parsedData.length)return parsedData;
    const withDerived=applyDerivedFields(parsedData,derivedFields);
    const withMapped=applyMappedFields(withDerived,catValueMaps);
    return applyFilters(withMapped,filters);
  },[parsedData,derivedFields,catValueMaps,filters]);

  const augmentedSchema=useMemo(()=>buildMappedSchema(schema,catValueMaps),[schema,catValueMaps]);
  const fullSchema=useMemo(()=>{
    const derivedEntries=derivedFields.map(d=>{
      const vals=d.type==="age"?AGE_GROUP_ORDER:GEN_ORDER;
      return{field:d.derivedField,type:"categorical",values:vals,isDerived:true,sourceField:d.sourceField,
        nonNullCount:parsedData.length,avgLen:8,avgWords:1,uniqueRatio:Math.round(vals.length/parsedData.length*100)||0};
    });
    return[...augmentedSchema,...derivedEntries];
  },[augmentedSchema,derivedFields,parsedData]);
  const effectiveCatFields=useMemo(()=>[
    ...catFields,
    ...derivedFields.map(d=>d.derivedField).filter(f=>!catFields.includes(f))
  ],[catFields,derivedFields]);

  // Lazy filteredData per tab: a tab only gets the latest filteredData after it's been visited post-filter-change
  // For tabs that haven't been visited since last filter change, we pass a stable snapshot
  const filteredDataSnapshotRef=useRef(filteredData);
  // Update snapshot whenever tab is visited or data/schema changes (not just filters)
  useEffect(()=>{filteredDataSnapshotRef.current=filteredData;},[parsedData,schema,derivedFields,catValueMaps]);
  const getFilteredDataForTab=useCallback((top,sub)=>{
    const key=top+"."+sub;
    if(visitedSinceFilter.has(key))return filteredData;
    return filteredDataSnapshotRef.current;
  },[visitedSinceFilter,filteredData]);

  const mineThemes=useCallback(async()=>{
    const field=activeFieldRef.current,data=parsedDataRef.current,cats=catFieldsRef.current;
    if(!field)return;
    setLoading(true);setError(null);setThemes(null);setSamplingInfo(null);setSelectedTheme(null);setThemeDetail(null);setDrillTheme(null);
    try{
      const {discoveryRows,ciRows,sampled,total}=prepareCorpusPct(data,field,cats,samplePctRef.current);
      if(!discoveryRows.length)throw new Error("No text in field '"+field+"'.");
      const corpusText=discoveryRows.map((r,i)=>(i+1)+". "+r.text).join("\n");
      const schemaCtx=schemaRef.current.map(f=>f.field+":"+f.type+(f.type==="categorical"&&f.values?" ("+f.values.slice(0,8).join(",")+")" : "")).join("; ");
      const sysPrompt="You are a qualitative research expert. Return ONLY raw JSON — no markdown, no backticks. Start with { and end with }.";
      const userMsg="Thematic analysis on "+discoveryRows.length+" responses (from "+total+" total) for field '"+field+"'.\n\nSchema: "+schemaCtx+"\n\nResponses:\n"+corpusText+"\n\nIdentify 4-7 distinct themes. Return:\n{\"themes\":[{\"id\":\"t1\",\"name\":\"Name\",\"description\":\"One sentence.\",\"keywords\":[\"k1\",\"k2\",\"k3\"],\"sentiment\":\"positive\",\"count\":0,\"percentage\":0,\"relatedThemes\":[]}],\"summary\":\"2-3 sentences.\",\"fieldName\":\""+field+"\"}";
      const raw=await callClaude(userMsg,sysPrompt);const parsed=parseJSON(raw);
      if(!parsed||!parsed.themes)throw new Error("Could not parse themes: "+raw.slice(0,400));
      parsed.themes=recountThemes(parsed.themes,data,field);
      setSamplingInfo({sampled:discoveryRows.length,total});setThemes(parsed);setThemeSource("ai");setThemeLibName(null);navigateTo("textmine","themes");setLastRunPct(samplePctRef.current);
    }catch(e){setError(e.message);}
    setLoading(false);
  },[]);

  // Recount existing themes with new sample size — no API call needed
  const rerunCounts=useCallback(()=>{
    const field=activeFieldRef.current,data=parsedDataRef.current;
    if(!field)return;
    setThemes(prev=>{
      if(!prev)return prev;
      const recounted=recountThemes(prev.themes,data,field);
      setLastRunPct(samplePctRef.current);
      return{...prev,themes:recounted};
    });
  },[]);

  const applyCustomThemes=useCallback((customThemes,libName,targetField)=>{
    const field=targetField||activeFieldRef.current,data=parsedDataRef.current;
    const useField=field||Object.keys(data[0]||{})[0];
    const counted=recountThemes(customThemes,data,useField);
    const libs=Array.isArray(libName)?libName:[libName];
    const summaryNames=libs.map(l=>"'"+l+"'").join(" + ");
    setThemes({themes:counted,summary:"Themes from "+summaryNames+" librar"+(libs.length===1?"y":"ies")+". Counts reflect keyword matches across your data.",fieldName:useField,sources:libs});
    setThemeSource("industry");setThemeLibName(summaryNames);setShowThemeEditor(false);navigateTo("textmine","themes");setLastRunPct(samplePctRef.current);
  },[]);

  // Mine themes for a specific field (used by picker modal)
  const mineThemesForField=useCallback(async(field)=>{
    if(field)setActiveField(field);
    // small delay to let state settle
    await new Promise(r=>setTimeout(r,80));
    // Temporarily patch activeFieldRef for the mine call
    if(field)activeFieldRef.current=field;
    await mineThemes();
  },[mineThemes]);

  const parseInput=useCallback(()=>{
    try{const t=rawText.trim();let rows;if(t.startsWith("[")||t.startsWith("{")){{const d=JSON.parse(t);rows=Array.isArray(d)?d:[d];}}else rows=parseCSV(t);if(!rows.length)throw new Error("No data rows found.");setParsedData(rows);setHasData(true);setError(null);}catch(e){setError("Parse error: "+e.message);}
  },[rawText]);
  const loadSample=useCallback(()=>{setParsedData(SAMPLE_DATA);setHasData(true);setError(null);},[]);

  const maxCount=themes?Math.max(...themes.themes.map(t=>t.count),1):1;
  const themeColors=themes?Object.fromEntries(themes.themes.map((t,i)=>[i,THEME_PALETTE[i%THEME_PALETTE.length]])):{};
  const CARD_HEIGHT=220;

  // ── Readiness / lock state ───────────────────────────────────────────────
  const tabsUnlocked = hasData && !!themes;
  const filterCount=Object.keys(filters).length;
  const sdDot = !hasData ? T.red : themes ? T.green : T.amber;
  const [showFiltersModal,setShowFiltersModal]=useState(false);
  const [filtersDirty,setFiltersDirty]=useState(false);
  const filtersApplyRef=React.useRef(null);

  // ── Top-level tab definitions ─────────────────────────────────────────────
  const TOP_TABS=[
    {id:"data",label:"Data"},
    {id:"textmine",label:"TextMine"},
    {id:"charts",label:"Charts"},
    {id:"statistics",label:"Statistics"},
  ];
  const SUB_TABS={
    data:[{id:"data",label:"Data"},{id:"schema",label:"Schema"},{id:"thememodel",label:"Theme Model"}],
    textmine:[{id:"themes",label:"Themes"},{id:"clouds",label:"Theme Clouds"},{id:"comments",label:"Comments"},{id:"compare",label:"Compare"}],
    charts:[],
    statistics:[{id:"descriptives",label:"Descriptives"},{id:"correlations",label:"Correlations"},{id:"grouptests",label:"Group Tests"},{id:"regression",label:"Regression"}],
  };
  const subTabList=SUB_TABS[topTab]||[];

  const handleTopTab=useCallback((id)=>{
    setTopTab(id);
    markVisited(id,subTabs[id]||"data");
    if(id==="textmine"||id==="charts"||id==="statistics"){
      setDrillTheme(null);setSelectedTheme(null);setThemeDetail(null);
    }
  },[subTabs,markVisited]);

  const handleSubTab=useCallback((id)=>{
    setSubTab(id);
    markVisited(topTab,id);
    if(id==="themes"||id==="compare"||id==="clouds"){
      setDrillTheme(null);setSelectedTheme(null);setThemeDetail(null);
    }
  },[topTab,setSubTab,markVisited]);

  useEffect(()=>{markVisited(topTab,subTab);},[topTab,subTab]);

  return(<div style={{height:"100vh",background:T.bg,color:T.text,display:"flex",flexDirection:"column",overflow:"hidden"}}>

    {/* TOP BAR */}
    <div style={{background:T.accent,padding:"0 0 0 24px",height:54,display:"flex",alignItems:"stretch",flexShrink:0}}>
      <div style={{display:"flex",alignItems:"center",gap:10,paddingRight:24,borderRight:"1px solid rgba(255,255,255,.15)",flexShrink:0}}>
        <div style={{width:30,height:30,borderRadius:8,background:"rgba(255,255,255,.2)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:15,fontWeight:900,color:"white",letterSpacing:"-1px"}}>A</div>
        <div>
          <div style={{fontSize:15,fontWeight:800,color:"white",letterSpacing:"-.4px",lineHeight:1.1}}>Ana <span style={{fontWeight:400,fontSize:13,opacity:.8}}>by Datanautix</span></div>
          <div style={{fontSize:9,color:"rgba(255,255,255,.6)",letterSpacing:".1em",textTransform:"uppercase",lineHeight:1}}>Qualitative + Quantitative Analytics</div>
        </div>
      </div>
      <div style={{display:"flex",alignItems:"stretch",flex:1,paddingLeft:4}}>
        {TOP_TABS.map(t=>{
          const active=topTab===t.id;
          const locked=!hasData&&t.id!=="data";
          return(<button key={t.id} onClick={()=>!locked&&handleTopTab(t.id)}
            style={{padding:"0 22px",height:"100%",fontSize:14,fontWeight:active?700:500,
              color:active?"white":"rgba(255,255,255,.65)",
              background:active?"rgba(255,255,255,.18)":"transparent",
              border:"none",borderBottom:active?"3px solid white":"3px solid transparent",
              cursor:locked?"not-allowed":"pointer",flexShrink:0,
              opacity:locked?0.45:1,transition:"all .15s",letterSpacing:"-.1px"}}
          >{t.label}</button>);
        })}
      </div>
      <button
        onClick={()=>{if(hasData){setShowFiltersModal(true);setFiltersDirty(false);}}}
        disabled={!hasData}
        style={{padding:"0 18px",height:"100%",fontSize:13,fontWeight:filterCount>0?700:500,
          color:filterCount>0?"white":"rgba(255,255,255,.65)",
          background:filterCount>0?"rgba(255,255,255,.18)":"transparent",
          border:"none",borderBottom:filterCount>0?"3px solid white":"3px solid transparent",
          cursor:hasData?"pointer":"not-allowed",flexShrink:0,opacity:hasData?1:.45,
          display:"flex",alignItems:"center",gap:6,transition:"all .15s"}}>
        {filterCount>0&&<span style={{width:7,height:7,borderRadius:"50%",background:"#fde68a",flexShrink:0}}/>}
        Filters{filterCount>0?" ("+filterCount+")":""}
      </button>
      <div style={{display:"flex",alignItems:"center",gap:6,padding:"0 16px",borderLeft:"1px solid rgba(255,255,255,.15)",flexShrink:0}}>
        {apiKey?(
          <div style={{display:"flex",alignItems:"center",gap:6}}>
            <button onClick={()=>{const next=!aiEnabled;setAiEnabled(next);try{localStorage.setItem(STORAGE_AI_ON,next?"1":"0");}catch{}}} style={{display:"flex",alignItems:"center",gap:6,padding:"4px 11px",fontSize:12,fontWeight:600,background:aiEnabled?"rgba(255,255,255,.18)":"rgba(0,0,0,.2)",border:"1px solid "+(aiEnabled?"rgba(255,255,255,.3)":"rgba(255,255,255,.15)"),borderRadius:20,color:"white",cursor:"pointer"}}>
              <span style={{width:7,height:7,borderRadius:"50%",background:aiEnabled?"#4ade80":"#94a3b8",display:"inline-block"}}/>
              {aiEnabled?"AI on":"AI off"}
            </button>
            <button onClick={()=>setShowApiKeyModal(true)} style={{padding:"4px 9px",fontSize:11,fontWeight:600,background:"rgba(255,255,255,.1)",border:"1px solid rgba(255,255,255,.2)",borderRadius:20,color:"rgba(255,255,255,.8)",cursor:"pointer"}}>⚙</button>
          </div>
        ):<button onClick={()=>setShowApiKeyModal(true)} style={{display:"flex",alignItems:"center",gap:6,padding:"5px 14px",fontSize:12,fontWeight:700,background:"white",border:"none",borderRadius:20,color:T.accent,cursor:"pointer"}}>🔑 Connect AI</button>}
      </div>

      <div style={{background:T.bgCard,borderBottom:"1px solid "+T.border,height:40,display:"flex",alignItems:"stretch",paddingLeft:8,flexShrink:0}}>

            style={{padding:"0 18px",height:"100%",fontSize:13,fontWeight:active?700:500,
