              opacity:locked?0.4:1,transition:"color .12s"}}
            title={locked?"Run a theme model first":""}
          >{t.label}</button>);
        })}
        {topTab==="data"&&(
          <div style={{marginLeft:"auto",display:"flex",alignItems:"center",gap:6,padding:"0 16px"}}>
            <span style={{width:8,height:8,borderRadius:"50%",background:sdDot}}/>
            <span style={{fontSize:11,color:T.textMute}}>{!hasData?"No data loaded":themes?"Model ready":"Data loaded"}</span>
          </div>
        )}
      </div>
    )}

    {/* ACTIVE FILTER BAR */}
    {filterCount>0&&(
      <div style={{background:T.accentBg,borderBottom:"1px solid "+T.accentMid,padding:"5px 20px",display:"flex",alignItems:"center",gap:8,flexShrink:0,flexWrap:"wrap"}}>
        <span style={{fontSize:11,fontWeight:700,color:T.accent,flexShrink:0}}>⊞ Filtered:</span>
        {Object.entries(filters).map(([field,f])=>{
          const lbl=(columnAliases&&columnAliases[field])||field;
          const desc=f.type==="cat"?[...f.values].slice(0,2).join(", ")+(f.values.size>2?" +"+(f.values.size-2):""):f.values[0]+"–"+f.values[1];
          return(<span key={field} style={{display:"flex",alignItems:"center",gap:4,fontSize:11,padding:"2px 9px",background:"white",borderRadius:10,border:"1px solid "+T.accentMid,color:T.text,fontWeight:500}}>
            {lbl}: {desc}
            <button onClick={()=>setFilters(prev=>{const n={...prev};delete n[field];return n;})} style={{background:"none",border:"none",cursor:"pointer",color:T.textFaint,fontSize:12,lineHeight:1,padding:0,marginLeft:1}}>×</button>
          </span>);
        })}
        <button onClick={()=>{setShowFiltersModal(true);setFiltersDirty(false);}} style={{fontSize:10,fontWeight:700,color:T.accent,background:"none",border:"1px solid "+T.accentMid,borderRadius:6,cursor:"pointer",padding:"2px 8px",marginLeft:"auto"}}>⊞ Edit</button>
        <button onClick={()=>setFilters({})} style={{fontSize:10,fontWeight:700,color:T.textMute,background:"none",border:"none",cursor:"pointer"}}>Clear all</button>
      </div>
    )}

    {/* MAIN PANEL */}
    <div style={{flex:1,overflow:"hidden",display:"flex",flexDirection:"column"}}>

      {topTab==="data"&&(<div style={{flex:1,overflow:"hidden",display:"flex",flexDirection:"column"}} className="fadein">
        <SourceDataTab
          activeSubTab={subTab}
          hasData={hasData} parsedData={parsedData} schema={schema} schemaEdited={schemaEdited}
          openFields={openFields} activeField={activeField} setActiveField={setActiveField}
          themes={themes} themeSource={themeSource} themeLibName={themeLibName} loading={loading} error={error}
          samplePct={samplePct} setSamplePct={setSamplePct} lastRunPct={lastRunPct}
          apiKey={apiKey} aiActive={aiActive} columnAliases={columnAliases}
          scoreFields={effectiveScoreFields} catValueMaps={catValueMaps} setCatValueMaps={setCatValueMaps}
          derivedFields={derivedFields} setDerivedFields={setDerivedFields}
          onTypeChange={handleTypeChange} onToggleScore={toggleScore} setAlias={setAlias}
          onLoadData={()=>setShowUploadModal(true)} onMineThemes={mineThemes}
          onNavigate={handleSubTab}
          onApplyIndustry={(ind,field)=>{const libs=Array.isArray(ind)?ind:[ind];const merged=[];const seen=new Set();libs.forEach(l=>(INDUSTRY_THEMES[l]||[]).forEach(t=>{if(!seen.has(t.id)){seen.add(t.id);merged.push(t);}}));applyCustomThemes(merged,libs,field);}}
          onOpenKey={()=>setShowApiKeyModal(true)} onOpenThemeEditor={()=>setShowThemeEditor(true)} onRerunCounts={rerunCounts}
        />
      </div>)}

      {topTab==="textmine"&&(<div style={{flex:1,overflow:"hidden",display:"flex",flexDirection:"column"}}>

        {subTab==="themes"&&!drillTheme&&(<div style={{flex:1,overflowY:"auto",padding:24}} className="fadein">
          {loading&&<div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:20,paddingTop:80,paddingBottom:80}} className="fadein">
            <div style={{width:52,height:52,borderRadius:"50%",border:"3px solid "+T.accentMid,borderTopColor:T.accent,animation:"spin 0.9s linear infinite"}}/>
            <div style={{textAlign:"center"}}>
              <div style={{fontSize:15,fontWeight:700,color:T.text,marginBottom:6}}>Analyzing your responses</div>
              <div style={{display:"flex",alignItems:"center",gap:6,justifyContent:"center"}}>
                {[0,1,2,3].map(i=><span key={i} style={{width:7,height:7,borderRadius:"50%",background:T.accent,display:"inline-block",animation:"blink 1.4s ease infinite",animationDelay:(i*0.2)+"s"}}/>)}
              </div>
              <div style={{fontSize:12,color:T.textMute,marginTop:8}}>Claude is reading and grouping themes…</div>
            </div>
          </div>}
          {!selectedTheme&&themes&&!loading&&(<div>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:16,flexWrap:"wrap",gap:10}}>
              <div>
                <div style={{display:"flex",alignItems:"center",gap:10}}>
                  <h2 style={{fontSize:20,fontWeight:800,color:T.text,margin:0}}>Themes</h2>
                  {themeSource&&<span style={{fontSize:11,fontWeight:600,padding:"2px 9px",borderRadius:20,background:themeSource==="ai"?T.accentBg:T.amberBg,color:themeSource==="ai"?T.accent:T.amber,border:"1px solid "+(themeSource==="ai"?T.accentMid:T.amberMid)}}>{themeSource==="ai"?"⟡ AI Mined":(themeLibName?"≡ "+themeLibName:"≡ Industry")}</span>}
                </div>
                <p style={{fontSize:12,color:T.textMid,margin:"3px 0 0"}}>Field: <strong>{activeField||themes.fieldName}</strong></p>
              </div>
              <div style={{display:"flex",background:T.bg,borderRadius:20,padding:2,border:"1px solid "+T.border,flexShrink:0}}>
                {[["distribution","≡ Distribution"],["cards","⊞ Cards"]].map(([v,lbl])=>(
                  <button key={v} onClick={()=>setThemesView(v)} style={{fontSize:12,fontWeight:themesView===v?700:500,padding:"5px 14px",borderRadius:18,background:themesView===v?T.accent:"transparent",color:themesView===v?"white":T.textMute,border:"none",cursor:"pointer",transition:"background .15s"}}>{lbl}</button>
                ))}
              </div>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"2fr 1fr 1fr",gap:10,marginBottom:20}}>
              {samplingInfo?(<Card style={{padding:"14px 16px"}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:6}}>
                  <div><div style={{fontSize:22,fontWeight:800,color:T.accent,lineHeight:1}}>{samplingInfo.sampled.toLocaleString()}</div><div style={{fontSize:10,color:T.textMute,marginTop:3,fontWeight:600,textTransform:"uppercase",letterSpacing:".05em"}}>Sampled</div></div>
                  <div style={{textAlign:"right"}}><div style={{fontSize:16,fontWeight:700,color:T.textMid,lineHeight:1}}>{samplingInfo.total.toLocaleString()}</div><div style={{fontSize:10,color:T.textMute,marginTop:3,fontWeight:600,textTransform:"uppercase",letterSpacing:".05em"}}>Total</div></div>
                </div>
                <div style={{height:4,background:T.border,borderRadius:2,overflow:"hidden",marginBottom:6}}><div style={{height:"100%",width:Math.round(samplingInfo.sampled/samplingInfo.total*100)+"%",background:T.accent,borderRadius:2}}/></div>
                <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
                  <span style={{fontSize:11,color:T.textMute}}>{Math.round(samplingInfo.sampled/samplingInfo.total*100)}% sample rate</span>
                  {samplingInfo.sampled<samplingInfo.total&&<button onClick={()=>{setSamplePct(100);setTimeout(mineThemes,50);}} style={{fontSize:10,fontWeight:700,padding:"2px 8px",borderRadius:20,border:"1px solid "+T.accent,background:T.accentBg,color:T.accent,cursor:"pointer"}}>Use all</button>}
                </div>
              </Card>):(<Card style={{padding:"14px 16px"}}><div style={{fontSize:22,fontWeight:800,color:T.accent,lineHeight:1}}>{filteredData.filter(r=>r[activeField]).length.toLocaleString()}</div><div style={{fontSize:10,color:T.textMute,marginTop:4,fontWeight:600,textTransform:"uppercase",letterSpacing:".05em"}}>Responses</div></Card>)}
              {[{label:"Themes Found",val:themes.themes.length,color:T.blue},{label:"Top Tone",val:[...themes.themes].sort((a,b)=>b.count-a.count)[0]?.sentiment||"—",color:T.green}].map(s=>(<Card key={s.label} style={{padding:"14px 16px"}}><div style={{fontSize:24,fontWeight:800,color:s.color,lineHeight:1}}>{s.val}</div><div style={{fontSize:10,color:T.textMute,marginTop:4,fontWeight:600,textTransform:"uppercase",letterSpacing:".05em"}}>{s.label}</div></Card>))}
            </div>
            {themesView==="distribution"&&(
              <Card style={{padding:"18px 20px",marginBottom:20}}>
                {breakdownField&&selectedValues.size>0?(
                  <BreakdownDist themes={themes} parsedData={parsedData} activeField={activeField} breakdownField={breakdownField} selectedValues={selectedValues} themeColors={themeColors}
                    onDrillTheme={(t)=>{setDrillTheme(t);setSelectedTheme(null);setThemeDetail(null);handleSubTab("comments");setCommentsBreadcrumb([t.name]);setCommentsOrigin("themes");}}/>
                ):(
                  <div>
                    <SectionLabel>Theme Distribution — click a bar to view comments</SectionLabel>
                    {(()=>{
                      const totalResp=filteredData.filter(r=>String(r[activeField||themes.fieldName]||"").trim().length>0).length;
                      const sortedT=[...themes.themes].sort((a,b)=>b.count-a.count);
                      const classifiedCount=sortedT.reduce((s,t)=>s+t.count,0);
                      const unclassifiedCount=Math.max(0,totalResp-classifiedCount);
                      const maxBar=Math.max(...sortedT.map(t=>t.count),unclassifiedCount,1);
                      return(<div>
                        {sortedT.map(t=>{
                          const idx=themes.themes.indexOf(t);const pal=themeColors[idx]||THEME_PALETTE[0];
                          const pct=totalResp>0?Math.round(t.count/totalResp*100):0;
                          const pctFrac=totalResp>0?t.count/totalResp:0;
                          return(<CompareBar key={t.id} label={t.name} labelPct={pct} count={t.count} share={pctFrac} maxShare={1} color={pal.border} labelColor={pal.text} themeName={t.name}
                            onBarClick={()=>{setDrillTheme(t);setSelectedTheme(null);setThemeDetail(null);handleSubTab("comments");setCommentsBreadcrumb([t.name]);setCommentsOrigin("themes");}}/>);
                        })}
                        {unclassifiedCount>0&&<CompareBar label="Unclassified" labelPct={totalResp>0?Math.round(unclassifiedCount/totalResp*100):0} count={unclassifiedCount} share={totalResp>0?unclassifiedCount/totalResp:0} maxShare={1} color={UNCLASSIFIED_COLOR} isUnclassified={true}
                          onBarClick={()=>{setDrillTheme({id:"unclassified",name:"Unclassified",description:"Responses that did not match any theme.",keywords:[],sentiment:"mixed"});handleSubTab("comments");setCommentsBreadcrumb(["Unclassified"]);setCommentsOrigin("themes");}}/>}
                      </div>);
                    })()}
                  </div>
                )}
              </Card>
            )}
            {themesView==="cards"&&(
              <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(280px,1fr))",gap:16,marginBottom:20}}>
                {[...themes.themes].sort((a,b)=>b.count-a.count).map((t,i)=>{
                  const pal=themeColors[themes.themes.indexOf(t)]||THEME_PALETTE[0];
                  const totalResp=filteredData.filter(r=>String(r[activeField||themes.fieldName]||"").trim().length>0).length;
                  const pct=totalResp>0?Math.round(t.count/totalResp*100):t.percentage||0;
                  return(<div key={t.id}
                    style={{background:T.bgCard,border:"2px solid "+pal.border,borderRadius:14,padding:"16px 18px",cursor:"pointer",transition:"box-shadow .15s"}}
                    onClick={()=>{setDrillTheme(t);setSelectedTheme(null);setThemeDetail(null);handleSubTab("comments");setCommentsBreadcrumb([t.name]);setCommentsOrigin("themes");}}
                    onMouseEnter={e=>e.currentTarget.style.boxShadow="0 4px 18px rgba(0,0,0,.10)"}
                    onMouseLeave={e=>e.currentTarget.style.boxShadow=""}>
                    {/* Top row: dot + sentiment badge */}
                    <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10}}>
                      <div style={{width:10,height:10,borderRadius:"50%",background:pal.border,flexShrink:0}}/>
                      <span style={{fontSize:11,padding:"2px 9px",borderRadius:20,background:sentimentBg(t.sentiment),color:sentimentColor(t.sentiment),fontWeight:700,textTransform:"capitalize"}}>{t.sentiment||"—"}</span>
                    </div>
                    {/* Theme name */}
                    <div style={{fontSize:15,fontWeight:800,color:T.text,marginBottom:4}}>{t.name}</div>
                    {/* Description */}
                    <div style={{fontSize:12,color:T.textMute,lineHeight:1.5,marginBottom:10,minHeight:32}}>{t.description}</div>
                    {/* Keywords */}
                    <div style={{display:"flex",flexWrap:"wrap",gap:5,marginBottom:14}}>
                      {(t.keywords||[]).slice(0,4).map(k=>(<span key={k} style={{fontSize:11,padding:"2px 8px",background:T.bg,color:T.textMid,borderRadius:20,border:"1px solid "+T.border}}>{k}</span>))}
                    </div>
                    {/* Count + % + CI + mini bar */}
                    <div style={{borderTop:"1px solid "+T.border,paddingTop:10}}>
                      <div style={{display:"flex",alignItems:"baseline",justifyContent:"space-between",marginBottom:4}}>
                        <span style={{fontSize:13,color:T.textMid}}><strong style={{fontSize:18,color:pal.border}}>{t.count.toLocaleString()}</strong> responses</span>
                        <span style={{fontSize:22,fontWeight:800,color:pal.border}}>{pct}%</span>
                      </div>
                      <div style={{fontSize:10,color:T.textFaint,marginBottom:6}}>95% CI: {t.ciLow??0}–{t.ciHigh??0}%</div>
                      <div style={{height:5,background:T.border,borderRadius:3,overflow:"hidden"}}>
                        <div style={{height:"100%",width:pct+"%",background:pal.border,borderRadius:3,transition:"width .6s ease"}}/>
                      </div>
                    </div>
                  </div>);
                })}
              </div>
            )}
            
                        {error&&<div style={{marginTop:14}}>{aiErrorMessage(error,()=>setShowApiKeyModal(true))}</div>}
          </div>)}
          {error&&!selectedTheme&&<div style={{marginTop:14}}>{aiErrorMessage(error,()=>setShowApiKeyModal(true))}</div>}
        </div>)}

        {subTab==="comments"&&(<div style={{flex:1,overflow:"hidden",display:"flex",flexDirection:"column"}}>
          <div style={{padding:"8px 20px",borderBottom:"1px solid "+T.border,background:T.bgCard,flexShrink:0,display:"flex",alignItems:"center",gap:8,minHeight:40}}>
            <button onClick={()=>{setDrillTheme(null);setSelectedTheme(null);setThemeDetail(null);handleSubTab(commentsOrigin||"themes");}} style={{fontSize:12,fontWeight:600,color:T.textMute,background:"transparent",border:"none",cursor:"pointer",padding:"2px 6px 2px 0",flexShrink:0}}>← Back</button>
            <span style={{fontSize:12,color:T.border,flexShrink:0}}>|</span>
            {(()=>{
              const themeName=commentsBreadcrumb[0]||drillTheme?.name;
              const groupName=commentsBreadcrumb[1]||null;
              const activeFilters=Object.keys(filters).length>0;
              const pill=(txt,key)=>(<span key={key} style={{fontSize:12,fontWeight:700,color:T.accent,background:T.accentBg,padding:"3px 11px",borderRadius:12,border:"1px solid "+T.accentMid,whiteSpace:"nowrap",flexShrink:0}}>{txt}</span>);
              return(<>
                {themeName&&<span style={{fontSize:11,color:T.textFaint,flexShrink:0}}>Viewing comments for</span>}
                {themeName&&(()=>{const tIdx=themes&&drillTheme?themes.themes.indexOf(drillTheme):-1;const pal=tIdx>=0?(themeColors[tIdx]||THEME_PALETTE[0]):null;return<span style={{fontSize:12,fontWeight:700,color:pal?pal.text:T.accent,background:pal?pal.bg:T.accentBg,padding:"3px 11px",borderRadius:20,border:"1px solid "+(pal?pal.border:T.accentMid),flexShrink:0}}>{themeName}</span>;})()}
                {groupName&&<span style={{fontSize:11,color:T.textFaint,flexShrink:0}}>from</span>}
                {groupName&&pill(groupName,"group")}
                {groupName&&<span style={{fontSize:11,color:T.textFaint,flexShrink:0}}>respondents</span>}
                {activeFilters&&<span style={{fontSize:11,color:T.textFaint,flexShrink:0,marginLeft:2}}>· filtered by <span style={{fontWeight:600,color:T.amber}}>{filterLabel(filters,columnAliases)}</span></span>}
              </>);
            })()}
          </div>
          {drillTheme&&themes
            ?<CommentsPanel theme={drillTheme} allThemes={themes.themes} parsedData={filteredData} activeField={activeField||themes.fieldName} catFields={effectiveCatFields} themeColors={themeColors} onBack={()=>{setDrillTheme(null);setSelectedTheme(null);setThemeDetail(null);handleSubTab(commentsOrigin||"themes");}} ignoredFields={ignoredFields} schema={schema} apiKey={apiKey} onOpenKey={()=>setShowApiKeyModal(true)} columnAliases={columnAliases} allOpenFields={openFields} aiActive={aiActive} aiMode={aiMode}/>
            :<div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",height:"100%",gap:12,padding:48,textAlign:"center",color:T.textFaint}}><div style={{fontSize:40}}>💬</div><p style={{fontSize:14,margin:0}}>Click a theme from Themes or Compare to view comments here.</p></div>
          }
        </div>)}

        {subTab==="compare"&&(<div style={{flex:1,overflow:"hidden"}} className="fadein">
          <CompareTab themes={themes} parsedData={filteredData} schema={fullSchema} breakdownField={breakdownField} setBreakdownField={setBreakdownField} aiActive={aiActive} aiMode={aiMode} onOpenKey={()=>setShowApiKeyModal(true)} columnAliases={columnAliases}
            onDrillTheme={(t,grp)=>{if(!t)return;setDrillTheme(t);setSelectedTheme(null);handleSubTab("comments");setCommentsBreadcrumb(grp?[t.name,grp]:[t.name]);setCommentsOrigin("compare");}}/>
        </div>)}

        {subTab==="clouds"&&themes&&(<div style={{flex:1,overflowY:"auto",padding:24}} className="fadein">
          <h2 style={{fontSize:20,fontWeight:800,color:T.text,marginBottom:16}}>Theme Clouds</h2>
          <WordCloud themes={themes.themes} themeColors={themeColors} parsedData={filteredData} activeField={activeField||themes.fieldName}
            onWordClick={(word,themeIdx,mode)=>{
              if(mode==="theme"||word===null){const t=themeIdx>=0?themes.themes[themeIdx]:null;if(t){setDrillTheme(t);handleSubTab("comments");}}
              else{const t=themeIdx>=0?themes.themes[themeIdx]:themes.themes.find(th=>(th.keywords||[]).some(k=>k.toLowerCase()===word));if(t){setDrillTheme(t);handleSubTab("comments");}else{setDrillTheme({id:"word-"+word,name:'"'+word+'"',description:'Comments containing "'+word+'"',keywords:[word],sentiment:"mixed"});handleSubTab("comments");}}
            }}/>
        </div>)}

      </div>)}

      {topTab==="charts"&&(<div style={{flex:1,overflow:"hidden",display:"flex",flexDirection:"column"}} className="fadein">
        <ChartsTab filteredData={getFilteredDataForTab("charts","charts")} schema={fullSchema} columnAliases={columnAliases} themes={themes} activeChart={chartType} setActiveChart={setChartType} catValueMaps={catValueMaps}/>
      </div>)}

      {topTab==="statistics"&&(<div style={{flex:1,overflowY:"auto",padding:24}} className="fadein">
        {subTab==="descriptives"&&<DescriptivesPanel schema={fullSchema} filteredData={getFilteredDataForTab("statistics","descriptives")} selField={descSel} setSelField={setDescSel}/>}
        {subTab==="correlations"&&<CorrelationsPanel schema={fullSchema} filteredData={getFilteredDataForTab("statistics","correlations")} corrType={corrType} setCorrType={setCorrType} selCell={corrSelCell} setSelCell={setCorrSelCell}/>}
        {subTab==="grouptests"&&<GroupTestsPanel schema={fullSchema} filteredData={getFilteredDataForTab("statistics","grouptests")} testType={groupTestType} setTestType={setGroupTestType} numF={groupNumF} setNumF={setGroupNumF} catF={groupCatF} setCatF={setGroupCatF} catF2={groupCatF2} setCatF2={setGroupCatF2}/>}
        {subTab==="regression"&&<RegressionPanel schema={fullSchema} filteredData={getFilteredDataForTab("statistics","regression")} outcome={regrOutcome} setOutcome={setRegrOutcome} predictors={regrPredictors} setPredictors={setRegrPredictors}/>}
      </div>)}

    </div>

    {showFiltersModal&&(
      <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.45)",zIndex:2000,display:"flex",alignItems:"center",justifyContent:"center",padding:24}} onClick={()=>setShowFiltersModal(false)}>
        <div style={{background:T.bg,width:520,maxWidth:"100%",maxHeight:"88vh",borderRadius:16,boxShadow:"0 24px 72px rgba(0,0,0,.28)",display:"flex",flexDirection:"column",overflow:"hidden"}} onClick={e=>e.stopPropagation()}>
          <div style={{background:T.bgCard,borderBottom:"1px solid "+T.border,padding:"14px 20px",display:"flex",alignItems:"center",justifyContent:"space-between",flexShrink:0,gap:10}}>
            <div style={{display:"flex",alignItems:"center",gap:8,flex:1,minWidth:0}}>
              <span style={{fontSize:15,fontWeight:800,color:T.text,flexShrink:0}}>Filters</span>
              <span style={{fontSize:11,color:T.textMute,marginLeft:8}}>Applies globally across all analysis tabs</span>
              {filterCount>0&&!filtersDirty&&<span style={{fontSize:11,fontWeight:700,padding:"2px 8px",borderRadius:10,background:T.accentBg,color:T.accent,border:"1px solid "+T.accentMid,flexShrink:0}}>{filterCount} active</span>}
            </div>
            <div style={{display:"flex",gap:6,alignItems:"center",flexShrink:0}}>
              {filterCount>0&&<button onClick={()=>{setFilters({});setFiltersDirty(false);}} style={{fontSize:11,fontWeight:600,padding:"4px 10px",borderRadius:7,background:T.redBg,color:T.red,border:"1px solid "+T.red+"30",cursor:"pointer"}}>Clear all</button>}
              <button onClick={()=>filtersApplyRef.current&&filtersApplyRef.current()} disabled={!filtersDirty}
                style={{fontSize:12,fontWeight:700,padding:"6px 16px",borderRadius:8,background:filtersDirty?T.accent:"#e5e7eb",color:filtersDirty?"white":"#9ca3af",border:"none",cursor:filtersDirty?"pointer":"not-allowed",transition:"background .15s,color .15s",flexShrink:0}}>
                Apply Filters
              </button>
              <button onClick={()=>setShowFiltersModal(false)} style={{fontSize:20,fontWeight:400,background:"transparent",border:"none",cursor:"pointer",color:T.textMute,lineHeight:1,padding:"0 4px",flexShrink:0}}>×</button>
            </div>
          </div>
          <div style={{flex:1,overflowY:"auto"}}>
            <FiltersTab schema={schema} parsedData={parsedData} filters={filters} setFilters={setFilters} columnAliases={columnAliases} derivedFields={derivedFields} setDerivedFields={setDerivedFields} onClose={()=>setShowFiltersModal(false)} onDirtyChange={setFiltersDirty} applyRef={filtersApplyRef}/>
          </div>
          <div style={{background:T.bgCard,borderTop:"1px solid "+T.border,padding:"10px 20px",flexShrink:0,display:"flex",justifyContent:"flex-end"}}>
            <button onClick={()=>setShowFiltersModal(false)} style={{fontSize:12,fontWeight:600,padding:"7px 18px",background:T.bg,color:T.textMid,border:"1px solid "+T.border,borderRadius:8,cursor:"pointer"}}>Close</button>
          </div>
        </div>
      </div>
    )}
    {showThemeEditor&&<ThemeEditor onApply={applyCustomThemes} onClose={()=>setShowThemeEditor(false)} apiKey={apiKey}/>}
    {showApiKeyModal&&<ApiKeyModal onClose={()=>setShowApiKeyModal(false)} onSave={(k,mode)=>{setApiKey(k);if(k){setAiEnabled(true);setAiMode_(mode||"auto");try{localStorage.setItem(STORAGE_AI_ON,"1");localStorage.setItem(STORAGE_AI_MODE,mode||"auto");}catch{};}else{setAiEnabled(false);try{localStorage.setItem(STORAGE_AI_ON,"0");}catch{};}}}/>}
    {showUploadModal&&<UploadModal onLoad={(rows)=>{setParsedData(rows);setHasData(true);setError(null);}} onClose={()=>setShowUploadModal(false)}/>}
  </div>);
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
