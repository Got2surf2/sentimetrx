// ── shared helpers ──────────────────────────────────────────────────────────
function fieldLbl(f,aliases){return(aliases&&aliases[f])||f;}

function numericVals(data,field){
  return data.map(r=>parseFloat(r[field])).filter(v=>!isNaN(v));
}

// Chi-square test for independence (returns p-value approximation)
function chiSquare(table){
  const rowSums=table.map(r=>r.reduce((a,b)=>a+b,0));
  const colSums=table[0].map((_,ci)=>table.reduce((s,r)=>s+r[ci],0));
  const N=rowSums.reduce((a,b)=>a+b,0);
  if(!N)return 1;
  let chi2=0;
  table.forEach((row,ri)=>row.forEach((obs,ci)=>{
    const exp=rowSums[ri]*colSums[ci]/N;
    if(exp>0) chi2+=(obs-exp)**2/exp;
  }));
  const df=(table.length-1)*(table[0].length-1);
  // p-value approximation via chi2 CDF
  if(df<=0)return 1;
  // Simple approximation: use Wilson-Hilferty
  const k=df;
  const z=(Math.pow(chi2/k,1/3)-(1-2/(9*k)))/Math.sqrt(2/(9*k));
  const p=0.5*(1+erf(z/Math.SQRT2));
  return Math.max(0,Math.min(1,1-p));
}
function erf(x){
  const t=1/(1+0.3275911*Math.abs(x));
  const poly=t*(0.254829592+t*(-0.284496736+t*(1.421413741+t*(-1.453152027+t*1.061405429))));
  const r=1-poly*Math.exp(-x*x);
  return x<0?-r:r;
}

// ── Chart: Distribution (histogram + box) ───────────────────────────────────
function DistributionChart({data,schema,aliases}){
  const plotRef=React.useRef();
  const numFields=schema.filter(f=>f.type==="numeric"&&f.field).map(f=>f.field);
  const catFields=schema.filter(f=>f.type==="categorical").map(f=>f.field);
  const [field,setField]=React.useState(numFields[0]||null);
  const [splitBy,setSplitBy]=React.useState("none");
  const [chartType,setChartType]=React.useState("histogram"); // histogram | box
  const [yMode,setYMode]=React.useState("count"); // count | pct
  const [calcMode,setCalcMode]=React.useState("count"); // count | avg | median | sum | min | max
  const [barGroupMode,setBarGroupMode]=React.useState("group"); // group | stack

  const vals=React.useMemo(()=>field?numericVals(data,field):[], [data,field]);
  const groups=React.useMemo(()=>{
    if(splitBy==="none"||!field)return null;
    const g={};
    data.forEach(r=>{
      const v=parseFloat(r[field]);
      if(isNaN(v))return;
      const k=String(r[splitBy]??"(blank)");
      if(!g[k])g[k]=[];
      g[k].push(v);
    });
    return g;
  },[data,field,splitBy]);

  const calcVal=React.useCallback((arr)=>{
    if(!arr||!arr.length)return null;
    const s=[...arr].sort((a,b)=>a-b);
    if(calcMode==="count")return arr.length;
    if(calcMode==="avg")return+(arr.reduce((a,b)=>a+b,0)/arr.length).toFixed(2);
    if(calcMode==="median")return s[Math.floor(s.length/2)];
    if(calcMode==="sum")return arr.reduce((a,b)=>a+b,0);
    if(calcMode==="min")return s[0];
    if(calcMode==="max")return s[s.length-1];
    return arr.length;
  },[calcMode]);

  const traces=React.useMemo(()=>{
    if(!field||!vals.length)return[];
    const total=vals.length;
    if(groups){
      return Object.entries(groups).map(([grp,vs],i)=>{
        if(chartType==="histogram"){
          const hist=vs;
          if(yMode==="pct"){
            // normalize histogram
            return{type:"histogram",x:hist,name:grp,opacity:0.75,nbinsx:20,histnorm:"percent"};
          }
          return{type:"histogram",x:hist,name:grp,opacity:0.75,nbinsx:20};
        }
        return{type:"box",y:vs,name:grp,boxpoints:"outliers"};
      });
    }
    if(chartType==="histogram"){
      return[{type:"histogram",x:vals,marker:{color:T.accent},nbinsx:25,
        histnorm:yMode==="pct"?"percent":"",name:fieldLbl(field,aliases)}];
    }
    return[{type:"box",y:vals,marker:{color:T.accent},boxpoints:"all",jitter:0.3,name:fieldLbl(field,aliases)}];
  },[vals,groups,field,chartType,yMode]);

  const layout=React.useMemo(()=>({
    barmode:groups?(barGroupMode==="stack"?"stack":"group"):"",
    xaxis:{title:chartType==="histogram"?fieldLbl(field,aliases):"",gridcolor:T.border},
    yaxis:{title:chartType==="histogram"?(yMode==="pct"?"Percentage (%)":"Count"):fieldLbl(field,aliases),gridcolor:T.border},
    legend:{orientation:"h",y:-0.2},
    showlegend:!!groups
  }),[field,groups,chartType,yMode,aliases]);

  usePlotly(plotRef, traces, layout, [traces,layout]);

  const stats=React.useMemo(()=>{
    if(!vals.length)return null;
    const sorted=[...vals].sort((a,b)=>a-b);
    const mean=vals.reduce((a,b)=>a+b,0)/vals.length;
    const median=sorted[Math.floor(sorted.length/2)];
    const std=Math.sqrt(vals.reduce((s,v)=>s+(v-mean)**2,0)/vals.length);
    return{n:vals.length,mean:mean.toFixed(2),median:median.toFixed(2),std:std.toFixed(2),
      min:sorted[0].toFixed(2),max:sorted[sorted.length-1].toFixed(2),
      sum:vals.reduce((a,b)=>a+b,0).toFixed(2)};
  },[vals]);

  if(!numFields.length) return <EmptyChart msg="No numeric fields detected in your data."/>;

  return(<div style={{display:"flex",flexDirection:"column",gap:16}}>
    <div style={{display:"flex",gap:12,flexWrap:"wrap",alignItems:"flex-end"}}>
      <ChartSelect label="Field" value={field||""} onChange={setField} options={numFields.map(f=>({v:f,l:fieldLbl(f,aliases)}))}/>
      <ChartSelect label="Split by" value={splitBy} onChange={setSplitBy} options={[{v:"none",l:"None"},...catFields.map(f=>({v:f,l:fieldLbl(f,aliases)}))]}/>
      <ChartToggle value={chartType} onChange={setChartType} options={[["histogram","Histogram"],["box","Box Plot"]]}/>
      {chartType==="histogram"&&<ChartToggle value={yMode} onChange={setYMode} options={[["count","Count"],["pct","Percent"]]}/>}
      {chartType==="histogram"&&splitBy!=="none"&&<ChartToggle value={barGroupMode} onChange={setBarGroupMode} options={[["group","Side by Side"],["stack","Stacked"]]}/>}
    </div>
    {stats&&(<div style={{display:"flex",gap:10,flexWrap:"wrap"}}>
      {[["n",stats.n,"Count"],["mean",stats.mean,"Mean"],["median",stats.median,"Median"],
        ["std",stats.std,"Std Dev"],["min",stats.min,"Min"],["max",stats.max,"Max"],["sum",stats.sum,"Sum"]].map(([k,v,l])=>(
        <div key={k} style={{padding:"6px 12px",background:T.bgCard,border:"1px solid "+T.border,borderRadius:8,minWidth:70,textAlign:"center"}}>
          <div style={{fontSize:15,fontWeight:800,color:T.text}}>{v}</div>
          <div style={{fontSize:10,color:T.textFaint,fontWeight:600,textTransform:"uppercase",letterSpacing:".05em"}}>{l}</div>
        </div>
      ))}
    </div>)}
    <div ref={plotRef} style={{width:"100%",height:380,background:T.bgCard,borderRadius:12,border:"1px solid "+T.border,overflow:"hidden"}}/>
  </div>);
}

// ── Chart: Crosstab Heatmap ──────────────────────────────────────────────────
function CrosstabChart({data,schema,aliases}){
  const plotRef=React.useRef();
  const catFields=schema.filter(f=>f.type==="categorical"||f.type==="date").map(f=>f.field);
  const [rowField,setRowField]=React.useState(catFields[0]||null);
  const [colField,setColField]=React.useState(catFields[1]||catFields[0]||null);
  const [mode,setMode]=React.useState("pct"); // pct | count

  const {table,rowVals,colVals,chi2p}=React.useMemo(()=>{
    if(!rowField||!colField||rowField===colField) return{table:[],rowVals:[],colVals:[],chi2p:null};
    const rvSet=new Set(),cvSet=new Set();
    data.forEach(r=>{
      const rv=String(r[rowField]??"(blank)"),cv=String(r[colField]??"(blank)");
      rvSet.add(rv);cvSet.add(cv);
    });
    const rv=[...rvSet].sort(),cv=[...cvSet].sort();
    const counts=rv.map(()=>cv.map(()=>0));
    data.forEach(r=>{
      const ri=rv.indexOf(String(r[rowField]??"(blank)"));
      const ci=cv.indexOf(String(r[colField]??"(blank)"));
      if(ri>=0&&ci>=0) counts[ri][ci]++;
    });
    const rowTotals=counts.map(r=>r.reduce((a,b)=>a+b,0));
    const pcts=counts.map((r,ri)=>r.map(c=>rowTotals[ri]>0?Math.round(c/rowTotals[ri]*100):0));
    const p=chi2p||chiSquare(counts);
    return{table:mode==="pct"?pcts:counts,rawCounts:counts,rowVals:rv,colVals:cv,chi2p:p};
  },[data,rowField,colField,mode]);

  const traces=React.useMemo(()=>{
    if(!table.length)return[];
    return[{
      type:"heatmap",
      z:table,
      x:colVals,
      y:rowVals,
      colorscale:[[0,"#fff4ef"],[0.5,T.accent],[1,"#7c2d12"]],
      text:table.map(r=>r.map(v=>mode==="pct"?v+"%":String(v))),
      texttemplate:"%{text}",
      showscale:true,
      hoverongaps:false
    }];
  },[table,rowVals,colVals,mode]);

  const layout=React.useMemo(()=>({
    xaxis:{title:fieldLbl(colField,aliases),tickangle:-30,gridcolor:"transparent"},
    yaxis:{title:fieldLbl(rowField,aliases),gridcolor:"transparent"},
    margin:{t:36,r:80,b:100,l:120}
  }),[rowField,colField,aliases]);

  usePlotly(plotRef, traces, layout, [traces,layout]);

  if(catFields.length<2) return <EmptyChart msg="Need at least 2 categorical fields for a crosstab."/>;

  return(<div style={{display:"flex",flexDirection:"column",gap:16}}>
    <div style={{display:"flex",gap:12,flexWrap:"wrap",alignItems:"flex-end"}}>
      <ChartSelect label="Rows" value={rowField||""} onChange={setRowField} options={catFields.map(f=>({v:f,l:fieldLbl(f,aliases)}))}/>
      <ChartSelect label="Columns" value={colField||""} onChange={setColField} options={catFields.map(f=>({v:f,l:fieldLbl(f,aliases)}))}/>
      <ChartToggle value={mode} onChange={setMode} options={[["pct","% of Row"],["count","Count"]]}/>
    </div>
    {chi2p!==null&&(<div style={{display:"flex",gap:8,alignItems:"center"}}>
      <span style={{fontSize:12,color:T.textMid}}>Chi-square independence test:</span>
      <span style={{fontSize:12,fontWeight:700,color:chi2p<0.05?T.green:T.textMid}}>
        {chi2p<0.001?"p < 0.001":chi2p<0.01?"p < 0.01":chi2p<0.05?"p < 0.05":"p = "+chi2p.toFixed(3)}
      </span>
      <span style={{fontSize:11,color:T.textFaint}}>{chi2p<0.05?"— fields are associated":"— no significant association"}</span>
    </div>)}
    {rowField===colField&&<div style={{fontSize:12,color:T.amber}}>Select two different fields.</div>}
    <div ref={plotRef} style={{width:"100%",height:420,background:T.bgCard,borderRadius:12,border:"1px solid "+T.border,overflow:"hidden"}}/>
  </div>);
}

// ── Chart: Time Series ───────────────────────────────────────────────────────
function TimeSeriesChart({data,schema,aliases,themes}){
  const plotRef=React.useRef();
  const dateFields=schema.filter(f=>f.type==="date").map(f=>f.field);
  const numFields=schema.filter(f=>f.type==="numeric").map(f=>f.field);
  const catFields=schema.filter(f=>f.type==="categorical").map(f=>f.field);
  const [dateField,setDateField]=React.useState(dateFields[0]||null);
  const [valueField,setValueField]=React.useState("count"); // "count" | field name
  const [calcMode,setCalcMode]=React.useState("count"); // count | avg | median | sum | min | max
  const [chartStyle,setChartStyle]=React.useState("line"); // line | bar | area
  const [splitBy,setSplitBy]=React.useState("none");
  const [granularity,setGranularity]=React.useState("month"); // day | month | year

  const dateKey=React.useCallback((r)=>{
    const s=String(r[dateField]||"");
    if(!s||s.length<4)return "";
    if(granularity==="day"){
      // Normalize: YYYY-MM-DD or MM/DD/YYYY -> YYYY-MM-DD
      if(/^\d{4}-\d{2}-\d{2}/.test(s))return s.slice(0,10);
      const d=new Date(s);return isNaN(d)?s.slice(0,10):d.toISOString().slice(0,10);
    }
    if(granularity==="year"){
      if(/^\d{4}/.test(s))return s.slice(0,4);
      const d=new Date(s);return isNaN(d)?s.slice(0,4):String(d.getFullYear());
    }
    // month: return YYYY-MM-01 so Plotly type:date parses correctly
    if(/^\d{4}-\d{2}/.test(s))return s.slice(0,7)+"-01";
    const d=new Date(s);
    if(isNaN(d))return s.slice(0,7)+"-01";
    return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-01";
  },[dateField,granularity]);

  const calcGroupVal=React.useCallback((arr)=>{
    if(!arr||!arr.length)return 0;
    const nums=arr.filter(v=>!isNaN(v));
    if(!nums.length)return 0;
    const s=[...nums].sort((a,b)=>a-b);
    if(calcMode==="count")return arr.length;
    if(calcMode==="avg")return+(nums.reduce((a,b)=>a+b,0)/nums.length).toFixed(2);
    if(calcMode==="median")return s[Math.floor(s.length/2)];
    if(calcMode==="sum")return+nums.reduce((a,b)=>a+b,0).toFixed(2);
    if(calcMode==="min")return s[0];
    if(calcMode==="max")return s[s.length-1];
    return arr.length;
  },[calcMode]);

  const traces=React.useMemo(()=>{
    if(!dateField)return[];
    const isCount=valueField==="count";
    const groups=(splitBy!=="none")?[...new Set(data.map(r=>String(r[splitBy]??"(blank)")))].sort():["_all_"];
    const colors=["#e8622a","#2563eb","#16a34a","#7c3aed","#ea580c","#0d9488","#ca8a04","#a21caf"];
    return groups.map((grp,gi)=>{
      const rows=splitBy!=="none"?data.filter(r=>String(r[splitBy]??"(blank)")===grp):data;
      // Build date buckets
      const buckets={};
      rows.forEach(r=>{
        const dk=dateKey(r);if(!dk||dk.length<4)return;
        if(!buckets[dk])buckets[dk]=[];
        if(isCount){
          buckets[dk].push(1);
        } else {
          const v=parseFloat(r[valueField]);
          if(!isNaN(v))buckets[dk].push(v);
        }
      });
      const dates=Object.keys(buckets).sort();
      const y=dates.map(d=>{
        const vals=buckets[d];
        if(!vals||!vals.length)return 0;
        if(isCount)return vals.length;
        return calcGroupVal(vals);
      });
      const color=colors[gi%colors.length];
      if(chartStyle==="bar"){
        return{type:"bar",name:grp==="_all_"?((valueField==="count"?"Count":"Avg "+fieldLbl(valueField,aliases))):grp,x:dates,y,marker:{color},opacity:0.85};
      }
      const fillStyle=chartStyle==="area"?"tozeroy":"none";
      return{type:"scatter",mode:"lines+markers",name:grp==="_all_"?((valueField==="count"?"Count":"Avg "+fieldLbl(valueField,aliases))):grp,
        x:dates,y,line:{color,width:2.5},marker:{color,size:5},fill:fillStyle,fillcolor:color+"22",connectgaps:true};
    });
  },[data,dateField,valueField,calcMode,chartStyle,splitBy,granularity,dateKey,calcGroupVal,aliases]);

  const yTitle=React.useMemo(()=>{
    if(valueField==="count")return"Count";
    return calcMode.charAt(0).toUpperCase()+calcMode.slice(1)+" of "+fieldLbl(valueField,aliases);
  },[valueField,calcMode,aliases]);

  const layout=React.useMemo(()=>{
    const isDate=chartStyle!=="bar";
    const tickFmt=granularity==="day"?"%b %d %Y":granularity==="year"?"%Y":"%b %Y";
    return{
      barmode:chartStyle==="bar"?"group":"",
      xaxis:{title:fieldLbl(dateField,aliases)||"Date",type:isDate?"date":"category",
        tickformat:isDate?tickFmt:undefined,gridcolor:T.border},
      yaxis:{title:yTitle,gridcolor:T.border,rangemode:"tozero"},
      legend:{orientation:"h",y:-0.25},
      showlegend:splitBy!=="none"
    };
  },[dateField,yTitle,splitBy,chartStyle,granularity,aliases]);

  usePlotly(plotRef, traces, layout, [traces,layout]);

  const numOpts=[{v:"count",l:"Response Count"},...numFields.map(f=>({v:f,l:fieldLbl(f,aliases)}))];
  const calcOpts=[{v:"count",l:"Count"},{v:"avg",l:"Average"},{v:"median",l:"Median"},{v:"sum",l:"Sum"},{v:"min",l:"Min"},{v:"max",l:"Max"}];

  if(!dateFields.length) return <EmptyChart msg="No date fields detected. Set a field type to 'date' in Schema."/>;

  return(<div style={{display:"flex",flexDirection:"column",gap:16}}>
    <div style={{display:"flex",gap:12,flexWrap:"wrap",alignItems:"flex-end"}}>
      <ChartSelect label="Date field" value={dateField||""} onChange={setDateField} options={dateFields.map(f=>({v:f,l:fieldLbl(f,aliases)}))}/>
      <ChartToggle value={granularity} onChange={setGranularity} options={[["day","Day"],["month","Month"],["year","Year"]]}/>
      <ChartSelect label="Value" value={valueField} onChange={v=>{setValueField(v);if(v==="count")setCalcMode("count");}} options={numOpts}/>
      {valueField!=="count"&&<ChartSelect label="Calculate" value={calcMode} onChange={setCalcMode} options={calcOpts.filter(o=>o.v!=="count")}/>}
      <ChartSelect label="Split by" value={splitBy} onChange={setSplitBy} options={[{v:"none",l:"None"},...catFields.map(f=>({v:f,l:fieldLbl(f,aliases)}))]}/>
      <ChartToggle value={chartStyle} onChange={setChartStyle} options={[["line","Line"],["bar","Bar"],["area","Area"]]}/>
    </div>
    <div ref={plotRef} style={{width:"100%",height:400,background:T.bgCard,borderRadius:12,border:"1px solid "+T.border,overflow:"hidden"}}/>
  </div>);
}

// ── Chart: NPS / Score Driver ────────────────────────────────────────────────
function NPSDriverChart({data,schema,aliases,themes}){
  const plotRef=React.useRef();
  // Find likely NPS/score fields (numeric, 0–10 or 0–100 range)
  const scoreFields=schema.filter(f=>{
    if(f.type!=="numeric")return false;
    if(f.field.startsWith("__mapped__"))return true;
    const min=parseFloat(f.min),max=parseFloat(f.max);
    return(!isNaN(min)&&!isNaN(max)&&((min>=0&&max<=10)||(min>=0&&max<=100)));
  }).map(f=>f.field);

  const [scoreField,setScoreField]=React.useState(scoreFields[0]||null);
  const [splitBy,setSplitBy]=React.useState("none");
  const catFields=schema.filter(f=>f.type==="categorical").map(f=>f.field);

  const analysis=React.useMemo(()=>{
    if(!scoreField||!themes||!themes.themes||!themes.fieldName)return null;
    const openField=themes.fieldName;
    const scale=parseFloat(schema.find(f=>f.field===scoreField)?.max)||10;
    const isNPS=scale<=10;

    // Classify rows by score
    const rows=data.filter(r=>{
      const v=parseFloat(r[scoreField]);
      return!isNaN(v)&&String(r[openField]||"").trim().length>0;
    });
    if(rows.length<10)return null;

    const getGroup=v=>{
      if(isNPS){if(v>=9)return"promoter";if(v>=7)return"passive";return"detractor";}
      const pct=v/scale*100;
      if(pct>=70)return"high";if(pct>=40)return"mid";return"low";
    };

    const highLabel=isNPS?"Promoters (9-10)":"High scorers";
    const lowLabel=isNPS?"Detractors (0-6)":"Low scorers";

    const results=themes.themes.map(t=>{
      const hits=rows.filter(r=>commentMatchesTheme(String(r[openField]||""),t));
      const total=rows.length;
      const high=rows.filter(r=>getGroup(parseFloat(r[scoreField]))==="promoter"||getGroup(parseFloat(r[scoreField]))==="high");
      const low=rows.filter(r=>getGroup(parseFloat(r[scoreField]))==="detractor"||getGroup(parseFloat(r[scoreField]))==="low");
      const hitsHigh=high.filter(r=>commentMatchesTheme(String(r[openField]||""),t)).length;
      const hitsLow=low.filter(r=>commentMatchesTheme(String(r[openField]||""),t)).length;
      const pHigh=high.length>0?hitsHigh/high.length:0;
      const pLow=low.length>0?hitsLow/low.length:0;
      const diff=pHigh-pLow; // positive = driver of high scores
      const overallPct=hits.length/total;
      // Avg score for mentioners vs non-mentioners
      const mentionerScores=hits.map(r=>parseFloat(r[scoreField]));
      const nonMentionerScores=rows.filter(r=>!commentMatchesTheme(String(r[openField]||""),t)).map(r=>parseFloat(r[scoreField]));
      const avgMention=mentionerScores.length?mentionerScores.reduce((a,b)=>a+b,0)/mentionerScores.length:0;
      const avgNonMention=nonMentionerScores.length?nonMentionerScores.reduce((a,b)=>a+b,0)/nonMentionerScores.length:0;
      return{id:t.id,name:t.name,diff,pHigh,pLow,overallPct,mentionCount:hits.length,avgMention:+avgMention.toFixed(2),avgNonMention:+avgNonMention.toFixed(2),avgDiff:+(avgMention-avgNonMention).toFixed(2)};
    }).sort((a,b)=>b.avgDiff-a.avgDiff);

    const scale2=parseFloat(schema.find(f=>f.field===scoreField)?.max)||10;
    return{results,isNPS,highLabel,lowLabel,totalRows:rows.length,scale:scale2};
  },[data,scoreField,themes,schema]);

  const traces=React.useMemo(()=>{
    if(!analysis||!analysis.results.length)return[];
    const r=analysis.results;
    const colors=r.map(t=>t.avgDiff>0?T.green:T.red);
    return[{
      type:"bar",orientation:"h",
      x:r.map(t=>t.avgDiff),
      y:r.map(t=>t.name),
      marker:{color:colors},
      text:r.map(t=>(t.avgDiff>0?"+":"")+t.avgDiff),
      textposition:"outside",
      hovertemplate:"<b>%{y}</b><br>Avg score (mentioners): %{customdata[0]}<br>Avg score (others): %{customdata[1]}<br>Difference: %{x}<extra></extra>",
      customdata:r.map(t=>[t.avgMention,t.avgNonMention])
    }];
  },[analysis]);

  const layout=React.useMemo(()=>({
    xaxis:{title:"Score difference (mentioners vs non-mentioners)",zeroline:true,zerolinecolor:T.borderMid,gridcolor:T.border},
    yaxis:{automargin:true,gridcolor:"transparent"},
    margin:{t:36,r:80,b:60,l:180},
    shapes:[{type:"line",x0:0,x1:0,y0:-0.5,y1:(analysis?.results?.length||1)-0.5,line:{color:T.borderMid,width:1.5,dash:"dot"}}]
  }),[analysis]);

  usePlotly(plotRef, traces, layout, [traces,layout]);

  const overallScore=React.useMemo(()=>{
    if(!scoreField)return null;
    const vs=numericVals(data,scoreField);
    return vs.length?(vs.reduce((a,b)=>a+b,0)/vs.length).toFixed(2):null;
  },[data,scoreField]);

  if(!scoreFields.length) return <EmptyChart msg="No score fields detected (numeric 0–10 or 0–100). Check your schema."/>;
  if(!themes||!themes.themes) return <EmptyChart msg="Apply a theme model first — driver analysis compares scores across themes."/>;

  return(<div style={{display:"flex",flexDirection:"column",gap:16}}>
    <div style={{display:"flex",gap:12,flexWrap:"wrap",alignItems:"flex-end"}}>
      <ChartSelect label="Score field" value={scoreField||""} onChange={setScoreField} options={scoreFields.map(f=>({v:f,l:fieldLbl(f,aliases)}))}/>
    </div>

    {overallScore&&(<div style={{display:"flex",gap:10,flexWrap:"wrap"}}>
      <StatChip label="Overall avg score" value={overallScore}/>
      {analysis&&<StatChip label="Responses analysed" value={analysis.totalRows}/>}
      {analysis&&<StatChip label="Themes compared" value={analysis.results.length}/>}
    </div>)}

    {analysis&&(<>
      <p style={{fontSize:12,color:T.textMid,margin:0,lineHeight:1.7}}>
        Bars show the difference in average <strong>{fieldLbl(scoreField,aliases)}</strong> between respondents who mention each theme vs those who don't.
        <span style={{color:T.green,fontWeight:700}}> Green = theme associated with higher scores.</span>
        <span style={{color:T.red,fontWeight:700}}> Red = associated with lower scores.</span>
      </p>
      <div ref={plotRef} style={{width:"100%",height:Math.max(320,analysis.results.length*36+80),background:T.bgCard,borderRadius:12,border:"1px solid "+T.border,overflow:"hidden"}}/>

      {/* Detail table */}
      <div style={{background:T.bgCard,borderRadius:12,border:"1px solid "+T.border,overflow:"hidden"}}>
        <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
          <thead>
            <tr style={{background:T.bg}}>
              {["Theme","Mentions","Avg score (mentions)","Avg score (others)","Difference"].map(h=>(
                <th key={h} style={{padding:"8px 12px",textAlign:"left",fontWeight:700,color:T.textMid,borderBottom:"1px solid "+T.border,whiteSpace:"nowrap"}}>{h}</th>
              ))}
            </tr>
          </thead>
          <tbody>
            {analysis.results.map((r,i)=>(
              <tr key={r.id} style={{background:i%2===0?"transparent":T.bg}}>
                <td style={{padding:"7px 12px",color:T.text,fontWeight:600}}>{r.name}</td>
                <td style={{padding:"7px 12px",color:T.textMid}}>{r.mentionCount} <span style={{color:T.textFaint}}>({Math.round(r.overallPct*100)}%)</span></td>
                <td style={{padding:"7px 12px",color:T.text,fontWeight:600}}>{r.avgMention}</td>
                <td style={{padding:"7px 12px",color:T.textMid}}>{r.avgNonMention}</td>
                <td style={{padding:"7px 12px",fontWeight:700,color:r.avgDiff>0?T.green:r.avgDiff<0?T.red:T.textMid}}>
                  {r.avgDiff>0?"+":""}{r.avgDiff}
                </td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>
    </>)}
  </div>);
}

// ── Chart: Scatter / Bubble ──────────────────────────────────────────────────
function ScatterChart({data,schema,aliases}){
  const plotRef=React.useRef();
  const numFields=schema.filter(f=>f.type==="numeric").map(f=>f.field);
  const catFields=schema.filter(f=>f.type==="categorical").map(f=>f.field);
  const [xField,setXField]=React.useState(numFields[0]||null);
  const [yField,setYField]=React.useState(numFields[1]||numFields[0]||null);
  const [colorBy,setColorBy]=React.useState("none");
  const [sizeBy,setSizeBy]=React.useState("none");

  const traces=React.useMemo(()=>{
    if(!xField||!yField)return[];
    const rows=data.filter(r=>!isNaN(parseFloat(r[xField]))&&!isNaN(parseFloat(r[yField])));
    if(!rows.length)return[];
    if(colorBy!=="none"){
      const groups={};
      rows.forEach(r=>{const k=String(r[colorBy]??"(blank)");if(!groups[k])groups[k]=[];groups[k].push(r);});
      return Object.entries(groups).map(([grp,rs])=>({
        type:"scatter",mode:"markers",name:grp,
        x:rs.map(r=>parseFloat(r[xField])),
        y:rs.map(r=>parseFloat(r[yField])),
        marker:{size:sizeBy!=="none"?rs.map(r=>Math.max(4,Math.min(40,(parseFloat(r[sizeBy])||0)/2))):8,opacity:0.7},
        text:rs.map(r=>Object.entries(r).slice(0,4).map(([k,v])=>k+": "+v).join("<br>")),
        hovertemplate:"%{text}<extra>%{fullData.name}</extra>"
      }));
    }
    return[{
      type:"scatter",mode:"markers",
      x:rows.map(r=>parseFloat(r[xField])),
      y:rows.map(r=>parseFloat(r[yField])),
      marker:{color:T.accent,size:sizeBy!=="none"?rows.map(r=>Math.max(4,Math.min(40,(parseFloat(r[sizeBy])||0)/2))):7,opacity:0.65},
      text:rows.map(r=>Object.entries(r).slice(0,4).map(([k,v])=>k+": "+v).join("<br>")),
      hovertemplate:"%{text}<extra></extra>"
    }];
  },[data,xField,yField,colorBy,sizeBy]);

  // Add trend line for non-grouped
  const trendTrace=React.useMemo(()=>{
    if(colorBy!=="none"||!xField||!yField)return null;
    const rows=data.filter(r=>!isNaN(parseFloat(r[xField]))&&!isNaN(parseFloat(r[yField])));
    if(rows.length<3)return null;
    const xs=rows.map(r=>parseFloat(r[xField])),ys=rows.map(r=>parseFloat(r[yField]));
    const n=xs.length,mx=xs.reduce((a,b)=>a+b,0)/n,my=ys.reduce((a,b)=>a+b,0)/n;
    const ssxy=xs.reduce((s,x,i)=>s+(x-mx)*(ys[i]-my),0),ssxx=xs.reduce((s,x)=>s+(x-mx)**2,0);
    if(!ssxx)return null;
    const slope=ssxy/ssxx,intercept=my-slope*mx;
    const minX=Math.min(...xs),maxX=Math.max(...xs);
    const r2=(()=>{const sstot=ys.reduce((s,y)=>s+(y-my)**2,0);const ssres=xs.reduce((s,x,i)=>s+(ys[i]-(slope*x+intercept))**2,0);return sstot>0?1-ssres/sstot:0;})();
    return{type:"scatter",mode:"lines",name:"Trend (R²="+r2.toFixed(2)+")",x:[minX,maxX],y:[slope*minX+intercept,slope*maxX+intercept],line:{color:T.red,width:2,dash:"dot"},showlegend:true};
  },[data,xField,yField,colorBy]);

  const allTraces=React.useMemo(()=>trendTrace?[...traces,trendTrace]:traces,[traces,trendTrace]);

  const layout=React.useMemo(()=>({
    xaxis:{title:fieldLbl(xField,aliases),gridcolor:T.border},
    yaxis:{title:fieldLbl(yField,aliases),gridcolor:T.border},
    legend:{orientation:"h",y:-0.25},showlegend:colorBy!=="none"||!!trendTrace
  }),[xField,yField,aliases,colorBy,trendTrace]);

  usePlotly(plotRef, allTraces, layout, [allTraces,layout]);

  if(numFields.length<1) return <EmptyChart msg="Need at least one numeric field for a scatter plot."/>;

  return(<div style={{display:"flex",flexDirection:"column",gap:16}}>
    <div style={{display:"flex",gap:12,flexWrap:"wrap",alignItems:"flex-end"}}>
      <ChartSelect label="X axis" value={xField||""} onChange={setXField} options={numFields.map(f=>({v:f,l:fieldLbl(f,aliases)}))}/>
      <ChartSelect label="Y axis" value={yField||""} onChange={setYField} options={numFields.map(f=>({v:f,l:fieldLbl(f,aliases)}))}/>
      <ChartSelect label="Color by" value={colorBy} onChange={setColorBy} options={[{v:"none",l:"None"},...catFields.map(f=>({v:f,l:fieldLbl(f,aliases)}))]}/>
      <ChartSelect label="Size by" value={sizeBy} onChange={setSizeBy} options={[{v:"none",l:"None"},...numFields.map(f=>({v:f,l:fieldLbl(f,aliases)}))]}/>
    </div>
    <div ref={plotRef} style={{width:"100%",height:420,background:T.bgCard,borderRadius:12,border:"1px solid "+T.border,overflow:"hidden"}}/>
  </div>);
}

  return top.concat(rest);
}
function ChartSelect({label,value,onChange,options}){

// ── Chart: Bar / Column ──────────────────────────────────────────────────────
function BarChart({data,schema,aliases}){
  const plotRef=React.useRef();
  const catFields=schema.filter(f=>f.type==="categorical"||f.type==="date").map(f=>f.field);
  const numFields=schema.filter(f=>f.type==="numeric").map(f=>f.field);
  const [catField,setCatField]=React.useState(catFields[0]||null);
  const [measure,setMeasure]=React.useState("count");
  const [groupBy,setGroupBy]=React.useState("none");
  const [orient,setOrient]=React.useState("v"); // v | h
  const [barMode,setBarMode]=React.useState("group"); // group | stack | relative

  const measureOpts=React.useMemo(()=>[
    {v:"count",l:"Count"},
    ...numFields.map(f=>({v:"avg:"+f,l:"Avg "+fieldLbl(f,aliases)})),
    ...numFields.map(f=>({v:"sum:"+f,l:"Sum "+fieldLbl(f,aliases)})),
  ],[numFields,aliases]);

  const agg=(rows,m)=>{
    if(m==="count")return rows.length;
    const [fn,field]=m.split(":");
    const vs=rows.map(r=>parseFloat(r[field])).filter(v=>!isNaN(v));
    if(!vs.length)return 0;
    if(fn==="avg")return+(vs.reduce((a,b)=>a+b,0)/vs.length).toFixed(2);
    return+vs.reduce((a,b)=>a+b,0).toFixed(2);
  };

  const traces=React.useMemo(()=>{
    if(!catField)return[];
    const cats=[...new Set(data.map(r=>String(r[catField]??"(blank)")))].sort();
    if(groupBy==="none"){
      const vals=cats.map(c=>agg(data.filter(r=>String(r[catField]??"(blank)")=== c),measure));
      const base={name:fieldLbl(catField,aliases),marker:{color:T.accent}};
      return orient==="v"
        ?[{...base,type:"bar",x:cats,y:vals}]
        :[{...base,type:"bar",orientation:"h",y:cats,x:vals}];
    }
    const groups=[...new Set(data.map(r=>String(r[groupBy]??"(blank)")))].sort();
    return groups.map(g=>{
      const gRows=data.filter(r=>String(r[groupBy]??"(blank)")=== g);
      const vals=cats.map(c=>agg(gRows.filter(r=>String(r[catField]??"(blank)")=== c),measure));
      return orient==="v"
        ?{type:"bar",name:g,x:cats,y:vals}
        :{type:"bar",orientation:"h",name:g,y:cats,x:vals};
    });
  },[data,catField,measure,groupBy,orient]);

  const layout=React.useMemo(()=>({
    barmode:barMode,
    xaxis:{title:orient==="v"?fieldLbl(catField,aliases):(measureOpts.find(o=>o.v===measure)||{l:measure}).l,gridcolor:T.border,tickangle:orient==="v"?-30:0},
    yaxis:{title:orient==="v"?(measureOpts.find(o=>o.v===measure)||{l:measure}).l:fieldLbl(catField,aliases),gridcolor:T.border},
    legend:{orientation:"h",y:-0.25},showlegend:groupBy!=="none"
  }),[catField,measure,groupBy,orient,barMode,measureOpts,aliases]);

  usePlotly(plotRef,traces,layout,[traces,layout]);

  if(!catFields.length)return <EmptyChart msg="No categorical fields detected."/>;
  return(<div style={{display:"flex",flexDirection:"column",gap:16}}>
    <div style={{display:"flex",gap:12,flexWrap:"wrap",alignItems:"flex-end"}}>
      <ChartSelect label="Category" value={catField||""} onChange={setCatField} options={catFields.map(f=>({v:f,l:fieldLbl(f,aliases)}))}/>
      <ChartSelect label="Measure" value={measure} onChange={setMeasure} options={measureOpts}/>
      <ChartSelect label="Group by" value={groupBy} onChange={setGroupBy} options={[{v:"none",l:"None"},...catFields.filter(f=>f!==catField).map(f=>({v:f,l:fieldLbl(f,aliases)}))]}/>
      <ChartToggle value={orient} onChange={setOrient} options={[["v","Vertical"],["h","Horizontal"]]}/>
      {groupBy!=="none"&&<ChartToggle value={barMode} onChange={setBarMode} options={[["group","Grouped"],["stack","Stacked"],["relative","100%"]]}/>}
    </div>
    <div ref={plotRef} style={{width:"100%",height:400,background:T.bgCard,borderRadius:12,border:"1px solid "+T.border,overflow:"hidden"}}/>
  </div>);
}

// ── Chart: Treemap ───────────────────────────────────────────────────────────
function TreemapChart({data,schema,aliases}){
  const plotRef=React.useRef();
  const catFields=schema.filter(f=>f.type==="categorical").map(f=>f.field);
  const numFields=schema.filter(f=>f.type==="numeric").map(f=>f.field);
  const [catField,setCatField]=React.useState(catFields[0]||null);
  const [parentField,setParentField]=React.useState("none");
  const [measure,setMeasure]=React.useState("count");

  const measureOpts=[{v:"count",l:"Count"},...numFields.map(f=>({v:"avg:"+f,l:"Avg "+fieldLbl(f,aliases)})),...numFields.map(f=>({v:"sum:"+f,l:"Sum "+fieldLbl(f,aliases)}))];
  const agg=(rows,m)=>{
    if(m==="count")return rows.length;
    const [fn,field]=m.split(":");
    const vs=rows.map(r=>parseFloat(r[field])).filter(v=>!isNaN(v));
    if(!vs.length)return 0;
    return+(fn==="avg"?vs.reduce((a,b)=>a+b,0)/vs.length:vs.reduce((a,b)=>a+b,0)).toFixed(2);
  };

  const traces=React.useMemo(()=>{
    if(!catField)return[];
    if(catField===parentField)return[]; // guard: same field selected for both
    try{
      if(parentField==="none"){
        const cats=[...new Set(data.map(r=>String(r[catField]??"(blank)")))].filter(Boolean).sort();
        const vals=cats.map(c=>agg(data.filter(r=>String(r[catField]??"(blank)")===c),measure));
        return[{type:"treemap",labels:cats,parents:cats.map(()=>""),values:vals,
          textinfo:"label+value+percent parent",
          marker:{colorscale:"Blues"},hovertemplate:"<b>%{label}</b><br>%{value}<extra></extra>"}];
      }
      // Two-level hierarchy
      const parentVals=[...new Set(data.map(r=>String(r[parentField]??"(blank)")))].filter(Boolean).sort();
      const labels=[];const ids=[];const parIds=[];const vals=[];
      let rootTotal=0;
      parentVals.forEach(p=>{
        const pRows=data.filter(r=>String(r[parentField]??"(blank)")===p);
        const pVal=agg(pRows,measure);
        rootTotal+=pVal;
        const cats=[...new Set(pRows.map(r=>String(r[catField]??"(blank)")))].filter(Boolean).sort();
        labels.push(p);ids.push("p:"+p);parIds.push("");vals.push(pVal);
        cats.forEach(c=>{
          const cRows=pRows.filter(r=>String(r[catField]??"(blank)")===c);
          labels.push(c);ids.push("p:"+p+"/c:"+c);parIds.push("p:"+p);vals.push(agg(cRows,measure));
        });
      });
      return[{type:"treemap",labels,ids,parents:parIds,values:vals,branchvalues:"remainder",
        textinfo:"label+value+percent root",
        marker:{colorscale:"Blues"},hovertemplate:"<b>%{label}</b><br>%{value}<extra></extra>"}];
    }catch(e){console.error("Treemap error:",e);return[];}
  },[data,catField,parentField,measure]);

  const layout=React.useMemo(()=>({margin:{t:36,r:10,b:10,l:10}}),[]);
  usePlotly(plotRef,traces,layout,[traces,layout]);

  if(!catFields.length)return <EmptyChart msg="No categorical fields detected."/>;
  if(catField&&catField===parentField)return <EmptyChart msg="Parent and Category fields must be different."/>;
  return(<div style={{display:"flex",flexDirection:"column",gap:16}}>
    <div style={{display:"flex",gap:12,flexWrap:"wrap",alignItems:"flex-end"}}>
      <ChartSelect label="Category (leaf)" value={catField||""} onChange={setCatField} options={catFields.map(f=>({v:f,l:fieldLbl(f,aliases)}))}/>
      <ChartSelect label="Parent (optional)" value={parentField} onChange={setParentField} options={[{v:"none",l:"None"},...catFields.filter(f=>f!==catField).map(f=>({v:f,l:fieldLbl(f,aliases)}))]}/>
      <ChartSelect label="Size by" value={measure} onChange={setMeasure} options={measureOpts}/>
    </div>
    <div ref={plotRef} style={{width:"100%",height:440,background:T.bgCard,borderRadius:12,border:"1px solid "+T.border,overflow:"hidden"}}/>
  </div>);
}

// ── Chart: Packed Bubbles ────────────────────────────────────────────────────
function BubbleChart({data,schema,aliases}){
  const plotRef=React.useRef();
  const catFields=schema.filter(f=>f.type==="categorical").map(f=>f.field);
  const numFields=schema.filter(f=>f.type==="numeric").map(f=>f.field);
  const [catField,setCatField]=React.useState(catFields[0]||null);
  const [sizeBy,setSizeBy]=React.useState("count");
  const [colorBy,setColorBy]=React.useState("none");

  const sizeOpts=[{v:"count",l:"Count"},...numFields.map(f=>({v:"avg:"+f,l:"Avg "+fieldLbl(f,aliases)})),...numFields.map(f=>({v:"sum:"+f,l:"Sum "+fieldLbl(f,aliases)}))];
  const agg=(rows,m)=>{
    if(m==="count")return rows.length;
    const [fn,field]=m.split(":");
    const vs=rows.map(r=>parseFloat(r[field])).filter(v=>!isNaN(v));
    if(!vs.length)return 0;
    return+(fn==="avg"?vs.reduce((a,b)=>a+b,0)/vs.length:vs.reduce((a,b)=>a+b,0)).toFixed(2);
  };

  // Packed bubble = scatter with sized markers, jittered positions
  const traces=React.useMemo(()=>{
    if(!catField)return[];
    const cats=[...new Set(data.map(r=>String(r[catField]??"(blank)")))].sort();
    const vals=cats.map(c=>agg(data.filter(r=>String(r[catField]??"(blank)")=== c),sizeBy));
    const maxV=Math.max(...vals,1);
    // Layout as grid of bubbles
    const cols=Math.ceil(Math.sqrt(cats.length));
    const x=cats.map((_,i)=>i%cols);
    const y=cats.map((_,i)=>Math.floor(i/cols));
    const sizes=vals.map(v=>Math.max(20,Math.round((v/maxV)*80)));
    const colorGroups=colorBy!=="none"?[...new Set(data.map(r=>String(r[colorBy]??"(blank)")))]:null;
    const colors=colorGroups
      ?cats.map(c=>{const row=data.find(r=>String(r[catField]??"(blank)")=== c);return colorGroups.indexOf(String(row?.[colorBy]??"(blank)"));})
      :vals;
    return[{type:"scatter",mode:"markers+text",x,y,text:cats.map((c,i)=>c+"<br>"+vals[i]),textposition:"middle center",marker:{size:sizes,sizemode:"diameter",color:colors,colorscale:colorGroups?null:[[0,"#fff4ef"],[0.5,T.accent],[1,"#7c2d12"]],showscale:!colorGroups,colorbar:{thickness:12}},hovertemplate:"<b>%{text}</b><extra></extra>"}];
  },[data,catField,sizeBy,colorBy]);

  const layout=React.useMemo(()=>({
    xaxis:{showgrid:false,zeroline:false,showticklabels:false},
    yaxis:{showgrid:false,zeroline:false,showticklabels:false},
    margin:{t:20,r:60,b:20,l:20},showlegend:false
  }),[]);

  usePlotly(plotRef,traces,layout,[traces,layout]);

  if(!catFields.length)return <EmptyChart msg="No categorical fields detected."/>;
  return(<div style={{display:"flex",flexDirection:"column",gap:16}}>
    <div style={{display:"flex",gap:12,flexWrap:"wrap",alignItems:"flex-end"}}>
      <ChartSelect label="Bubbles" value={catField||""} onChange={setCatField} options={catFields.map(f=>({v:f,l:fieldLbl(f,aliases)}))}/>
      <ChartSelect label="Size by" value={sizeBy} onChange={setSizeBy} options={sizeOpts}/>
      <ChartSelect label="Color by" value={colorBy} onChange={setColorBy} options={[{v:"none",l:"Value (gradient)"},...catFields.filter(f=>f!==catField).map(f=>({v:f,l:fieldLbl(f,aliases)}))]}/>
    </div>
    <div ref={plotRef} style={{width:"100%",height:420,background:T.bgCard,borderRadius:12,border:"1px solid "+T.border,overflow:"hidden"}}/>
  </div>);
}

// ── Chart: Waterfall ─────────────────────────────────────────────────────────
function WaterfallChart({data,schema,aliases}){
  const plotRef=React.useRef();
  const catFields=schema.filter(f=>f.type==="categorical").map(f=>f.field);
  const numFields=schema.filter(f=>f.type==="numeric").map(f=>f.field);
  const [catField,setCatField]=React.useState(catFields[0]||null);
  const [measure,setMeasure]=React.useState(numFields[0]?"avg:"+numFields[0]:"count");
  const [sortMode,setSortMode]=React.useState("value"); // value | alpha

  const measureOpts=[{v:"count",l:"Count"},...numFields.map(f=>({v:"avg:"+f,l:"Avg "+fieldLbl(f,aliases)})),...numFields.map(f=>({v:"sum:"+f,l:"Sum "+fieldLbl(f,aliases)}))];
  const agg=(rows,m)=>{
    if(m==="count")return rows.length;
    const [fn,field]=m.split(":");
    const vs=rows.map(r=>parseFloat(r[field])).filter(v=>!isNaN(v));
    if(!vs.length)return 0;
    return+(fn==="avg"?vs.reduce((a,b)=>a+b,0)/vs.length:vs.reduce((a,b)=>a+b,0)).toFixed(2);
  };

  const traces=React.useMemo(()=>{
    if(!catField)return[];
    let cats=[...new Set(data.map(r=>String(r[catField]??"(blank)")))];
    let vals=cats.map(c=>agg(data.filter(r=>String(r[catField]??"(blank)")=== c),measure));
    // Sort
    const paired=cats.map((c,i)=>({c,v:vals[i]}));
    if(sortMode==="value") paired.sort((a,b)=>b.v-a.v);
    else paired.sort((a,b)=>a.c.localeCompare(b.c));
    cats=paired.map(p=>p.c);vals=paired.map(p=>p.v);
    const total=vals.reduce((a,b)=>a+b,0);
    const measures=vals.map(()=>"relative");
    return[{
      type:"waterfall",
      x:[...cats,"Total"],
      y:[...vals,total],
      measure:[...measures,"total"],
      text:[...vals.map(v=>(v>=0?"+":"")+v.toFixed(1)),"Total: "+total.toFixed(1)],
      textposition:"outside",
      connector:{line:{color:T.borderMid}},
      increasing:{marker:{color:T.green}},
      decreasing:{marker:{color:T.red}},
      totals:{marker:{color:T.accent}}
    }];
  },[data,catField,measure,sortMode]);

  const layout=React.useMemo(()=>({
    xaxis:{title:fieldLbl(catField,aliases),tickangle:-30,gridcolor:T.border},
    yaxis:{title:(measureOpts.find(o=>o.v===measure)||{l:measure}).l,gridcolor:T.border},
    showlegend:false
  }),[catField,measure,aliases,measureOpts]);

  usePlotly(plotRef,traces,layout,[traces,layout]);

  if(!catFields.length)return <EmptyChart msg="No categorical fields detected."/>;
  return(<div style={{display:"flex",flexDirection:"column",gap:16}}>
    <div style={{display:"flex",gap:12,flexWrap:"wrap",alignItems:"flex-end"}}>
      <ChartSelect label="Category" value={catField||""} onChange={setCatField} options={catFields.map(f=>({v:f,l:fieldLbl(f,aliases)}))}/>
      <ChartSelect label="Measure" value={measure} onChange={setMeasure} options={measureOpts}/>
      <ChartToggle value={sortMode} onChange={setSortMode} options={[["value","Sort by value"],["alpha","A–Z"]]}/>
    </div>
    <div ref={plotRef} style={{width:"100%",height:400,background:T.bgCard,borderRadius:12,border:"1px solid "+T.border,overflow:"hidden"}}/>
  </div>);
}

// ── Chart: Bullet / KPI ──────────────────────────────────────────────────────
function BulletChart({data,schema,aliases}){
  const plotRef=React.useRef();
  const numFields=schema.filter(f=>f.type==="numeric").map(f=>f.field);
  const catFields=schema.filter(f=>f.type==="categorical").map(f=>f.field);
  const [measure,setMeasure]=React.useState(numFields[0]||null);
  const [splitBy,setSplitBy]=React.useState("none");

  const stats=React.useMemo(()=>{
    if(!measure)return[];
    const compute=(rows,label)=>{
      const vs=rows.map(r=>parseFloat(r[measure])).filter(v=>!isNaN(v));
      if(!vs.length)return null;
      const sorted=[...vs].sort((a,b)=>a-b);
      const avg=vs.reduce((a,b)=>a+b,0)/vs.length;
      const median=sorted[Math.floor(sorted.length/2)];
      const min=sorted[0],max=sorted[sorted.length-1];
      const p25=sorted[Math.floor(sorted.length*0.25)];
      const p75=sorted[Math.floor(sorted.length*0.75)];
      return{label,avg,median,min,max,p25,p75,n:vs.length};
    };
    if(splitBy==="none") return[compute(data,fieldLbl(measure,aliases))].filter(Boolean);
    const groups=[...new Set(data.map(r=>String(r[splitBy]??"(blank)")))].sort();
    return groups.map(g=>compute(data.filter(r=>String(r[splitBy]??"(blank)")=== g),g)).filter(Boolean);
  },[data,measure,splitBy]);

  const traces=React.useMemo(()=>{
    if(!stats.length)return[];
    const allVs=data.map(r=>parseFloat(r[measure])).filter(v=>!isNaN(v));
    const overall_avg=allVs.length?allVs.reduce((a,b)=>a+b,0)/allVs.length:0;
    const overall_max=allVs.length?Math.max(...allVs):0;
    return stats.map((s,i)=>({
      type:"indicator",
      mode:"number+gauge+delta",
      value:+s.avg.toFixed(2),
      delta:{reference:overall_avg,valueformat:".2f"},
      gauge:{
        axis:{range:[s.min,s.max]},
        bar:{color:T.accent,thickness:0.4},
        steps:[
          {range:[s.min,s.p25],color:"#fee2e2"},
          {range:[s.p25,s.p75],color:T.accentBg},
          {range:[s.p75,s.max],color:T.greenBg},
        ],
        threshold:{line:{color:T.green,width:3},thickness:0.8,value:s.p75}
      },
      title:{text:s.label+"<br><sub>n="+s.n+" · median "+s.median.toFixed(1)+"</sub>"},
      domain:{row:i,column:0}
    }));
  },[stats,data,measure]);

  const layout=React.useMemo(()=>({
    grid:{rows:Math.max(1,stats.length),columns:1,pattern:"independent"},
    height:Math.max(200,stats.length*180),
    margin:{t:40,r:40,b:40,l:40}
  }),[stats]);

  usePlotly(plotRef,traces,layout,[traces,layout]);

  if(!numFields.length)return <EmptyChart msg="No numeric fields detected."/>;
  return(<div style={{display:"flex",flexDirection:"column",gap:16}}>
    <div style={{display:"flex",gap:12,flexWrap:"wrap",alignItems:"flex-end"}}>
      <ChartSelect label="Measure" value={measure||""} onChange={setMeasure} options={numFields.map(f=>({v:f,l:fieldLbl(f,aliases)}))}/>
      <ChartSelect label="Split by" value={splitBy} onChange={setSplitBy} options={[{v:"none",l:"Overall"},...catFields.map(f=>({v:f,l:fieldLbl(f,aliases)}))]}/>
    </div>
    <p style={{fontSize:12,color:T.textMid,margin:0}}>Gauge shows average value. Bands: <span style={{color:T.red,fontWeight:600}}>red = bottom quartile</span>, <span style={{color:T.accent,fontWeight:600}}>orange = interquartile range</span>, <span style={{color:T.green,fontWeight:600}}>green = top quartile</span>. Delta vs overall average.</p>
    <div ref={plotRef} style={{width:"100%",background:T.bgCard,borderRadius:12,border:"1px solid "+T.border,overflow:"hidden"}}/>
  </div>);
}

// ── Chart: Funnel ────────────────────────────────────────────────────────────
function FunnelChart({data,schema,aliases}){
  const plotRef=React.useRef();
  const catFields=schema.filter(f=>f.type==="categorical").map(f=>f.field);
  const numFields=schema.filter(f=>f.type==="numeric").map(f=>f.field);
  const [catField,setCatField]=React.useState(catFields[0]||null);
  const [measure,setMeasure]=React.useState("count");
  const [sortMode,setSortMode]=React.useState("desc");

  const measureOpts=[{v:"count",l:"Count"},...numFields.map(f=>({v:"sum:"+f,l:"Sum "+fieldLbl(f,aliases)}))];
  const agg=(rows,m)=>{
    if(m==="count")return rows.length;
    const [,field]=m.split(":");
    const vs=rows.map(r=>parseFloat(r[field])).filter(v=>!isNaN(v));
    return vs.reduce((a,b)=>a+b,0);
  };

  const traces=React.useMemo(()=>{
    if(!catField)return[];
    let cats=[...new Set(data.map(r=>String(r[catField]??"(blank)")))];
    let vals=cats.map(c=>agg(data.filter(r=>String(r[catField]??"(blank)")=== c),measure));
    const paired=cats.map((c,i)=>({c,v:vals[i]})).sort((a,b)=>sortMode==="desc"?b.v-a.v:a.v-b.v);
    return[{
      type:"funnel",
      y:paired.map(p=>p.c),
      x:paired.map(p=>p.v),
      textinfo:"value+percent initial",
      marker:{color:paired.map((_,i)=>`hsl(${20+i*25},75%,${55-i*3}%)`)}
    }];
  },[data,catField,measure,sortMode]);

  const layout=React.useMemo(()=>({
    funnelmode:"stack",
    margin:{t:20,r:20,b:40,l:140}
  }),[]);

  usePlotly(plotRef,traces,layout,[traces,layout]);

  if(!catFields.length)return <EmptyChart msg="No categorical fields detected."/>;
  return(<div style={{display:"flex",flexDirection:"column",gap:16}}>
    <div style={{display:"flex",gap:12,flexWrap:"wrap",alignItems:"flex-end"}}>
      <ChartSelect label="Category" value={catField||""} onChange={setCatField} options={catFields.map(f=>({v:f,l:fieldLbl(f,aliases)}))}/>
      <ChartSelect label="Measure" value={measure} onChange={setMeasure} options={measureOpts}/>
      <ChartToggle value={sortMode} onChange={setSortMode} options={[["desc","Largest first"],["asc","Smallest first"]]}/>
    </div>
    <div ref={plotRef} style={{width:"100%",height:420,background:T.bgCard,borderRadius:12,border:"1px solid "+T.border,overflow:"hidden"}}/>
  </div>);
}

// ── Chart: Gantt / Range ─────────────────────────────────────────────────────
function GanttChart({data,schema,aliases}){
  const plotRef=React.useRef();
  const catFields=schema.filter(f=>f.type==="categorical").map(f=>f.field);
  const dateFields=schema.filter(f=>f.type==="date").map(f=>f.field);
  const numFields=schema.filter(f=>f.type==="numeric").map(f=>f.field);
  const [catField,setCatField]=React.useState(catFields[0]||null);
  const [dateField,setDateField]=React.useState(dateFields[0]||null);
  const [colorBy,setColorBy]=React.useState("none");

  // For date fields: min/max date per category = Gantt bars
  // For numeric fields: show range (min to max) per category
  const [rangeField,setRangeField]=React.useState(dateFields[0]||numFields[0]||null);
  const useDate=dateFields.includes(rangeField);

  const traces=React.useMemo(()=>{
    if(!catField||!rangeField)return[];
    const cats=[...new Set(data.map(r=>String(r[catField]??"(blank)")))].sort();
    const colorGroups=colorBy!=="none"?[...new Set(data.map(r=>String(r[colorBy]??"(blank)")))].sort():null;
    const palette=[T.accent,"#3b82f6","#10b981","#f59e0b","#8b5cf6","#ec4899","#06b6d4","#84cc16"];
    if(useDate){
      return cats.map((c,i)=>{
        const rows=data.filter(r=>String(r[catField]??"(blank)")=== c);
        const dates=rows.map(r=>r[rangeField]).filter(Boolean).sort();
        if(!dates.length)return null;
        const col=colorGroups?palette[colorGroups.indexOf(String(data.find(r=>String(r[catField]??"(blank)")=== c)?.[colorBy]??"(blank)"))%palette.length]:palette[i%palette.length];
        return{type:"bar",orientation:"h",name:c,y:[c],x:[1],base:[dates[0]],marker:{color:col},hovertemplate:"<b>"+c+"</b><br>"+dates[0]+" → "+dates[dates.length-1]+"<extra></extra>"};
      }).filter(Boolean);
    }
    // Numeric range bars
    return cats.map((c,i)=>{
      const rows=data.filter(r=>String(r[catField]??"(blank)")=== c);
      const vs=rows.map(r=>parseFloat(r[rangeField])).filter(v=>!isNaN(v));
      if(!vs.length)return null;
      const mn=Math.min(...vs),mx=Math.max(...vs),med=vs.sort((a,b)=>a-b)[Math.floor(vs.length/2)];
      const col=colorGroups?palette[colorGroups.indexOf(String(data.find(r=>String(r[catField]??"(blank)")=== c)?.[colorBy]??"(blank)"))%palette.length]:T.accent;
      return{type:"bar",orientation:"h",name:c,y:[c],x:[mx-mn],base:[mn],marker:{color:col,opacity:0.75},hovertemplate:"<b>"+c+"</b><br>Min: "+mn.toFixed(1)+" · Median: "+med.toFixed(1)+" · Max: "+mx.toFixed(1)+"<extra></extra>"};
    }).filter(Boolean);
  },[data,catField,rangeField,colorBy,useDate]);

  const layout=React.useMemo(()=>({
    barmode:"overlay",
    xaxis:{type:useDate?"date":"linear",title:fieldLbl(rangeField,aliases),gridcolor:T.border},
    yaxis:{automargin:true,gridcolor:"transparent"},
    showlegend:false,
    margin:{t:30,r:30,b:60,l:150}
  }),[rangeField,aliases,useDate]);

  usePlotly(plotRef,traces,layout,[traces,layout]);

  const rangeOpts=[...dateFields,...numFields].map(f=>({v:f,l:fieldLbl(f,aliases)}));
  if(!catFields.length||!rangeOpts.length)return <EmptyChart msg="Need a categorical field and at least one date or numeric field."/>;
  return(<div style={{display:"flex",flexDirection:"column",gap:16}}>
    <div style={{display:"flex",gap:12,flexWrap:"wrap",alignItems:"flex-end"}}>
      <ChartSelect label="Rows (category)" value={catField||""} onChange={setCatField} options={catFields.map(f=>({v:f,l:fieldLbl(f,aliases)}))}/>
      <ChartSelect label="Range field" value={rangeField||""} onChange={setRangeField} options={rangeOpts}/>
      <ChartSelect label="Color by" value={colorBy} onChange={setColorBy} options={[{v:"none",l:"None"},...catFields.filter(f=>f!==catField).map(f=>({v:f,l:fieldLbl(f,aliases)}))]}/>
    </div>
    <div ref={plotRef} style={{width:"100%",height:Math.max(300,[...new Set(data.map(r=>r[catField]))].length*32+80),background:T.bgCard,borderRadius:12,border:"1px solid "+T.border,overflow:"hidden"}}/>
  </div>);
}
