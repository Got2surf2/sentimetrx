function sampleSize95(N){const Z=1.96,p=.5,e=.05,n0=(Z*Z*p*(1-p))/(e*e);return N<=n0?N:Math.ceil(n0*N/(n0+N-1));}
function evenSample(arr,n){if(arr.length<=n)return arr;const step=arr.length/n;return Array.from({length:n},(_,i)=>arr[Math.floor(i*step)]);}

const STORAGE_KEY="textmine_claude_api_key";
const STORAGE_AI_ON="textmine_ai_enabled";
const STORAGE_AI_MODE="textmine_ai_mode"; // "auto" | "demand"
function getApiKey(){try{return localStorage.getItem(STORAGE_KEY)||"";}catch{return "";}}
function saveApiKey(k){try{localStorage.setItem(STORAGE_KEY,k.trim());}catch{}}
function clearApiKey(){try{localStorage.removeItem(STORAGE_KEY);}catch{}}
function getAiEnabled(){try{const v=localStorage.getItem(STORAGE_AI_ON);return v===null?true:v==="1";}catch{return true;}}
function setAiEnabled(on){try{localStorage.setItem(STORAGE_AI_ON,on?"1":"0");}catch{}}
function getAiMode(){try{return localStorage.getItem(STORAGE_AI_MODE)||"auto";}catch{return"auto";}}
function setAiMode(m){try{localStorage.setItem(STORAGE_AI_MODE,m);}catch{}}

async function callClaude(userMessage,systemPrompt,timeoutMs=55000){
  const apiKey=getApiKey();
  if(!apiKey)throw new Error("NO_API_KEY");
  let response,data;
  const controller=new AbortController();
  const timer=setTimeout(()=>controller.abort(),timeoutMs);
  try{
    response=await fetch("https://api.anthropic.com/v1/messages",{
      method:"POST",
      signal:controller.signal,
      headers:{
        "Content-Type":"application/json",
        "x-api-key":apiKey,
        "anthropic-version":"2023-06-01",
        "anthropic-dangerous-direct-browser-access":"true"
      },
      body:JSON.stringify({model:CLAUDE_MODEL,max_tokens:4000,system:systemPrompt,messages:[{role:"user",content:userMessage}]})
    });
    data=await response.json();
  }catch(e){
    clearTimeout(timer);
    if(e.message==="NO_API_KEY")throw e;
    if(e.name==="AbortError")throw new Error("TIMEOUT_ERROR");
    throw new Error("NETWORK_ERROR: "+e.message);
  }
  clearTimeout(timer);
  if(!response.ok||data.error){
    const msg=data?.error?.message||"";
    const status=response.status;
    if(status===401)throw new Error("AUTH_ERROR: "+msg);
    if(status===429||msg.toLowerCase().includes("credit")||msg.toLowerCase().includes("quota"))throw new Error("QUOTA_ERROR: "+msg);
    throw new Error("API "+status+": "+msg.slice(0,200));
  }
  if(!data.content||!data.content.length)throw new Error("Empty response. stop_reason="+data.stop_reason);
  return data.content.map(b=>b.text||"").join("");
}

function parseDate(s){
  if(!s||typeof s!=="string")return null;
  s=s.trim().replace(/[T ](\d{1,2}:\d{2}.*)?$/,"").trim();
  let m=s.match(/^(\d{4})[-/](\d{1,2})[-/](\d{1,2})$/);
  if(m)return new Date(+m[1],+m[2]-1,+m[3]);
  m=s.match(/^(\d{1,2})[-/](\d{1,2})[-/](\d{4})$/);
  if(m)return new Date(+m[3],+m[1]-1,+m[2]);
  m=s.match(/^(\d{4})[-/](\d{1,2})$/);
  if(m)return new Date(+m[1],+m[2]-1,1);
  const d=new Date(s);
  return isNaN(d.getTime())?null:d;
}

  return [...vals].sort((a,b)=>{
    const da=parseDate(a),db=parseDate(b);
    if(da&&db)return da-db;
    return a.localeCompare(b);
  });

// ── Age / Generation derivation ──────────────────────────────────────────────
function ageToGroup(age){
  const n=parseInt(age);if(isNaN(n))return null;
  if(n<18)return"Under 18";if(n<=24)return"18–24";if(n<=34)return"25–34";
  if(n<=44)return"35–44";if(n<=54)return"45–54";if(n<=64)return"55–64";
  return"65+";
}
function yobToGeneration(yob){
  const n=parseInt(yob);if(isNaN(n))return null;
  if(n>=2013)return"Gen Alpha (2013+)";
  if(n>=1997)return"Gen Z (1997–2012)";
  if(n>=1981)return"Millennials (1981–1996)";
  if(n>=1965)return"Gen X (1965–1980)";
  if(n>=1946)return"Boomers (1946–1964)";
  return"Silent Gen (pre-1946)";
}
const AGE_GROUP_ORDER=["Under 18","18–24","25–34","35–44","45–54","55–64","65+"];
const GEN_ORDER=["Silent Gen (pre-1946)","Boomers (1946–1964)","Gen X (1965–1980)","Millennials (1981–1996)","Gen Z (1997–2012)","Gen Alpha (2013+)"];
// Detect if a field looks like Age or Year of Birth
function detectAgeField(fieldName,schema){
  const f=schema.find(s=>s.field===fieldName);
  if(!f||f.type!=="numeric")return null;
  const lname=fieldName.toLowerCase();
  if(/\bage\b|^age$/.test(lname)&&f.min>=0&&f.max<=120)return"age";
  if(/(year.?of.?birth|yob|birth.?year|born)/i.test(lname)&&f.min>=1900&&f.max<=2030)return"yob";
  return null;
}
// Apply derived fields to a row array
function applyDerivedFields(rows,derivedFields){
  // derivedFields: [{sourceField, derivedField, type:"age"|"yob"}]
  if(!derivedFields||!derivedFields.length)return rows;
  return rows.map(r=>{
    const extra={};
    derivedFields.forEach(({sourceField,derivedField,type})=>{
      const val=r[sourceField];
      extra[derivedField]=type==="age"?ageToGroup(val):yobToGeneration(val);
    });
    return{...r,...extra};
  });
}


// ── Categorical value mapping ────────────────────────────────────────────────
function applyMappedFields(rows,catValueMaps){
  if(!catValueMaps||!Object.keys(catValueMaps).length)return rows;
  const numFlds=Object.entries(catValueMaps).filter(([,c])=>c.mode==="numeric"&&Object.keys(c.map||{}).length>0);
  if(!numFlds.length)return rows;
  return rows.map(r=>{
    const extra={};
    numFlds.forEach(([field,cfg])=>{
      const raw=r[field];
      const mapped=(cfg.map||{})[String(raw==null?'':raw)];
      extra['__mapped__'+field]=(mapped!=null&&mapped!=='')?Number(mapped):null;
    });
    return{...r,...extra};
  });
}
function buildMappedSchema(schema,catValueMaps){
  if(!catValueMaps)return schema;
  const extras=[];
  Object.entries(catValueMaps).forEach(([field,cfg])=>{
    if(cfg.mode!=="numeric")return;
    const nums=Object.values(cfg.map||{}).map(Number).filter(v=>!isNaN(v));
    if(!nums.length)return;
    const base=schema.find(f=>f.field===field)||{};
    extras.push({field:'__mapped__'+field,type:'numeric',_mappedFrom:field,
      min:Math.min(...nums),max:Math.max(...nums),
      avg:(nums.reduce((a,b)=>a+b,0)/nums.length).toFixed(1),
      nonNullCount:base.nonNullCount||0});
  });
  return[...schema,...extras];
}

// ── Global filter apply ───────────────────────────────────────────────────────
// filters: {[field]: {type:"cat"|"range", values:Set|[min,max]}}
function applyFilters(rows,filters){
  if(!filters||!Object.keys(filters).length)return rows;
  return rows.filter(r=>{
    return Object.entries(filters).every(([field,f])=>{
      const val=r[field];
      if(f.type==="cat"){
        const str=(val==null||String(val).trim()==="")?"(blank)":String(val);
        if(str==="(blank)"&&f.excludeBlanks)return false;
        return f.values.has(str);
      }
      if(f.type==="range"){
        const n=parseFloat(val);
        if(isNaN(n)){
          // blank handling: if excludeBlanks, filter out
          return f.includeBlanks!==false;
        }
        return n>=f.values[0]&&n<=f.values[1];
      }
      if(f.type==="daterange"){
        if(val==null||String(val).trim()==="")return f.includeBlanks!==false;
        const d=parseDate(String(val));
        if(!d)return f.includeBlanks!==false;
        const ts=d.getTime();
        return ts>=f.values[0]&&ts<=f.values[1];
      }
      return true;
    });
  });
}
// Build human-readable filter label for breadcrumbs
function filterLabel(filters,columnAliases){
  if(!filters||!Object.keys(filters).length)return"";
  return Object.entries(filters).map(([field,f])=>{
    const label=(columnAliases&&columnAliases[field])||field;
    if(f.type==="cat"){
      const vals=[...f.values];
      if(vals.length===1)return label+": "+vals[0];
      if(vals.length<=3)return label+": "+vals.join(", ");
      return label+": "+vals.length+" values";
    }
    if(f.type==="range")return label+": "+f.values[0]+"–"+f.values[1];
    if(f.type==="daterange"){const fmt=(ts)=>{const d=new Date(ts);return(d.getMonth()+1)+"/"+d.getDate()+"/"+d.getFullYear();};return label+": "+fmt(f.values[0])+"–"+fmt(f.values[1]);}
    return label;
  }).join(" · ");
}

function sentBg(s){return{positive:T.greenBg,negative:T.redBg,mixed:T.amberBg,neutral:"#f9fafb",similar:T.purpleBg,different:"#fff7ed"}[s]||"#f9fafb";}

// ─────────────────────────────────────────────────────────────────────────────
// WORD CLOUD
// ─────────────────────────────────────────────────────────────────────────────
function WordCloud({themes,themeColors,parsedData,activeField,onWordClick}){
  const [cloudMode,setCloudMode]=useState("grouped");
  // Frequency mode interactive state
  const [activeThemes,setActiveThemes]=useState(null); // null = all on; Set of active themeIdx
  const [hoveredTheme,setHoveredTheme]=useState(null); // themeIdx being hovered, or null
  const toggleTheme=(idx)=>setActiveThemes(prev=>{
    const all=new Set(themes.map((_,i)=>i));
    const cur=prev||all;
    const n=new Set(cur);
    if(n.has(idx)){if(n.size===1)return all; n.delete(idx);}
    else n.add(idx);
    return n.size===all.size?null:n;
  });
  if(!themes||!themes.length||!activeField)return null;
  const allText=parsedData.map(r=>String(r[activeField]||"").toLowerCase()).join(" ");
  const stopWords=new Set(["the","a","an","and","or","but","in","on","at","to","for","of","with","by","from","is","was","are","were","be","been","has","have","had","do","did","does","i","we","you","they","it","this","that","my","our","your","their","its","not","no","so","as","if","can","will","just","get","got","more","very","also","out","up","about","what","how","all","one","new","when","would","could","should","than","then","even","still","use","used","using","us","me","him","her","them","there","need","want","really","after","before","which","who","where","into","too","most","any","some","much","make","made","way","well","good","great","like","time","day","year","now","long","since","back","over","go","going","always","never","ever","only","other","another","each","few","many","both","between","during","while","through","without","within","against","along","because","due","per","own","off","such","here","same"]);
  const wordThemeMap={};
  themes.forEach((t,idx)=>{(t.keywords||[]).forEach(kw=>{if(!wordThemeMap[kw.toLowerCase()])wordThemeMap[kw.toLowerCase()]={themeIdx:idx,freq:0};});});
  Object.keys(wordThemeMap).forEach(w=>{const re=new RegExp("\\b"+w.replace(/[.*+?^${}()|[\]\\]/g,"\\$&")+"\\b","gi");wordThemeMap[w].freq=(allText.match(re)||[]).length;});
  const rawWords=allText.split(/\W+/).filter(w=>w.length>3&&!stopWords.has(w));
  const freqMap={};rawWords.forEach(w=>{freqMap[w]=(freqMap[w]||0)+1;});
  const allWords=Object.entries(wordThemeMap).filter(([,v])=>v.freq>0).map(([w,v])=>({word:w,freq:v.freq,themeIdx:v.themeIdx}));
  const covered=new Set(Object.keys(wordThemeMap));
  Object.entries(freqMap).sort((a,b)=>b[1]-a[1]).slice(0,20).forEach(([w,f])=>{if(!covered.has(w)&&f>0)allWords.push({word:w,freq:f,themeIdx:-1});});
  if(!allWords.length)return null;
  const maxFreq=Math.max(...allWords.map(w=>w.freq),1);
  const Word=({word,freq,themeIdx,dimmed})=>{
    const pal=(!dimmed&&themeIdx>=0)?(themeColors[themeIdx]||THEME_PALETTE[0]):null;
    const size=12+Math.round((freq/maxFreq)*20);
    const weight=freq>maxFreq*.6?800:freq>maxFreq*.3?700:500;
    return(<span title={`"${word}" — ${freq} mention${freq!==1?"s":""}${themeIdx>=0?" · "+themes[themeIdx].name:" · unthemed"} — click to view`}
      onClick={()=>onWordClick&&onWordClick(word,themeIdx)}
      style={{fontSize:size,fontWeight:weight,
        color:dimmed?"#6b7280":(pal?pal.text:T.textMute),
        background:dimmed?"transparent":(pal?pal.bg:"transparent"),
        padding:pal&&!dimmed?"3px 8px":"3px 2px",
        borderRadius:pal&&!dimmed?5:0,
        border:pal&&!dimmed?"1px solid "+pal.border+"50":"none",
        cursor:"pointer",transition:"opacity .15s,transform .12s,color .15s,background .15s",
        display:"inline-block",lineHeight:1.4,opacity:dimmed?0.65:1}}
      onMouseEnter={e=>{if(!dimmed){e.currentTarget.style.opacity=".7";e.currentTarget.style.transform="scale(1.06)";}}}
      onMouseLeave={e=>{e.currentTarget.style.opacity=dimmed?"0.35":"1";e.currentTarget.style.transform="scale(1)";}}
    >{word}</span>);
  };
  return(<Card style={{padding:"18px 20px",marginBottom:20}}>
    <div style={{display:"flex",alignItems:"center",marginBottom:14,gap:10}}>
      <div style={{flex:1}}><div style={{fontSize:11,fontWeight:700,color:T.textFaint,letterSpacing:".08em",textTransform:"uppercase"}}>Word Cloud</div><div style={{fontSize:11,color:T.textMute,marginTop:2}}>Click any word to see matching comments</div></div>
      <div style={{display:"flex",background:T.bg,borderRadius:20,padding:2,border:"1px solid "+T.border}}>
        {[["freq","Frequency"],["grouped","By Theme"]].map(([m,label])=>(
          <button key={m} onClick={()=>setCloudMode(m)} style={{fontSize:11,fontWeight:cloudMode===m?700:500,padding:"4px 12px",borderRadius:18,background:cloudMode===m?T.accent:"transparent",color:cloudMode===m?"white":T.textMute,border:"none",cursor:"pointer",transition:"background .15s"}}>{label}</button>
        ))}
      </div>
    </div>
    {cloudMode==="freq"&&(()=>{
      const total=parsedData.filter(r=>String(r[activeField]||"").trim().length>0).length;
      const allOn=activeThemes===null;
      const sortedThemes=[...themes].sort((a,b)=>b.count-a.count);
      const sortedByOrig=sortedThemes.map(t=>({t,idx:themes.indexOf(t)}));
      return(<div>
        {/* Interactive theme selector — top */}
        <div style={{display:"flex",flexWrap:"wrap",gap:"6px 8px",alignItems:"center",marginBottom:14,paddingBottom:14,borderBottom:"1px solid "+T.border}}>
          <span style={{fontSize:10,fontWeight:700,color:T.textFaint,textTransform:"uppercase",letterSpacing:".07em",flexShrink:0,marginRight:2}}>Themes:</span>
          {!allOn&&<button onClick={()=>setActiveThemes(null)} style={{fontSize:10,fontWeight:600,padding:"2px 8px",borderRadius:8,background:T.bg,color:T.accent,border:"1px solid "+T.accentMid,cursor:"pointer"}}>Show all</button>}
          {sortedByOrig.map(({t,idx})=>{
            const pal=themeColors[idx]||THEME_PALETTE[0];
            const pct=total>0?Math.round(t.count/total*100):0;
            const isOn=activeThemes===null||activeThemes.has(idx);
            const isHovered=hoveredTheme===idx;
            return(<button key={t.id}
              onClick={()=>toggleTheme(idx)}
              onMouseEnter={()=>setHoveredTheme(idx)}
              onMouseLeave={()=>setHoveredTheme(null)}
              style={{display:"inline-flex",alignItems:"center",gap:5,fontSize:11,fontWeight:isOn?700:500,
                padding:"4px 10px",borderRadius:10,cursor:"pointer",transition:"all .15s",
                background:isOn?(isHovered?pal.border:pal.bg):"#f3f4f6",
                color:isOn?(isHovered?"white":pal.text):"#9ca3af",
                border:"1px solid "+(isOn?pal.border+"80":"#e5e7eb"),
                opacity:isOn?1:0.6,
                boxShadow:isHovered&&isOn?"0 2px 8px "+pal.border+"40":"none",
              }}>
              <span style={{width:7,height:7,borderRadius:"50%",background:isOn?pal.border:"#d1d5db",flexShrink:0,transition:"background .15s"}}/>
              {t.name}
              <span style={{fontSize:10,opacity:isOn?0.75:0.5,fontWeight:600}}>{pct}%</span>
            </button>);
          })}
        </div>
        {/* Word cloud — words dim based on toggle/hover */}
        <div style={{display:"flex",flexWrap:"wrap",gap:"8px 10px",alignItems:"baseline",lineHeight:1.6}}>
          {[...allWords].sort((a,b)=>b.freq-a.freq).map(w=>{
            let dimmed=false;
            if(hoveredTheme!==null){dimmed=w.themeIdx!==hoveredTheme;}
            else if(activeThemes!==null){dimmed=w.themeIdx>=0&&!activeThemes.has(w.themeIdx);}
            return <Word key={w.word} {...w} dimmed={dimmed}/>;
          })}
        </div>
      </div>);
    })()}
    {cloudMode==="grouped"&&<div style={{display:"flex",flexDirection:"column",gap:16}}>
      {[...themes].sort((a,b)=>b.count-a.count).map((t)=>{const idx=themes.indexOf(t);const pal=themeColors[idx]||THEME_PALETTE[0];const tWords=allWords.filter(w=>w.themeIdx===idx).sort((a,b)=>b.freq-a.freq);if(!tWords.length)return null;const total=parsedData.filter(r=>String(r[activeField]||"").trim().length>0).length;const pct=total>0?Math.round(t.count/total*100):0;return(<div key={t.id} style={{display:"flex",gap:0,alignItems:"flex-start"}}>
        <div style={{flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center",width:36,marginRight:8,alignSelf:"stretch",minHeight:24}}>
          <span style={{fontSize:10,fontWeight:700,color:pal.text,background:pal.bg,border:"1px solid "+pal.border+"70",borderRadius:5,padding:"2px 4px",whiteSpace:"nowrap",lineHeight:1.3}}>{pct}%</span>
        </div>
        <div style={{flexShrink:0,width:6,borderRadius:3,background:pal.border,alignSelf:"stretch",minHeight:24,marginRight:12}}/>
        <div style={{flex:1}}>
          <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8}}>
            <span style={{fontSize:11,fontWeight:700,color:pal.text}}>{t.name}</span>
            <button onClick={()=>onWordClick&&onWordClick(null,idx,"theme")}
              style={{fontSize:10,fontWeight:600,padding:"2px 8px",borderRadius:10,background:pal.bg,color:pal.text,border:"1px solid "+pal.border+"50",cursor:"pointer"}}>
              View all {t.count>0?t.count+" ":""}comments →
            </button>
          </div>
          <div style={{display:"flex",flexWrap:"wrap",gap:"6px 8px",alignItems:"baseline"}}>{tWords.map(w=><Word key={w.word} {...w}/>)}</div>
        </div>
      </div>);})}
      {(()=>{const u=allWords.filter(w=>w.themeIdx===-1).sort((a,b)=>b.freq-a.freq);return u.length>0&&(<div style={{display:"flex",gap:12,alignItems:"flex-start"}}><div style={{flexShrink:0,width:6,borderRadius:3,background:T.borderMid,alignSelf:"stretch",minHeight:24}}/><div style={{flex:1}}><div style={{fontSize:11,fontWeight:700,color:T.textFaint,marginBottom:6}}>Other</div><div style={{display:"flex",flexWrap:"wrap",gap:"6px 8px",alignItems:"baseline"}}>{u.map(w=><Word key={w.word} {...w}/>)}</div></div></div>);})()}
    </div>}
  </Card>);
}

// ─────────────────────────────────────────────────────────────────────────────
// SAMPLING CONTROL  (sidebar widget)
// ─────────────────────────────────────────────────────────────────────────────
function SamplingControl({samplePct,setSamplePct,parsedData,activeField,lastRunPct,onRerun,themeSource}){
  const total=activeField?parsedData.filter(r=>String(r[activeField]||"").trim().length>0).length:parsedData.length;
  const defaultN=sampleSize95(total);
  const defaultPct=total>0?Math.round(defaultN/total*100):100;
  const isDefault=samplePct===0;
  const activePct=isDefault?defaultPct:samplePct;
  const effectiveN=Math.max(1,Math.round(total*(activePct/100)));
  const moe=effectiveN>0?Math.round(196*Math.sqrt(0.25/effectiveN))/100:0.5;
  const [inputVal,setInputVal]=useState("");
  const commitInput=()=>{
    const n=parseInt(inputVal,10);
    if(!isNaN(n)&&n>=1&&n<=total){const pct=Math.round(n/total*100);setSamplePct(pct===defaultPct?0:pct);}
    setInputVal("");
  };
  return(<div style={{marginTop:4}}>
    <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:6}}>
      <span style={{fontSize:10,fontWeight:700,color:T.textFaint,letterSpacing:".08em",textTransform:"uppercase"}}>Claude AI Discovery Sample</span>
      {!isDefault&&<button onClick={()=>setSamplePct(0)} style={{fontSize:10,fontWeight:600,padding:"1px 8px",borderRadius:10,background:T.accentBg,color:T.accent,border:"1px solid "+T.accentMid,cursor:"pointer"}}>↺ Reset to default</button>}
      {isDefault&&<span style={{fontSize:10,fontWeight:600,color:T.green,padding:"1px 8px",borderRadius:10,background:T.greenBg,border:"1px solid "+T.greenMid}}>✓ Optimal</span>}
    </div>
    <input type="range" min="5" max="100" step="5" value={activePct}
      onChange={e=>{const v=Number(e.target.value);setSamplePct(v===defaultPct?0:v);}}
      style={{width:"100%",accentColor:T.accent,marginBottom:6}}/>
    <div style={{display:"flex",gap:5,alignItems:"center",marginBottom:4}}>
      <input type="number" min="1" max={total} placeholder={"n (default "+defaultN+")"} value={inputVal}
        onChange={e=>setInputVal(e.target.value)}
        onKeyDown={e=>{if(e.key==="Enter")commitInput();}}
        onBlur={commitInput}
        style={{flex:1,padding:"4px 7px",fontSize:11,border:"1px solid "+T.border,borderRadius:6,background:T.bg,color:T.text,outline:"none"}}/>
      <span style={{fontSize:11,color:T.textMute,whiteSpace:"nowrap"}}>of {total.toLocaleString()}</span>
    </div>
    <div style={{display:"flex",justifyContent:"space-between"}}>
      <span style={{fontSize:11,fontWeight:700,color:isDefault?T.green:T.accent}}>{activePct}% · {effectiveN.toLocaleString()} rows</span>
      <span style={{fontSize:10,color:T.textFaint}}>±{(moe*100).toFixed(0)}% MoE</span>
    </div>
    {(()=>{const hasChanged=lastRunPct!==null&&lastRunPct!==samplePct;return hasChanged&&themeSource&&<button onClick={onRerun} style={{width:"100%",marginTop:8,padding:"7px 0",fontSize:12,fontWeight:700,background:T.accent,color:"white",border:"none",borderRadius:7,cursor:"pointer"}}>↻ Re-run with new discovery sample</button>;})()} 
  </div>);
}

// THEME EDITOR MODAL  (industry as starting point, fully editable)

function ThemeEditor({onApply,onClose,apiKey}){
  const industries=Object.keys(INDUSTRY_THEMES).sort();
  const [step,setStep]=useState("pick"); // "pick" | "edit" | "json"
  const [baseIndustry,setBaseIndustry]=useState(null);
  const [editThemes,setEditThemes]=useState([]);
  const [libraryName,setLibraryName]=useState("");
  const [expandedTheme,setExpandedTheme]=useState(null);
  const [jsonText,setJsonText]=useState("");
  const [jsonError,setJsonError]=useState("");
  const [jsonLabeling,setJsonLabeling]=useState(false);
  const [parsedKeywordGroups,setParsedKeywordGroups]=useState(null); // [{keywords:[...]}]
  const [labeledRows,setLabeledRows]=useState(null); // [{name,keywords,sentiment,description}]

  const loadIndustry=(ind)=>{
    setBaseIndustry(ind);
    setLibraryName(ind);
    setEditThemes(INDUSTRY_THEMES[ind].map(t=>({...t,keywords:[...t.keywords]})));
    setStep("edit");
  };
  const startBlank=()=>{
    setBaseIndustry(null);
    setLibraryName("Custom Library");
    setEditThemes([{id:"c1",name:"New Theme",description:"",keywords:["keyword"],sentiment:"mixed",count:0,percentage:0,relatedThemes:[]}]);
    setStep("edit");
  };
  const parseJsonGroups=()=>{
    setJsonError("");
    try{
      const parsed=JSON.parse(jsonText.trim());
      if(!Array.isArray(parsed))throw new Error("Expected a JSON array at the top level.");
      const groups=parsed.map((item,i)=>{
        let kws=[];
        if(Array.isArray(item))kws=item.map(k=>String(k).trim()).filter(Boolean);
        else if(item&&typeof item==="object")kws=(item.keywords||item.words||item.terms||[]).map(k=>String(k).trim()).filter(Boolean);
        else throw new Error("Item "+(i+1)+" is not an array or object.");
        if(!kws.length)throw new Error("Item "+(i+1)+" has no keywords.");
        return{keywords:kws};
      });
      if(!groups.length)throw new Error("No keyword groups found.");
      setParsedKeywordGroups(groups);
      setLabeledRows(groups.map((g,i)=>({id:"j"+i,name:"Theme "+(i+1),keywords:g.keywords,sentiment:"mixed",description:""})));
      setStep("jsonlabel");
    }catch(e){setJsonError(e.message);}
  };
  const autoLabelWithAI=async(apiKey)=>{
    if(!apiKey||!parsedKeywordGroups)return;
    setJsonLabeling(true);
    try{
      const groupsText=parsedKeywordGroups.map((g,i)=>(i+1)+". "+g.keywords.join(", ")).join("\n");
      const prompt="You are a qualitative research analyst. I have "+parsedKeywordGroups.length+" groups of survey keywords. For each group generate: (1) a concise theme name (2-4 words), (2) a one-sentence description, (3) a sentiment (positive/negative/mixed/neutral).\n\nReturn ONLY a JSON array with no markdown:\n[{\"name\":\"Theme Name\",\"description\":\"One sentence.\",\"sentiment\":\"mixed\"},...]\n\nKeyword groups:\n"+groupsText;
      const res=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json","x-api-key":apiKey,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1000,messages:[{role:"user",content:prompt}]})});
      if(!res.ok)throw new Error("API error: "+res.status);
      const data=await res.json();
      const text=(data.content||[]).map(b=>b.text||"").join("");
      const clean=text.replace(/^```json\s*/i,"").replace(/```\s*$/,"").trim();
      const labeled=JSON.parse(clean);
      setLabeledRows(prev=>prev.map((r,i)=>labeled[i]?{...r,name:labeled[i].name||r.name,description:labeled[i].description||"",sentiment:labeled[i].sentiment||"mixed"}:r));
    }catch(e){console.warn("Auto-label error:",e);}
    setJsonLabeling(false);
  };
  const applyLabeledRows=()=>{
    if(!labeledRows||!labeledRows.length)return;
    const themes=labeledRows.map((r,i)=>({id:"j"+i,name:r.name,description:r.description,keywords:r.keywords,sentiment:r.sentiment,count:0,percentage:0,relatedThemes:[]}));
    setBaseIndustry(null);setLibraryName("Custom JSON Themes");setEditThemes(themes);setStep("edit");
    setParsedKeywordGroups(null);setLabeledRows(null);
  };
  const applyJsonPaste=parseJsonGroups;
  const addTheme=()=>{
    const id="c"+Date.now();
    setEditThemes(prev=>[...prev,{id,name:"New Theme",description:"",keywords:[""],sentiment:"mixed",count:0,percentage:0,relatedThemes:[]}]);
    setExpandedTheme(id);
  };
  const removeTheme=(id)=>setEditThemes(prev=>prev.filter(t=>t.id!==id));
  const updateTheme=(id,field,val)=>setEditThemes(prev=>prev.map(t=>t.id===id?{...t,[field]:val}:t));
  const updateKeywords=(id,kwStr)=>setEditThemes(prev=>prev.map(t=>t.id===id?{...t,keywords:kwStr.split(",").map(k=>k.trim()).filter(Boolean)}:t));
  const addKeyword=(id)=>setEditThemes(prev=>prev.map(t=>t.id===id?{...t,keywords:[...t.keywords,""]}:t));
  const updateKeyword=(id,idx,val)=>setEditThemes(prev=>prev.map(t=>t.id===id?{...t,keywords:t.keywords.map((k,i)=>i===idx?val:k)}:t));
  const removeKeyword=(id,idx)=>setEditThemes(prev=>prev.map(t=>t.id===id?{...t,keywords:t.keywords.filter((_,i)=>i!==idx)}:t));

  const inputStyle={width:"100%",padding:"6px 10px",fontSize:12,border:"1px solid "+T.border,borderRadius:7,background:T.bg,color:T.text,outline:"none"};

  return(<div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.5)",zIndex:1000,display:"flex",alignItems:"center",justifyContent:"center"}} onClick={onClose}>
    <div style={{background:T.bgCard,borderRadius:16,width:680,maxHeight:"88vh",display:"flex",flexDirection:"column",boxShadow:"0 24px 64px rgba(0,0,0,.28)"}} onClick={e=>e.stopPropagation()}>
      {/* Header */}
      <div style={{padding:"20px 24px 16px",borderBottom:"1px solid "+T.border,flexShrink:0}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
          <div>
            <h2 style={{fontSize:18,fontWeight:800,color:T.text,margin:"0 0 4px"}}>{step==="pick"?"Choose a Starting Point":step==="json"?"Paste JSON Themes":"Edit Theme Library"}</h2>

// BREAKDOWN SELECTOR
// ─────────────────────────────────────────────────────────────────────────────
function BreakdownSelector({catFields,breakdownField,setBreakdownField,schema,parsedData,selectedValues,setSelectedValues}){
  const [expanded,setExpanded]=useState(null);
  const getValues=(field)=>{const s=schema.find(f=>f.field===field);if(s&&s.values)return s.values;return[...new Set(parsedData.map(r=>r[field]).filter(v=>v!=null&&v!=="").map(v=>String(v)))].sort();};
  const handleFieldClick=(f)=>{if(breakdownField!==f){const vals=getValues(f);setBreakdownField(f);setSelectedValues(new Set(vals));setExpanded(f);}else{setExpanded(prev=>prev===f?null:f);}};
  const handleClearField=()=>{setBreakdownField(null);setSelectedValues(new Set());setExpanded(null);};
  const toggleAll=(field)=>{const vals=getValues(field);const all=vals.every(v=>selectedValues.has(v));setSelectedValues(all?new Set():new Set(vals));};
  const toggleVal=(v)=>{const next=new Set(selectedValues);if(next.has(v))next.delete(v);else next.add(v);setSelectedValues(next);};
  if(!catFields.length)return null;
  return(<div style={{borderTop:"1px solid "+T.border,overflowY:"auto"}}>
    <div style={{padding:"10px 14px 6px",fontSize:10,fontWeight:700,color:T.textFaint,letterSpacing:".1em",textTransform:"uppercase"}}>Breakdown by</div>
    <button onClick={handleClearField} style={{width:"100%",display:"flex",alignItems:"center",gap:8,padding:"7px 14px",background:breakdownField===null?T.accentBg:"transparent",border:"none",textAlign:"left",cursor:"pointer",borderLeft:"3px solid "+(breakdownField===null?T.accent:"transparent")}}>
      <span style={{fontSize:12,fontWeight:breakdownField===null?700:400,color:breakdownField===null?T.accent:T.textMid}}>None</span>
    </button>
    {catFields.map(f=>{
      const isActive=breakdownField===f,isOpen=expanded===f;
      const vals=isOpen||isActive?getValues(f):[];
      const selCount=isActive?selectedValues.size:0,totalCount=isActive?getValues(f).length:0;
      const isFiltered=isActive&&selCount<totalCount&&selCount>0;
      return(<div key={f}>
        <button onClick={()=>handleFieldClick(f)} style={{width:"100%",display:"flex",alignItems:"center",gap:8,padding:"7px 14px",background:isActive?T.amberBg:"transparent",border:"none",textAlign:"left",cursor:"pointer",borderLeft:"3px solid "+(isActive?T.amber:"transparent")}}>
          <span style={{fontSize:11,color:T.amber}}>≡</span>
          <span style={{fontSize:12,fontWeight:isActive?700:400,color:isActive?T.amber:T.textMid,flex:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",fontStyle:isFiltered?"italic":"normal"}}>{f}</span>
          {isFiltered&&<span style={{fontSize:10,fontWeight:700,padding:"1px 6px",borderRadius:10,background:T.amber,color:"white",flexShrink:0}}>{selCount}/{totalCount}</span>}
          {isActive&&!isFiltered&&totalCount>0&&<span style={{fontSize:10,color:T.textFaint,flexShrink:0}}>all</span>}
          <span style={{fontSize:10,color:T.textFaint,marginLeft:2}}>{isOpen?"▲":"▼"}</span>
        </button>
        {isOpen&&isActive&&vals.length>0&&(
          <div style={{margin:"2px 10px 6px 10px",background:T.bg,borderRadius:8,border:"1px solid "+T.border,padding:"8px 10px"}}>
            <label style={{display:"flex",alignItems:"center",gap:8,marginBottom:6,cursor:"pointer"}}>
              <input type="checkbox" checked={vals.every(v=>selectedValues.has(v))} onChange={()=>toggleAll(f)} style={{width:13,height:13,accentColor:T.amber}}/>
              <span style={{fontSize:11,fontWeight:700,color:T.textMid}}>Select all</span>
            </label>
            <div style={{height:1,background:T.border,marginBottom:6}}/>
            {vals.map(v=>(<label key={v} style={{display:"flex",alignItems:"center",gap:8,marginBottom:4,cursor:"pointer"}}>
              <input type="checkbox" checked={selectedValues.has(v)} onChange={()=>toggleVal(v)} style={{width:13,height:13,accentColor:T.amber}}/>
              <span style={{fontSize:11,color:T.textMid}}>{v}</span>
            </label>))}
          </div>
        )}
      </div>);
    })}
  </div>);
}

function CommentCard({text,meta,theme,themeColors,themeIdx,ignoredFields}){
  const pal=themeColors[themeIdx]||THEME_PALETTE[0];
  const segs=highlightKeywords(text,theme.keywords||[]);
  const metaEntries=meta?Object.entries(meta).filter(([k])=>!ignoredFields.includes(k)):[];
  return(<Card style={{padding:"14px 16px",marginBottom:10}}>
    <p style={{fontSize:13,color:T.textMid,lineHeight:1.8,margin:"0 0 10px"}}>{segs.map((seg,i)=>seg.matched?<mark key={i} style={{background:pal.light,color:pal.text,borderRadius:3,padding:"1px 3px",borderBottom:"2px solid "+pal.border,fontWeight:600}}>{seg.text}</mark>:<span key={i}>{seg.text}</span>)}</p>
    <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:6}}>
      <span style={{fontSize:11,fontWeight:600,padding:"3px 10px",borderRadius:20,background:pal.bg,color:pal.text,border:"1px solid "+pal.border}}>{theme.name}</span>
      {metaEntries.length>0&&<div style={{display:"flex",gap:12,flexWrap:"wrap"}}>{metaEntries.map(([k,v])=><span key={k} style={{fontSize:11,color:T.textFaint}}>{k}: <span style={{color:T.textMid,fontWeight:600}}>{v}</span></span>)}</div>}
    </div>
  </Card>);
}

function CommentsPanel({theme,allThemes,parsedData,activeField,catFields,themeColors,onBack,ignoredFields,schema,apiKey,onOpenKey,columnAliases,allOpenFields,aiActive,aiMode}){
  const themeIdx=allThemes.findIndex(t=>t.id===theme.id);
  const pal=themeColors[themeIdx]||THEME_PALETTE[0];
  const exportFields=schema?schema.filter(f=>!ignoredFields.includes(f.field)).map(f=>f.field):[activeField,...catFields];
  const allRows=parsedData.map(r=>{const meta={};catFields.forEach(f=>{meta[f]=r[f];});return{raw:r,text:String(r[activeField]||"").trim(),meta};}).filter(r=>r.text.length>0);
  const matched=allRows.filter(r=>commentMatchesTheme(r.text,theme));
  // Split into sampled estimate count vs remaining matches
  const sampledCount=theme.count||0;
  const sampledMatched=sampledCount>0?matched.slice(0,sampledCount):matched;
  const remainingMatched=sampledCount>0?matched.slice(sampledCount):[];

  const [aiSummary,setAiSummary]=useState(null);
  const [summaryLoading,setSummaryLoading]=useState(false);
  const [summaryError,setSummaryError]=useState(null);

  const generateSummary=async()=>{
    if(!matched.length)return;
    setSummaryLoading(true);setSummaryError(null);setAiSummary(null);
    try{
      const sample=evenSample(matched,Math.min(60,matched.length));
      const texts=sample.map((c,i)=>(i+1)+". "+c.text).join("\n");
      const sys="You are an expert qualitative researcher. Return ONLY raw JSON starting with { and ending with }.";
      const msg="Summarize these "+matched.length+" comments about theme \""+theme.name+"\" ("+theme.description+").\n\nComments:\n"+texts+"\n\nReturn: {\"headline\":\"1 punchy sentence max 15 words\",\"summary\":\"3-4 sentence synthesis of what people are saying\",\"sentiment\":\"positive|negative|mixed|neutral\",\"keyQuotes\":[\"verbatim short excerpt from one of the numbered comments above\",\"verbatim short excerpt from another comment\",\"verbatim short excerpt from a third comment\"]}\n\nIMPORTANT: keyQuotes must be verbatim short excerpts taken directly from the comments listed above — not paraphrases.";
      const raw=await callClaude(msg,sys);
      const parsed=parseJSON(raw);
      if(!parsed||!parsed.summary)throw new Error("Could not parse summary: "+raw.slice(0,200));
      setAiSummary(parsed);
    }catch(e){setSummaryError(e.message);}
    setSummaryLoading(false);
  };

  const [showExportModal,setShowExportModal]=useState(false);

  const doExport=(format,localAliases,opts)=>{
    const aliases=localAliases||columnAliases||{};
    const escape=v=>{const s=String(v??"");return(s.includes(",")||s.includes('"'))||s.includes("\n")?'"'+s.replace(/"/g,'""')+'"':s;};
    const colName=(f)=>aliases[f]&&aliases[f].trim()?aliases[f].trim():f;
    const dl=theme.name.replace(/[^a-z0-9]+/gi,"-").toLowerCase()+"-comments.csv";
    let csv;
    if(format==="datanautix"){
      const commentCol=opts&&opts.commentColName?opts.commentColName:"Comment";
      const skipBlanks=opts&&opts.skipBlanks!==undefined?opts.skipBlanks:true;
      // metadata cols = all export fields that are NOT open-ended
      const openEndedCols=schema?schema.filter(f=>f.type==="open-ended").map(f=>f.field):[];
      const metaCols=exportFields.filter(f=>!openEndedCols.includes(f));
      // open-ended cols to flatten = all open-ended cols that are in exportFields
      const openCols=openEndedCols.filter(f=>exportFields.includes(f)||f===activeField);
      if(!openCols.includes(activeField))openCols.unshift(activeField);
      const headerCols=[...metaCols.map(colName),commentCol,"Prompt"];
      const rows=[];
      // Use allRows (full dataset) not just matched
      allRows.forEach(r=>{
        openCols.forEach(oc=>{
          const val=String(r[oc]??"").trim();
          if(skipBlanks&&!val)return;
          const promptLabel=aliases[oc]&&aliases[oc].trim()?aliases[oc].trim():oc;
          rows.push([...metaCols.map(mc=>escape(r[mc])),escape(val),escape(promptLabel)].join(","));
        });
      });
      csv=[headerCols.map(escape).join(","),...rows].join("\n");
    } else {
      const cols=[activeField,...exportFields.filter(f=>f!==activeField)];
      const header=cols.map(colName).map(escape).join(",");
      const rows=matched.map(r=>cols.map(c=>escape(r.raw[c])).join(","));
      csv=[header,...rows].join("\n");
    }
    try{
      const blob=new Blob([csv],{type:"text/csv;charset=utf-8;"});
      const url=URL.createObjectURL(blob);
      const a=document.createElement("a");
      a.href=url;a.setAttribute("download",dl);
      document.body.appendChild(a);a.click();
      setTimeout(()=>{document.body.removeChild(a);URL.revokeObjectURL(url);},200);
    }catch(e){window.open("data:text/csv;charset=utf-8,"+encodeURIComponent(csv),"_blank");}
    setShowExportModal(false);
  };

  return(<div style={{flex:1,overflowY:"auto",padding:24}} className="fadein">
    {/* Header */}
    <div style={{display:"flex",alignItems:"flex-start",gap:14,marginBottom:20}}>
      <div style={{flex:1}}>
        <div style={{fontSize:11,fontWeight:700,color:T.textFaint,textTransform:"uppercase",letterSpacing:".07em",marginBottom:4}}>Comments — {activeField}</div>
        <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:4}}>
          <h2 style={{fontSize:22,fontWeight:800,color:T.text,letterSpacing:"-.4px",margin:0}}>{theme.name}</h2>
          {allRows.length>0&&<span style={{fontSize:13,fontWeight:700,color:pal.text,background:pal.bg,border:"1px solid "+pal.border+"70",borderRadius:6,padding:"3px 10px",flexShrink:0}}>{Math.round(matched.length/allRows.length*100)}%</span>}
        </div>
        <p style={{fontSize:13,color:T.textMid,margin:"0 0 6px"}}>{theme.description}</p>
        <div style={{display:"flex",flexWrap:"wrap",gap:4}}>{(theme.keywords||[]).map(kw=><span key={kw} style={{fontSize:11,padding:"2px 9px",background:pal.bg,color:pal.text,borderRadius:20,border:"1px solid "+pal.border+"60",fontWeight:600}}>{kw}</span>)}</div>
      </div>
      <div style={{display:"flex",gap:8,flexShrink:0}}>
        {matched.length>0&&<button onClick={()=>setShowExportModal(true)} style={{fontSize:11,fontWeight:600,color:T.green,background:T.greenBg,border:"1px solid "+T.greenMid,borderRadius:6,padding:"5px 12px",cursor:"pointer"}}>↓ Export CSV</button>}
        <button onClick={onBack} style={{fontSize:11,fontWeight:600,color:T.textMute,background:T.bgCard,border:"1px solid "+T.border,borderRadius:6,padding:"5px 14px",cursor:"pointer"}}>← Back</button>
      </div>
    </div>

    <div style={{fontSize:12,color:T.textMute,marginBottom:16}}>
      {sampledCount>0&&sampledCount<matched.length
        ?<><strong style={{color:T.text}}>{sampledCount}</strong> in sample · <strong style={{color:T.text}}>{matched.length}</strong> matched across full dataset of <strong style={{color:T.text}}>{allRows.length}</strong> responses · keyword highlights shown</>
        :<><strong style={{color:T.text}}>{matched.length}</strong> of <strong style={{color:T.text}}>{allRows.length}</strong> responses matched · keyword highlights shown</>
      }
    </div>

    {/* AI Summary card */}
    {matched.length>0&&<Card style={{padding:"16px 18px",marginBottom:20,borderLeft:"4px solid "+pal.border}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:aiSummary?10:0}}>
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          <span style={{fontSize:13,fontWeight:700,color:T.text}}>✦ AI Summary</span>
          {aiSummary&&<Badge label={aiSummary.sentiment}/>}
        </div>
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          {summaryLoading&&<Spinner color={pal.border}/>}
          {!summaryLoading&&aiActive&&<button onClick={generateSummary}
            style={{fontSize:11,fontWeight:700,padding:"5px 13px",borderRadius:20,
              background:aiSummary?"transparent":pal.bg,
              border:"1px solid "+(aiSummary?T.border:pal.border),
              color:aiSummary?T.textMid:pal.text,cursor:"pointer"}}>
            {aiSummary?"↻ Regenerate":"✦ Generate Summary"}
          </button>}
          {!summaryLoading&&!aiActive&&<button onClick={apiKey?undefined:onOpenKey}
            title={apiKey?"AI is currently turned off":"Connect AI to enable summaries"}
            style={{fontSize:11,fontWeight:700,padding:"5px 13px",borderRadius:20,
              background:T.bg,border:"1px solid "+T.border,color:T.textFaint,
              cursor:apiKey?"not-allowed":"pointer",opacity:.55}}>
            {apiKey?"✦ AI off":"🔑 Connect AI"}
          </button>}
        </div>
      </div>
      {!aiSummary&&!summaryLoading&&!summaryError&&!apiKey&&<p style={{fontSize:12,color:T.textFaint,margin:"8px 0 0",lineHeight:1.5}}>Connect your Claude API key to generate an AI summary of these {matched.length} comments.</p>}
      {!aiSummary&&!summaryLoading&&!summaryError&&apiKey&&<p style={{fontSize:12,color:T.textFaint,margin:"8px 0 0",lineHeight:1.5}}>Synthesize all {matched.length} matched comments into key patterns, sentiment, and representative quotes.</p>}
      {summaryError&&<div style={{marginTop:8}}>{aiErrorMessage(summaryError,onOpenKey,generateSummary)}</div>}
      {aiSummary&&<div>
        <div style={{fontSize:15,fontWeight:700,color:T.text,marginBottom:8,lineHeight:1.4}}>{aiSummary.headline}</div>
        <p style={{fontSize:13,color:T.textMid,lineHeight:1.75,margin:"0 0 12px"}}>{aiSummary.summary}</p>
        {aiSummary.keyQuotes&&aiSummary.keyQuotes.length>0&&<div style={{display:"flex",flexDirection:"column",gap:6}}>
          {aiSummary.keyQuotes.map((q,i)=><div key={i} style={{fontSize:12,color:T.textMid,background:"#f8f9fa",borderRadius:7,padding:"8px 12px",borderLeft:"3px solid #d1d5db",fontStyle:"italic",lineHeight:1.5}}>"{q}"</div>)}
        </div>}
      </div>}
    </Card>}

    {matched.length===0&&<div style={{textAlign:"center",paddingTop:40,color:T.textFaint,fontSize:13}}>No comments matched the keywords for this theme.</div>}
    {sampledMatched.map((c,i)=><CommentCard key={"s"+i} text={c.text} meta={c.meta} theme={theme} themeColors={themeColors} themeIdx={themeIdx} ignoredFields={ignoredFields}/>)}
    {remainingMatched.length>0&&<div style={{display:"flex",alignItems:"center",gap:10,margin:"18px 0 14px"}}>
      <div style={{flex:1,height:1,background:T.border}}/>
      <span style={{fontSize:11,fontWeight:600,color:T.textFaint,whiteSpace:"nowrap",padding:"0 4px"}}>{remainingMatched.length} more matches outside sample</span>
      <div style={{flex:1,height:1,background:T.border}}/>
    </div>}
    {remainingMatched.map((c,i)=><CommentCard key={"r"+i} text={c.text} meta={c.meta} theme={theme} themeColors={themeColors} themeIdx={themeIdx} ignoredFields={ignoredFields}/>)}

    {showExportModal&&<ExportModal
      exportFields={exportFields}
      activeField={activeField}
      schema={schema}
      columnAliases={columnAliases}
      onClose={()=>setShowExportModal(false)}
      onExport={doExport}
    />}
  </div>);
}

// ─────────────────────────────────────────────────────────────────────────────
// BREAKDOWN DIST — Themes tab filtered breakdown, with By Group / By Theme toggle
// ─────────────────────────────────────────────────────────────────────────────
function BreakdownDist({themes,parsedData,activeField,breakdownField,selectedValues,themeColors,onDrillTheme}){
  const [distView,setDistView]=useState("group"); // "group" | "theme"
  const field=activeField||themes.fieldName;
  const selVals=useMemo(()=>[...selectedValues].sort(),[selectedValues]);
  const sortedThemes=useMemo(()=>[...themes.themes].sort((a,b)=>b.count-a.count),[themes.themes]);

  // Total responses across the FULL dataset (not just selection)
  const totalAllResp=useMemo(()=>
    parsedData.filter(r=>String(r[field]||"").trim().length>0).length
  ,[parsedData,field]);

  // Per-group counts within selection
  const valueCounts=useMemo(()=>{
    const vc={};
    selVals.forEach(v=>{
      vc[v]={};
      const rows=parsedData.filter(r=>String(r[breakdownField]??"")===v);
      sortedThemes.forEach(t=>{vc[v][t.id]=rows.filter(r=>commentMatchesTheme(String(r[field]||""),t)).length;});
    });
    return vc;
  },[selVals,parsedData,breakdownField,sortedThemes,field]);

  // Group totals (responses with text) within selection
  const groupTotals=useMemo(()=>{
    const gt={};
    selVals.forEach(v=>{
      gt[v]=parsedData.filter(r=>String(r[breakdownField]??"")===v&&String(r[field]||"").trim().length>0).length;
    });
    return gt;
  },[selVals,parsedData,breakdownField,field]);

  // Global total rows per group value (all data, not just selection)
  const allGroupTotals=useMemo(()=>{
    const gt={};
    selVals.forEach(v=>{
      gt[v]=parsedData.filter(r=>String(r[breakdownField]??"")===v).length;
    });
    return gt;
  },[selVals,parsedData,breakdownField]);

  // Global theme match counts — scan full parsedData (fixes 0% bug from sampled count)
  const globalThemeCounts=useMemo(()=>{
    const gc={};
    sortedThemes.forEach(t=>{
      gc[t.id]=parsedData.filter(r=>commentMatchesTheme(String(r[field]||""),t)).length;
    });
    return gc;
  },[sortedThemes,parsedData,field]);

  // Global % for a theme = full-dataset matches / total responses
  const globalThemePct=(t)=>totalAllResp>0?Math.round((globalThemeCounts[t.id]||0)/totalAllResp*100):0;

  // Two-proportion z-test — uses module-level sigTest(k,n,K,N)

  // DistRow:
  //   label + labelNote shown on left
  //   bar driven by barValue/maxBar
  //   right side: [★] rightPct% (count)
  const DistRow=({pal,label,labelNote,barValue,maxBar,rightPct,count,onClick,grey,sig,sigContext})=>{
    const barW=maxBar>0?(barValue/maxBar*100):0;
    const dotColor=grey?"#94a3b8":pal.border;
    const labelColor=grey?T.textFaint:pal.text;
    const sigDir=sig?sig.dir:null;
    // In BreakdownDist: sigContext = "responses in the X group"
    // sig.p1 = rightPct/100 (the displayed %) — tooltip consistent with display
    const groupNameFromCtx=sigContext?sigContext.replace("responses in the ","").replace(" group",""):label;
    const tooltip=sigDir&&sigDir!=="ns"?sigTooltip(sig,groupNameFromCtx,label):"";
    const sigEl=sigDir==="over"
      ?<span title={tooltip} style={{marginRight:4,fontSize:11,color:T.green,fontWeight:800,lineHeight:1,cursor:"help"}}>★</span>
      :sigDir==="under"
      ?<span title={tooltip} style={{marginRight:4,fontSize:11,color:T.red,fontWeight:800,lineHeight:1,cursor:"help"}}>★</span>
      :null;
    return(<div className={onClick?"dist-bar":""} onClick={onClick} style={{display:"flex",alignItems:"center",gap:8,marginBottom:6,padding:"3px 0",cursor:onClick?"pointer":"default",opacity:grey?0.7:1}}>
      <div style={{width:8,height:8,borderRadius:"50%",background:dotColor,flexShrink:0}}/>
      <span style={{fontSize:12,color:labelColor,fontWeight:600,flex:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>
        {label} <span style={{fontWeight:400,color:T.textFaint}}>({labelNote})</span>
      </span>
      <div style={{width:110,height:6,background:T.border,borderRadius:3,overflow:"hidden",flexShrink:0}}>
        <div style={{height:"100%",width:barW+"%",background:dotColor,borderRadius:3,transition:"width .5s"}}/>
      </div>
      <span style={{fontSize:11,fontWeight:700,color:grey?T.textFaint:T.text,flexShrink:0,minWidth:72,textAlign:"right",display:"flex",alignItems:"center",justifyContent:"flex-end"}}>
        {sigEl}{rightPct}% <span style={{fontWeight:400,color:T.textFaint,marginLeft:2}}>({count})</span>
      </span>
    </div>);
  };

  const header=(
    <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:14,flexWrap:"wrap",gap:8}}>
      <div style={{display:"flex",alignItems:"center",gap:10,flexWrap:"wrap"}}>
        <SectionLabel style={{marginBottom:0}}>Theme Distribution by {breakdownField}</SectionLabel>
        <span style={{fontSize:11,color:T.amber,fontWeight:600,background:T.amberBg,padding:"2px 8px",borderRadius:12,border:"1px solid "+T.amberMid}}>Filtered: {selVals.join(", ")}</span>
        <span style={{fontSize:11,color:T.textMute,marginLeft:4}}>
          <span style={{color:T.green,fontWeight:800}}>★</span> over 
          <span style={{color:T.red,fontWeight:800}}>★</span> under
          <span style={{color:T.textFaint,fontSize:10}}> (p&lt;0.05)</span>
        </span>
      </div>
      <div style={{display:"flex",background:T.bg,borderRadius:20,padding:2,border:"1px solid "+T.border,flexShrink:0}}>
        {[["group","By Group"],["theme","By Theme"]].map(([m,lbl])=>(
          <button key={m} onClick={()=>setDistView(m)} style={{fontSize:11,fontWeight:distView===m?700:500,padding:"4px 12px",borderRadius:18,background:distView===m?T.accent:"transparent",color:distView===m?"white":T.textMute,border:"none",cursor:"pointer",transition:"background .15s"}}>{lbl}</button>
        ))}
      </div>
    </div>
  );

  // ── BY GROUP ──────────────────────────────────────────────────────────────
  if(distView==="group"){
    return(<div>
      {header}
      {selVals.map(v=>{
        const groupTotal=groupTotals[v]||0;
        const classifiedInGroup=sortedThemes.reduce((s,t)=>s+(valueCounts[v][t.id]||0),0);
        const unclassifiedInGroup=Math.max(0,groupTotal-classifiedInGroup);
        const maxBarV=Math.max(...sortedThemes.map(t=>valueCounts[v][t.id]||0),unclassifiedInGroup,1);
        const groupPctOfAll=totalAllResp>0?Math.round(groupTotal/totalAllResp*100):0;
        return(<div key={v} style={{marginBottom:22}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"baseline",marginBottom:7}}>
            <span style={{fontSize:13,fontWeight:700,color:T.text}}>{v} <span style={{fontWeight:400,color:T.textFaint,fontSize:11}}>({groupPctOfAll}% of dataset)</span></span>
            <span style={{fontSize:11,color:T.textMute}}>{groupTotal.toLocaleString()} responses</span>
          </div>
          <div style={{height:12,borderRadius:6,overflow:"hidden",display:"flex",background:T.border,marginBottom:10}}>
            {sortedThemes.map(t=>{const idx=themes.themes.indexOf(t);const pal=themeColors[idx]||THEME_PALETTE[0];const cnt=valueCounts[v][t.id]||0;const pct=groupTotal>0?(cnt/groupTotal)*100:0;return pct>0?<div key={t.id} title={t.name+": "+cnt+" ("+Math.round(pct)+"%)"} style={{width:pct+"%",background:pal.border,transition:"width .5s"}}/>:null;})}
            {unclassifiedInGroup>0&&<div title={"Unclassified: "+unclassifiedInGroup} style={{flex:1,background:"#e2e8f0",minWidth:1}}/>}
          </div>
          {sortedThemes.filter(t=>(valueCounts[v][t.id]||0)>0).map(t=>{
            const idx=themes.themes.indexOf(t);const pal=themeColors[idx]||THEME_PALETTE[0];
            const cnt=valueCounts[v][t.id]||0;
            // labelNote = t.percentage (same value shown on the theme card)
            const lNote=(t.percentage||0)+"%";
            // rightPct = cnt / groupTotal (how much of this group talks about this theme)
            const rPct=groupTotal>0?Math.round(cnt/groupTotal*100):0;
            // stat sig: k=cnt, n=groupTotal, K=globalThemeCounts, N=totalAllResp
            const K=globalThemeCounts[t.id]||0;
            const sig=sigTest(cnt,groupTotal,K,totalAllResp);
            return<DistRow key={t.id} pal={pal} label={t.name} labelNote={lNote} barValue={cnt} maxBar={maxBarV} rightPct={rPct} count={cnt} onClick={()=>onDrillTheme(t)} sig={sig} sigContext={"responses in the "+v+" group"}/>;
          })}
          {unclassifiedInGroup>0&&(()=>{
            const rPct=groupTotal>0?Math.round(unclassifiedInGroup/groupTotal*100):0;
            return<DistRow pal={{border:"#94a3b8"}} label="Unclassified Comments" labelNote={rPct+"%"} barValue={unclassifiedInGroup} maxBar={maxBarV} rightPct={rPct} count={unclassifiedInGroup} grey/>;
          })()}
        </div>);
      })}
      <div style={{marginTop:8,paddingTop:10,borderTop:"1px solid "+T.border,display:"flex",flexWrap:"wrap",gap:6}}>
        {sortedThemes.map(t=>{const idx=themes.themes.indexOf(t);const pal=themeColors[idx]||THEME_PALETTE[0];return<span key={t.id} style={{fontSize:10,padding:"2px 7px",background:pal.bg,color:pal.text,borderRadius:10,border:"1px solid "+pal.border+"50",fontWeight:600}}>● {t.name}</span>;})}
      </div>
    </div>);
  }

  // ── BY THEME ─────────────────────────────────────────────────────────────
  return(<div>
    {header}
    {sortedThemes.map((t)=>{
      const idx=themes.themes.indexOf(t);const pal=themeColors[idx]||THEME_PALETTE[0];
      // Total theme matches within selection (across all selected group values)
      const totalThemeMatchesInSelection=selVals.reduce((s,v)=>s+(valueCounts[v][t.id]||0),0);
      // Max bar = highest group count for this theme (drives bar proportions)
      const maxBarT=Math.max(...selVals.map(v=>valueCounts[v][t.id]||0),1);
      // gPct = t.percentage (same value shown on the theme card)
      const gPct=t.percentage||0;
      return(<div key={t.id} style={{marginBottom:24}}>
        {/* Theme header — styled as a proper section label, not a bullet */}
        <div style={{display:"flex",alignItems:"baseline",gap:10,marginBottom:10,paddingBottom:8,borderBottom:"2px solid "+pal.border}}>
          <span style={{fontSize:14,fontWeight:800,color:pal.text}}>{t.name}</span>
          <span style={{fontSize:11,color:T.textFaint,fontWeight:400}}>
            {gPct}% globally · {totalThemeMatchesInSelection.toLocaleString()} matches in selection
          </span>
        </div>
        {selVals.map(v=>{
          const cnt=valueCounts[v][t.id]||0;
          // labelNote = group % of total dataset (all rows, not just selection)
          const groupAllRows=allGroupTotals[v]||0;
          const groupPctGlobal=parsedData.length>0?Math.round(groupAllRows/parsedData.length*100):0;
          // rightPct = cnt / totalThemeMatchesInSelection (group's share of this theme)
          const rPct=totalThemeMatchesInSelection>0?Math.round(cnt/totalThemeMatchesInSelection*100):0;
          // stat sig: k=cnt, n=groupTotals[v], K=totalThemeMatchesInSelection, N=sum of all groupTotals
          const n=groupTotals[v]||0;
          const N=selVals.reduce((s,vv)=>s+(groupTotals[vv]||0),0);
          const sig=sigTest(cnt,n,totalThemeMatchesInSelection,N);
          return<DistRow key={v} pal={pal} label={v} labelNote={groupPctGlobal+"%"} barValue={cnt} maxBar={maxBarT} rightPct={rPct} count={cnt} onClick={cnt>0?()=>onDrillTheme(t):null} sig={sig} sigContext={"responses in the "+v+" group"}/>;
        })}
      </div>);
    })}
  </div>);
}


// ─────────────────────────────────────────────────────────────────────────────
// THEME PICKER MODAL — fires after data loads, lets user choose industry or AI
// ─────────────────────────────────────────────────────────────────────────────
function ThemePickerModal({schema,apiKey,aiActive,onPickAI,onPickIndustry,onClose}){
  const industries=Object.keys(INDUSTRY_THEMES).sort();
  const openFields=schema.filter(f=>f.type==="open-ended").map(f=>f.field);
  const [selectedField,setSelectedField]=useState(openFields[0]||null);
  const [checked,setChecked]=useState(new Set());
  const ICONS={"SaaS / Software":"💻","Healthcare":"🏥","Retail / E-commerce":"🛒","Hospitality / Hotels":"🏨","Financial Services":"💳","Education":"🎓","HR / Employee Experience":"👥","Political Opinion Survey":"🗳️","Media / Entertainment":"🎬","Sports":"⚽","Performing Arts / Venues":"🎭","Travel / Tourism":"✈️","Higher Education":"🏛","Automotive Repair":"🔧","Casual Dining":"🍽️","Fine Dining":"🥂","Fast Food":"🍟","Non-Profit / Charity":"🤝"};

  const toggleInd=(ind)=>{
    setChecked(prev=>{const n=new Set(prev);if(n.has(ind))n.delete(ind);else n.add(ind);return n;});
  };
  const applyChecked=()=>{
    if(!checked.size)return;
    const libs=[...checked];
    const merged=[];const seen=new Set();
    libs.forEach(lib=>(INDUSTRY_THEMES[lib]||[]).forEach(t=>{if(!seen.has(t.id)){seen.add(t.id);merged.push(t);}}));
    onPickIndustry(merged,libs,selectedField);
  };

  return(<div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.55)",zIndex:3000,display:"flex",alignItems:"center",justifyContent:"center",padding:24}} onClick={onClose}>
    <div style={{background:T.bgCard,borderRadius:18,width:580,maxHeight:"88vh",display:"flex",flexDirection:"column",boxShadow:"0 28px 72px rgba(0,0,0,.32)",overflow:"hidden"}} onClick={e=>e.stopPropagation()}>
      <div style={{padding:"24px 28px 18px",borderBottom:"1px solid "+T.border,flexShrink:0}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
          <div>
            <h2 style={{fontSize:19,fontWeight:800,color:T.text,margin:"0 0 4px"}}>Choose your theme approach</h2>
            <p style={{fontSize:13,color:T.textMute,margin:0}}>Select one or more industry libraries, or let AI discover themes automatically.</p>
          </div>
          <button onClick={onClose} style={{background:"transparent",border:"none",fontSize:20,color:T.textMute,cursor:"pointer",marginLeft:16,flexShrink:0}}>✕</button>
        </div>
        {openFields.length>1&&(
          <div style={{marginTop:14}}>
            <div style={{fontSize:11,fontWeight:700,color:T.textFaint,textTransform:"uppercase",letterSpacing:".07em",marginBottom:6}}>Open-ended field to analyse</div>
            <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
              {openFields.map(f=>(
                <button key={f} onClick={()=>setSelectedField(f)} style={{padding:"5px 12px",fontSize:12,fontWeight:selectedField===f?700:500,background:selectedField===f?T.accentBg:"transparent",border:"1px solid "+(selectedField===f?T.accent:T.border),color:selectedField===f?T.accent:T.textMid,borderRadius:7,cursor:"pointer"}}>{f}</button>
              ))}
            </div>
          </div>
        )}
      </div>
      <div style={{flex:1,overflowY:"auto",padding:"20px 28px"}}>
        <div style={{marginBottom:20}}>
          <div style={{fontSize:11,fontWeight:700,color:T.textFaint,textTransform:"uppercase",letterSpacing:".07em",marginBottom:8}}>AI Discovery</div>
          <button onClick={()=>onPickAI(selectedField)} style={{width:"100%",display:"flex",alignItems:"center",gap:14,padding:"14px 16px",background:aiActive?T.accentBg:T.bg,border:"2px solid "+(aiActive?T.accent:T.border),borderRadius:12,cursor:"pointer",textAlign:"left"}}>
            <span style={{fontSize:24,flexShrink:0}}>✦</span>
            <div style={{flex:1}}>
              <div style={{fontSize:14,fontWeight:700,color:aiActive?T.accent:T.textMid}}>Discover themes using AI</div>
              <div style={{fontSize:12,color:T.textMute,marginTop:2}}>{aiActive?"Claude will read a sample of your responses and identify themes automatically.":"Requires a Claude API key — you'll be prompted to connect after clicking."}</div>
            </div>
            {!aiActive&&<span style={{fontSize:11,fontWeight:600,color:T.amber,background:T.amberBg,padding:"3px 8px",borderRadius:8,border:"1px solid "+T.amberMid,flexShrink:0,whiteSpace:"nowrap"}}>🔑 Key needed</span>}
          </button>
        </div>
        <div>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:8}}>
            <div style={{fontSize:11,fontWeight:700,color:T.textFaint,textTransform:"uppercase",letterSpacing:".07em"}}>Industry Theme Libraries</div>
            {checked.size>0&&<span style={{fontSize:11,color:T.accent,fontWeight:600}}>{checked.size} selected · {[...checked].reduce((s,k)=>s+(INDUSTRY_THEMES[k]||[]).length,0)} themes total</span>}
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
            {industries.map(ind=>{
              const isChecked=checked.has(ind);
              return(
                <button key={ind} onClick={()=>toggleInd(ind)} style={{display:"flex",alignItems:"center",gap:10,padding:"11px 14px",
                  background:isChecked?T.accentBg:T.bg,
                  border:"2px solid "+(isChecked?T.accent:T.border),
                  borderRadius:10,cursor:"pointer",textAlign:"left",transition:"all .15s"}}>
                  <div style={{width:16,height:16,borderRadius:3,border:"2px solid "+(isChecked?T.accent:T.borderMid),
                    background:isChecked?T.accent:"transparent",
                    display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,transition:"all .15s"}}>
                    {isChecked&&<span style={{color:"white",fontSize:10,lineHeight:1,fontWeight:800}}>✓</span>}
                  </div>
                  <span style={{fontSize:18,flexShrink:0}}>{ICONS[ind]||"📋"}</span>
                  <div style={{minWidth:0}}>
                    <div style={{fontSize:12,fontWeight:isChecked?700:600,color:isChecked?T.accent:T.text,lineHeight:1.3}}>{ind}</div>
                    <div style={{fontSize:10,color:T.textFaint,marginTop:1}}>{INDUSTRY_THEMES[ind].length} themes</div>
                  </div>
                </button>
              );
            })}
          </div>
        </div>
      </div>
      <div style={{padding:"14px 28px",borderTop:"1px solid "+T.border,display:"flex",justifyContent:"space-between",alignItems:"center",flexShrink:0,gap:10}}>
        <button onClick={onClose} style={{padding:"8px 18px",fontSize:12,fontWeight:600,background:"transparent",border:"1px solid "+T.border,borderRadius:8,color:T.textMid,cursor:"pointer"}}>Skip for now</button>
        <button onClick={applyChecked} disabled={!checked.size} style={{
          padding:"8px 22px",fontSize:13,fontWeight:700,borderRadius:8,border:"none",
          cursor:checked.size?"pointer":"not-allowed",
          background:checked.size?T.accent:T.border,color:"white",transition:"background .15s"
        }}>{checked.size?("Apply "+(checked.size===1?[...checked][0].split(" /")[0].split(" &")[0]:checked.size+" libraries")):"Select a library"}</button>
      </div>
    </div>
  </div>);
}
