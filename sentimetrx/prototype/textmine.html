// SOURCE DATA TAB
// Three sections: Theme Model · Schema · Data
// Status pills at top scroll to their section; dot on tab bar shows readiness
// ─────────────────────────────────────────────────────────────────────────────
function SourceDataTab({
  activeSubTab, onNavigate,
  hasData, parsedData, schema, schemaEdited, openFields, activeField, setActiveField,
  themes, themeSource, themeLibName, loading, error, samplePct, setSamplePct, lastRunPct,
  apiKey, aiActive, columnAliases, scoreFields,
  catValueMaps, setCatValueMaps,
  derivedFields, setDerivedFields,
  onTypeChange, onToggleScore, setAlias,
  onLoadData, onMineThemes, onApplyIndustry, onOpenKey, onOpenThemeEditor, onRerunCounts
}){
  const dataOk   = hasData;
  const schemaOk = hasData && openFields.length > 0;
  const themesOk = !!themes;

  // Sub-tab driven by parent (activeSubTab prop)
  const sub = activeSubTab || "data";
  const setSub = () => {}; // no-op: parent controls tab via handleSubTab
  const [checkedInds, setCheckedInds] = React.useState(new Set()); // multi-select industry libs
  const toggleInd = (ind) => setCheckedInds(prev => { const n = new Set(prev); if(n.has(ind)) n.delete(ind); else n.add(ind); return n; });
  const applyCheckedInds = () => {
    if(!checkedInds.size) return;
    const libs = [...checkedInds];
    const merged = []; const seen = new Set();
    libs.forEach(l => (INDUSTRY_THEMES[l]||[]).forEach(t => { if(!seen.has(t.id)){ seen.add(t.id); merged.push(t); } }));
    onApplyIndustry(libs, activeField);
  };

  // Auto-navigate between sub-tabs
  const prevHasData   = React.useRef(hasData);
  const prevThemesOk  = React.useRef(themesOk);

  React.useEffect(()=>{
    // No data on mount → land on Data
    if(!hasData) setSub("data");
  },[]);

  React.useEffect(()=>{
    // Data just arrived → go to Schema so user can verify fields
    if(hasData && !prevHasData.current) setSub("schema");
    prevHasData.current = hasData;
  },[hasData]);

  React.useEffect(()=>{
    // Themes just applied → go to Theme Model to show success
    if(themesOk && !prevThemesOk.current) setSub("thememodel");
    prevThemesOk.current = themesOk;
  },[themesOk]);

  const ICONS={"SaaS / Software":"💻","Healthcare":"🏥","Retail / E-commerce":"🛒",
    "Hospitality / Hotels":"🏨","Financial Services":"💳","Education":"🎓",
    "HR / Employee Experience":"👥","Political Opinion Survey":"🗳️",
    "Media / Entertainment":"🎬","Sports":"⚽","Performing Arts / Venues":"🎭","Travel / Tourism":"✈️","Higher Education":"🏛","Casual Dining":"🍽️","Fine Dining":"🥂","Fast Food":"🍟","Non-Profit / Charity":"🤝"};
  const industries = Object.keys(INDUSTRY_THEMES).sort();

  // Sub-tab button
  const SubTab = ({id, label, ok, warn}) => {
    const active = sub === id;
    const dot = ok ? T.green : warn ? T.amber : T.red;
    return (
      <button onClick={()=>setSub(id)} style={{
        display:"flex", alignItems:"center", gap:6,
        padding:"7px 18px", fontSize:12, fontWeight:active?700:500,
        background: active ? T.bgCard : "transparent",
        border:"none",
        borderBottom:"2px solid "+(active ? T.accent : "transparent"),
        color: active ? T.accent : T.textMid,
        cursor:"pointer", transition:"all .15s", flexShrink:0
      }}>
        <span style={{width:6,height:6,borderRadius:"50%",background:dot,flexShrink:0}}/>
        {label}
        {id==="schema"&&schemaEdited&&<span style={{fontSize:9,fontWeight:700,color:T.accent,background:T.accentBg,padding:"1px 5px",borderRadius:8,border:"1px solid "+T.accentMid,marginLeft:2}}>customised</span>}
      </button>
    );
  };

  return (
    <div style={{display:"flex",flexDirection:"column",height:"100%"}}>

      {/* ── Sub-tab bar ──────────────────────────────────────────────────── */}
      

      {/* ── DATA sub-tab ─────────────────────────────────────────────────── */}
      {sub==="data"&&(<div style={{flex:1,overflowY:"auto",padding:"32px 32px 60px"}} className="fadein">
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:24}}>
          <div>
            <h2 style={{fontSize:20,fontWeight:800,color:T.text,margin:"0 0 4px"}}>Data</h2>
            <p style={{fontSize:13,color:T.textMid,margin:0,lineHeight:1.6}}>
              {hasData ? parsedData.length.toLocaleString()+" rows · "+schema.length+" fields detected." : "Load a CSV, TSV or JSON file to get started."}
            </p>
          </div>
          {hasData&&<button onClick={()=>onNavigate&&onNavigate("schema")} style={{padding:"8px 18px",fontSize:12,fontWeight:700,background:T.accent,color:"white",border:"none",borderRadius:9,cursor:"pointer",flexShrink:0}}>Next: Review Schema →</button>}
        </div>
        <div style={{display:"flex",gap:12,alignItems:"flex-start",flexWrap:"wrap"}}>
          <button onClick={onLoadData} style={{
            padding:"10px 22px", fontSize:13, fontWeight:700, borderRadius:9,
            background: hasData ? T.bg : T.accent,
            color: hasData ? T.textMid : "white",
            border:"2px solid "+(hasData ? T.borderMid : T.accent),
            cursor:"pointer", display:"flex", alignItems:"center", gap:8
          }}>
            <span>📂</span>{hasData ? "Load new data" : "Load data"}
          </button>
          {hasData&&(
            <div style={{padding:"10px 16px",background:T.greenBg,borderRadius:9,border:"1px solid "+T.greenMid,display:"flex",alignItems:"center",gap:10}}>
              <span style={{fontSize:20}}>✓</span>
              <div>
                <div style={{fontSize:13,fontWeight:700,color:T.green}}>{parsedData.length.toLocaleString()} rows loaded</div>
                <div style={{fontSize:11,color:T.textMute}}>{schema.filter(f=>f.type==="open-ended").length} open-ended · {schema.filter(f=>f.type==="categorical").length} categorical · {schema.filter(f=>f.type==="numeric").length} numeric</div>
              </div>
            </div>
          )}
        </div>

      </div>)}

      {/* ── SCHEMA sub-tab ───────────────────────────────────────────────── */}
      {sub==="schema"&&(<div style={{flex:1,overflow:"hidden",display:"flex",flexDirection:"column"}} className="fadein">
        {!hasData
          ? <div style={{padding:32}}><div style={{padding:"16px 20px",background:T.bg,borderRadius:10,border:"1px dashed "+T.border,fontSize:13,color:T.textMute,borderRadius:10}}>Load data first to configure schema.</div></div>
          : (<div style={{flex:1,overflow:"hidden",display:"flex",flexDirection:"column"}}>
              {/* Sticky header row: title + Select All / Ignore All + Next button */}
              <div style={{padding:"14px 24px 10px",borderBottom:"1px solid "+T.border,background:T.bgCard,flexShrink:0,display:"flex",alignItems:"center",justifyContent:"space-between",gap:12}}>
                <div>
                  <div style={{fontSize:16,fontWeight:800,color:T.text}}>Data Schema</div>
                  <div style={{fontSize:12,color:T.textMute,marginTop:1}}>{schema.length} fields detected</div>
                </div>
                <div style={{display:"flex",gap:8,alignItems:"center",flexShrink:0}}>
                  <button onClick={()=>schema.forEach(f=>onTypeChange(f.field,"open-ended"))} title="Mark all as open-ended"
                    style={{fontSize:11,fontWeight:700,padding:"5px 12px",borderRadius:7,background:T.bg,color:T.textMid,border:"1px solid "+T.borderMid,cursor:"pointer"}}>Select All</button>
                  <button onClick={()=>schema.forEach(f=>onTypeChange(f.field,"ignore"))} title="Ignore all fields"
                    style={{fontSize:11,fontWeight:700,padding:"5px 12px",borderRadius:7,background:T.bg,color:T.textMid,border:"1px solid "+T.borderMid,cursor:"pointer"}}>Ignore All</button>
                  {schemaOk&&<button onClick={()=>onNavigate&&onNavigate("thememodel")}
                    style={{padding:"7px 16px",fontSize:12,fontWeight:700,background:T.accent,color:"white",border:"none",borderRadius:9,cursor:"pointer"}}>Next: Theme Model →</button>}
                </div>
              </div>
              {/* Scrollable fields */}
              <div style={{flex:1,overflowY:"auto"}}>
                <SchemaTab schema={schema} onTypeChange={onTypeChange} scoreFields={scoreFields}
                  onToggleScore={onToggleScore} columnAliases={columnAliases} setAlias={setAlias}
                  catValueMaps={catValueMaps} setCatValueMaps={setCatValueMaps}
                  derivedFields={derivedFields||[]} setDerivedFields={setDerivedFields}
                  hideHeader={true}/>
              </div>
            </div>)
        }
      </div>)}
      {/* ── THEME MODEL sub-tab ──────────────────────────────────────────── */}
      {sub==="thememodel"&&(<div style={{flex:1,overflowY:"auto",padding:"32px 32px 60px"}} className="fadein">
        <h2 style={{fontSize:20,fontWeight:800,color:T.text,margin:"0 0 6px"}}>Theme Model</h2>
        <p style={{fontSize:13,color:T.textMid,margin:"0 0 24px",lineHeight:1.6}}>
          {!hasData ? "Load data first." : openFields.length===0 ? "Set at least one field to open-ended in Schema." : "Choose how to identify themes in your open-ended responses."}
        </p>

        {!hasData&&(
          <div style={{padding:"16px 20px",background:T.bg,borderRadius:10,border:"1px dashed "+T.border,fontSize:13,color:T.textFaint}}>
            Load data first, then configure your schema.
          </div>
        )}

        {hasData&&openFields.length===0&&(
          <div style={{padding:"16px 20px",background:T.amberBg,borderRadius:10,border:"1px solid "+T.amberMid,fontSize:13,color:T.amber}}>
            ⚠ No open-ended fields detected. Go to <button onClick={()=>onNavigate&&onNavigate("schema")} style={{fontWeight:700,color:T.accent,background:"none",border:"none",cursor:"pointer",padding:0,textDecoration:"underline"}}>Schema</button> and set a field type to <strong>open-ended</strong>.
          </div>
        )}

        {hasData&&openFields.length>0&&(<div>

          {/* Open-ended field selector */}
          {openFields.length>1&&(
            <div style={{marginBottom:20}}>
              <div style={{fontSize:11,fontWeight:700,color:T.textFaint,textTransform:"uppercase",letterSpacing:".07em",marginBottom:7}}>Field to analyse</div>
              <div style={{display:"flex",gap:7,flexWrap:"wrap"}}>
                {openFields.map(f=>(
                  <button key={f} onClick={()=>setActiveField(f)} style={{
                    padding:"6px 14px",fontSize:12,fontWeight:activeField===f?700:500,
                    background:activeField===f?T.accentBg:"transparent",
                    border:"1.5px solid "+(activeField===f?T.accent:T.border),
                    color:activeField===f?T.accent:T.textMid,borderRadius:8,cursor:"pointer"
                  }}>{columnAliases[f]||f}</button>
                ))}
              </div>
            </div>
          )}

          {/* AI Discovery */}
          <div style={{marginBottom:20}}>
            <div style={{fontSize:11,fontWeight:700,color:T.textFaint,textTransform:"uppercase",letterSpacing:".07em",marginBottom:8}}>AI Discovery</div>
            <div style={{background:aiActive?T.accentBg:T.bg,border:"1.5px solid "+(aiActive?T.accent:T.border),borderRadius:12,padding:"16px 18px"}}>
              <div style={{display:"flex",alignItems:"flex-start",gap:14,marginBottom:14}}>
                <span style={{fontSize:22,flexShrink:0}}>✦</span>
                <div style={{flex:1}}>
                  <div style={{fontSize:14,fontWeight:700,color:aiActive?T.accent:T.textMid,marginBottom:3}}>Discover themes using AI</div>
                  <div style={{fontSize:12,color:T.textMute,lineHeight:1.6}}>
                    {aiActive ? "Claude will read a sample of your responses and identify themes automatically." : "Connect your Claude API key to enable AI theme discovery."}
                  </div>
                </div>
                {!aiActive&&(
                  <button onClick={onOpenKey} style={{padding:"6px 14px",fontSize:11,fontWeight:700,background:T.amberBg,color:T.amber,border:"1px solid "+T.amberMid,borderRadius:8,cursor:"pointer",flexShrink:0}}>🔑 Connect AI</button>
                )}
              </div>
              <div style={{borderTop:"1px solid "+(aiActive?T.accentMid:T.border),paddingTop:14,marginBottom:14}}>
                <SamplingControl samplePct={samplePct} setSamplePct={setSamplePct}
                  parsedData={parsedData} activeField={activeField}
                  lastRunPct={lastRunPct} onRerun={onRerunCounts} themeSource={themeSource}/>
              </div>
              <button onClick={onMineThemes} disabled={loading||!aiActive} style={{
                width:"100%",padding:"10px 0",fontSize:13,fontWeight:700,
                background:(loading||!aiActive)?T.border:T.accent,
                color:(loading||!aiActive)?T.textFaint:"white",
                border:"none",borderRadius:9,cursor:(loading||!aiActive)?"not-allowed":"pointer",
                display:"flex",alignItems:"center",justifyContent:"center",gap:8,transition:"background .15s"
              }}>
                {loading?<><Spinner color="white"/>{" "}Mining themes…</>:"⟡ Generate Themes with AI"}
              </button>
              {loading&&(
                <div style={{marginTop:10,padding:"10px 14px",background:T.accentBg,borderRadius:8,border:"1px solid "+T.accentMid,fontSize:12,color:T.accent,display:"flex",alignItems:"center",gap:8}}>
                  <Spinner/> Sending responses to Claude… this may take up to 30 seconds.
                </div>
              )}
              {!loading&&error&&(
                <div style={{marginTop:10,padding:"10px 14px",background:T.redBg,borderRadius:8,border:"1px solid #fca5a5",fontSize:12,color:T.red}}>
                  ⚠ {error==="NO_API_KEY"?"No API key — click Connect AI above."
                    :error==="AUTH_ERROR"||error.startsWith("AUTH_ERROR")?"Invalid API key — check your key in Connect AI."
                    :error==="QUOTA_ERROR"||error.startsWith("QUOTA_ERROR")?"API quota exceeded — check your Anthropic account."
                    :error==="TIMEOUT_ERROR"?"Request timed out — try a smaller sample size."
                    :error}
                </div>
              )}
            </div>
          </div>

          {/* Industry libraries — multi-select */}
          <div style={{marginBottom:20}}>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:8,gap:8,flexWrap:"wrap"}}>
              <div style={{display:"flex",alignItems:"center",gap:8}}>
                <div style={{fontSize:11,fontWeight:700,color:T.textFaint,textTransform:"uppercase",letterSpacing:".07em"}}>Industry Theme Libraries</div>
                {checkedInds.size>0&&<span style={{fontSize:11,color:T.accent,fontWeight:600}}>{checkedInds.size} selected · {[...checkedInds].reduce((s,k)=>s+(INDUSTRY_THEMES[k]||[]).length,0)} themes</span>}
              </div>
              <div style={{display:"flex",gap:6}}>
                <button onClick={onOpenThemeEditor} style={{padding:"5px 12px",fontSize:11,fontWeight:600,background:"transparent",border:"1px dashed "+T.borderMid,borderRadius:7,color:T.textMid,cursor:"pointer"}}>✎ Customise…</button>
                <button onClick={applyCheckedInds} disabled={!checkedInds.size} style={{padding:"5px 14px",fontSize:11,fontWeight:700,borderRadius:7,border:"none",background:checkedInds.size?T.accent:T.border,color:checkedInds.size?"white":T.textFaint,cursor:checkedInds.size?"pointer":"not-allowed",transition:"all .15s",whiteSpace:"nowrap"}}>{checkedInds.size?("Apply "+(checkedInds.size===1?"library":checkedInds.size+" libraries")):"Select to apply"}</button>
              </div>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(200px,1fr))",gap:8}}>
              {industries.map(ind=>{
                const activeSources=themes&&themes.sources?themes.sources:[];
                const isApplied=themeSource==="industry"&&activeSources.includes(ind);
                const isChecked=checkedInds.has(ind);
                return(
                  <button key={ind} onClick={()=>toggleInd(ind)} style={{
                    display:"flex",alignItems:"center",gap:10,padding:"12px 14px",
                    background:isChecked?T.accentBg:isApplied?T.greenBg:T.bgCard,
                    border:"1.5px solid "+(isChecked?T.accent:isApplied?T.green:T.border),
                    borderRadius:10,cursor:"pointer",textAlign:"left",transition:"all .15s"
                  }}>
                    <div style={{width:16,height:16,borderRadius:3,flexShrink:0,
                      border:"2px solid "+(isChecked?T.accent:T.borderMid),
                      background:isChecked?T.accent:"transparent",
                      display:"flex",alignItems:"center",justifyContent:"center",transition:"all .15s"}}>
                      {isChecked&&<span style={{color:"white",fontSize:10,fontWeight:800,lineHeight:1}}>✓</span>}
                    </div>
                    <span style={{fontSize:20,flexShrink:0}}>{ICONS[ind]||"📋"}</span>
                    <div style={{minWidth:0,flex:1}}>
                      <div style={{fontSize:12,fontWeight:700,color:isChecked?T.accent:isApplied?T.green:T.text,lineHeight:1.3}}>{ind}</div>
                      <div style={{fontSize:10,color:T.textFaint,marginTop:2}}>{INDUSTRY_THEMES[ind].length} themes{isApplied?" · applied":""}</div>
                    </div>
                  </button>
                );
              })}
            </div>
          </div>

          {/* Applied theme status */}
          {themes&&(
            <div style={{padding:"12px 16px",background:T.greenBg,borderRadius:10,border:"1px solid "+T.greenMid,display:"flex",alignItems:"center",gap:10}}>
              <span style={{fontSize:18}}>✓</span>
              <div>
                <div style={{fontSize:13,fontWeight:700,color:T.green}}>Theme model applied — {themes.themes.length} themes</div>
                <div style={{fontSize:11,color:T.textMute}}>All analysis tabs are now unlocked.</div>
              </div>
            </div>
          )}
        </div>)}
      </div>)}

    </div>
  );
}

function SchemaTab({schema,onTypeChange,scoreFields,onToggleScore,columnAliases,setAlias,catValueMaps,setCatValueMaps,derivedFields,setDerivedFields,hideHeader}){
  const [expandedFields,setExpandedFields]=useState({});
  const toggleExpand=(field)=>setExpandedFields(prev=>({...prev,[field]:!prev[field]}));
  const PREVIEW_COLS=8;
  // Derivation helpers
  const getDerived=(field)=>(derivedFields||[]).find(d=>d.sourceField===field);
  const addDerived=(field,type,label)=>{
    if(!setDerivedFields)return;
    setDerivedFields(prev=>[...prev.filter(d=>d.sourceField!==field),{sourceField:field,derivedField:label,type}]);
  };
  const removeDerivedField=(field)=>{
    if(!setDerivedFields)return;
    setDerivedFields(prev=>prev.filter(d=>d.sourceField!==field));
  };
  // Bulk button states
  const allIgnored=schema.length>0&&schema.every(f=>f.type==="ignore");
  const allSelected=schema.length>0&&schema.every(f=>f.type!=="ignore");

  const bulkBtnStyle=(active)=>({fontSize:11,fontWeight:700,padding:"5px 12px",borderRadius:7,
    background:active?T.accent:(mixed?"transparent":T.bg),
    color:active?"white":(mixed?T.textMute:T.textMid),
    border:"2px solid "+(active?T.accent:(mixed?T.border:T.borderMid)),
    cursor:"pointer",whiteSpace:"nowrap",transition:"all .15s",opacity:mixed?0.45:1});
  const showValues=(f)=>{
    const vals=f.values||[];
    const isExpanded=!!expandedFields[f.field];

    return(<div style={{marginTop:10}}>
      <SectionLabel>Values ({vals.length})</SectionLabel>
      <div style={{display:"flex",flexWrap:"wrap",gap:5}}>
        {shown.map(v=><span key={v} style={{fontSize:12,padding:"3px 10px",background:T.bg,color:T.textMid,borderRadius:6,border:"1px solid "+T.border,whiteSpace:"nowrap"}}>{v}</span>)}
        {!isExpanded&&hidden>0&&<button onClick={()=>toggleExpand(f.field)} style={{fontSize:12,padding:"3px 10px",background:T.accentBg,color:T.accent,borderRadius:6,border:"1px solid "+T.accentMid,cursor:"pointer",fontWeight:600}}>+{hidden} more</button>}
      </div>
      {isExpanded&&vals.length>PREVIEW_COLS&&<button onClick={()=>toggleExpand(f.field)} style={{fontSize:11,fontWeight:600,color:T.textMute,background:"transparent",border:"none",cursor:"pointer",marginTop:6,padding:0}}>▲ show less</button>}
    </div>);
  };
  return(<div style={{padding:hideHeader?0:24,overflowY:hideHeader?"visible":"auto",height:hideHeader?"auto":"100%"}}>
    {!hideHeader&&(<div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",marginBottom:22}}>
      <div><h2 style={{fontSize:20,fontWeight:800,color:T.text,margin:"0 0 6px"}}>Data Schema</h2><p style={{fontSize:13,color:T.textMid,margin:"0 0 20px",lineHeight:1.6}}>Review detected field types. Open-ended fields will be analysed for themes.</p></div>
      <div style={{display:"flex",gap:6,flexShrink:0,marginLeft:16}}>
        <button onClick={()=>schema.forEach(f=>onTypeChange(f.field,"open-ended"))} title="Mark all as open-ended" style={{fontSize:11,fontWeight:700,padding:"5px 12px",borderRadius:7,background:T.bg,color:T.textMid,border:"1px solid "+T.borderMid,cursor:"pointer"}}>Select All</button>
        <button onClick={()=>schema.forEach(f=>onTypeChange(f.field,"ignore"))} title="Ignore all fields" style={{fontSize:11,fontWeight:700,padding:"5px 12px",borderRadius:7,background:T.bg,color:T.textMid,border:"1px solid "+T.borderMid,cursor:"pointer"}}>Ignore All</button>
      </div>
    </div>)}
    {/* Active derived fields summary */}
    {derivedFields&&derivedFields.length>0&&(
      <div style={{display:"flex",flexWrap:"wrap",gap:8,alignItems:"center",marginBottom:20,padding:"10px 16px",background:T.greenBg,borderRadius:10,border:"1px solid "+T.greenMid}}>
        <span style={{fontSize:11,fontWeight:700,color:T.green,textTransform:"uppercase",letterSpacing:".07em",marginRight:4}}>Derived fields active:</span>
        {derivedFields.map(d=>(
          <span key={d.sourceField} style={{display:"inline-flex",alignItems:"center",gap:5,fontSize:12,fontWeight:600,padding:"3px 10px",background:"white",border:"1px solid "+T.greenMid,borderRadius:12,color:T.green}}>
            {d.sourceField} → {d.derivedField}
            <button onClick={()=>setDerivedFields&&setDerivedFields(prev=>prev.filter(x=>x.sourceField!==d.sourceField))} style={{background:"none",border:"none",cursor:"pointer",color:T.textFaint,fontSize:13,lineHeight:1,padding:0}}>×</button>
          </span>
        ))}
      </div>
    )}
    <div style={{padding:hideHeader?"16px 24px 24px":0}}>
    {schema.map(f=>(<Card key={f.field} style={{padding:"16px 18px",marginBottom:12}}>
      <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:14}}>
        <div style={{width:36,height:36,borderRadius:9,background:TYPE_BG[f.type]||"#f9fafb",display:"flex",alignItems:"center",justifyContent:"center",fontSize:16,color:TYPE_COLOR[f.type]||T.textMute,flexShrink:0}}>{TYPE_ICON[f.type]||"?"}</div>
        <div style={{flex:1}}><div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}><div style={{fontSize:15,fontWeight:700,color:T.text}}>{f.field}</div>{columnAliases&&columnAliases[f.field]&&<span style={{fontSize:11,fontWeight:600,color:T.accent,background:T.accentBg,padding:"2px 8px",borderRadius:10,border:"1px solid "+T.accentMid}}>→ {columnAliases[f.field]}</span>}</div><div style={{fontSize:11,color:T.textMute,marginTop:1}}>{f.nonNullCount} values · avg {f.avgLen} chars · avg {f.avgWords} words · {f.uniqueRatio}% unique</div></div>

            <button onClick={()=>{const cfg=catValueMaps[f.field];setCatValueMaps(prev=>({...prev,[f.field]:{...cfg,useForScoring:!cfg.useForScoring}}));}} style={{fontSize:10,fontWeight:700,padding:"3px 9px",borderRadius:20,background:(catValueMaps[f.field].useForScoring)?T.accent:T.bg,color:(catValueMaps[f.field].useForScoring)?"white":T.textMute,border:"1px solid "+((catValueMaps[f.field].useForScoring)?T.accent:T.border),cursor:"pointer",whiteSpace:"nowrap"}}>📊 {catValueMaps[f.field].useForScoring?"Scoring metric":"Use for scoring"}</button>

      {f.type==="open-ended"&&<div style={{marginTop:10}}>{(f.sample||[]).slice(0,3).map((s,i)=><div key={i} style={{fontSize:12,color:T.textMid,background:T.bg,borderRadius:7,padding:"8px 12px",marginBottom:6,lineHeight:1.6,borderLeft:"3px solid "+T.accentMid}}>"{String(s).slice(0,160)}{String(s).length>160?"…":""}"</div>)}</div>}
      {(f.type==="categorical")&&(<div>
        {showValues(f)}
        {catValueMaps&&setCatValueMaps&&(()=>{
          const cfg=catValueMaps[f.field]||{map:{},mode:"categorical",useForScoring:false};
          const isNumMode=cfg.mode==="numeric";
          const vals=f.values||[];
          const setMap=(v,num)=>setCatValueMaps(prev=>({...prev,[f.field]:{...cfg,map:{...cfg.map,[v]:num}}}));
          const toggleMode=()=>setCatValueMaps(prev=>({...prev,[f.field]:{...cfg,mode:isNumMode?"categorical":"numeric"}}));
          const clearMap=()=>setCatValueMaps(prev=>{const n={...prev};delete n[f.field];return n;});
          const allMapped=vals.length>0&&vals.every(v=>(cfg.map[v]!=null&&cfg.map[v]!==""));
          return(<div style={{marginTop:14,paddingTop:14,borderTop:"1px solid "+T.border}}>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10,gap:8}}>
              <SectionLabel style={{margin:0}}>Value Mapping <span style={{fontWeight:400,color:T.textFaint}}>(optional numeric scale)</span></SectionLabel>
              <div style={{display:"flex",gap:6,alignItems:"center"}}>
                {isNumMode&&allMapped&&<span style={{fontSize:10,color:T.green,fontWeight:700}}>✓ fully mapped</span>}
                <button onClick={toggleMode} style={{fontSize:10,fontWeight:700,padding:"3px 10px",borderRadius:12,cursor:"pointer",background:isNumMode?T.accentBg:T.bg,color:isNumMode?T.accent:T.textMid,border:"1px solid "+(isNumMode?T.accent:T.borderMid)}}>
                  {isNumMode?"⇄ Numeric mode":"⇄ Enable mapping"}
                </button>
                {isNumMode&&<button onClick={clearMap} style={{fontSize:10,fontWeight:600,padding:"3px 8px",borderRadius:12,cursor:"pointer",background:"transparent",color:T.textFaint,border:"1px solid "+T.border}}>Clear</button>}
              </div>
            </div>
            {isNumMode?(
              <div style={{display:"flex",flexDirection:"column",gap:6}}>
                <div style={{fontSize:11,color:T.textMute,marginBottom:4,lineHeight:1.5}}>Assign a number to each value. The mapped field appears as numeric in Charts and Filters.</div>
                {vals.map(v=>{
                  const cur=cfg.map[v]!=null?cfg.map[v]:"";
                  return(<div key={v} style={{display:"flex",alignItems:"center",gap:10}}>
                    <span style={{flex:1,fontSize:12,color:T.textMid,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",minWidth:0}}>{v}</span>
                    <span style={{fontSize:12,color:T.textFaint}}>→</span>
                    <input type="number" value={cur} placeholder="#" onChange={e=>setMap(v,e.target.value)}
                      style={{width:72,padding:"4px 8px",fontSize:12,border:"1px solid "+(cur!==""?T.accent:T.border),borderRadius:6,background:cur!==""?T.accentBg:T.bg,color:T.text,outline:"none",textAlign:"right",fontFamily:"inherit"}}/>
                  </div>);
                })}
                <div style={{marginTop:8,paddingTop:8,borderTop:"1px solid "+T.border}}>

                      style={{width:12,height:12,accentColor:T.accent,cursor:"pointer"}}/>
                    Use as scoring metric (appears in Score Driver chart)
                  </label>
                </div>
              </div>
            ):(
              <div style={{fontSize:11,color:T.textFaint,fontStyle:"italic"}}>Enable mapping to assign numeric values to each category — useful for Likert scales or any ordered scale.</div>
            )}
          </div>);
        })()}
      </div>)}
      {f.type==="date"&&<div style={{marginTop:10}}><SectionLabel>Date Range</SectionLabel><div style={{fontSize:14,fontWeight:700,color:T.text}}>{f.rangeMin||(f.values&&f.values[0])||"?"} → {f.rangeMax||(f.values&&f.values[f.values.length-1])||"?"}</div></div>}
      {f.type==="numeric"&&(<div>
        <div style={{display:"flex",gap:28,marginTop:10,marginBottom:14}}>{[["Min",f.min],["Max",f.max],["Avg",f.avg]].map(([l,v])=><div key={l}><div style={{fontSize:22,color:T.green,fontWeight:800}}>{v}</div><div style={{fontSize:11,color:T.textMute,textTransform:"uppercase",letterSpacing:".06em",fontWeight:600}}>{l}</div></div>)}</div>
        {(()=>{
          const existing=getDerived(f.field);
          const lname=f.field.toLowerCase();
          const isAgeLike=/\bage\b|^age$/.test(lname)&&f.min>=0&&f.max<=120;
          const isYobLike=/(year.?of.?birth|yob|birth.?year|born)/i.test(lname)&&f.min>=1900&&f.max<=2030;
          const canDerive=isAgeLike||isYobLike;
          if(!canDerive&&!existing)return null;
          return(<div style={{borderTop:"1px solid "+T.border,paddingTop:12}}>
            <SectionLabel>Derive Categorical Field</SectionLabel>
            {existing?(
              <div style={{display:"flex",alignItems:"center",gap:10,flexWrap:"wrap"}}>
                <span style={{fontSize:12,fontWeight:600,padding:"4px 12px",background:T.greenBg,border:"1px solid "+T.greenMid,borderRadius:20,color:T.green,display:"flex",alignItems:"center",gap:6}}>
                  ✓ {f.field} → {existing.derivedField}
                  <button onClick={()=>removeDerivedField(f.field)} style={{background:"none",border:"none",cursor:"pointer",color:T.textFaint,fontSize:13,lineHeight:1,padding:0}}>×</button>
                </span>
                <span style={{fontSize:11,color:T.textFaint}}>Available as a categorical field in all charts, filters & compare</span>
              </div>
            ):(
              <div style={{display:"flex",flexWrap:"wrap",gap:8,alignItems:"center"}}>
                <span style={{fontSize:12,color:T.textMid}}>Auto-detected:</span>
                {isAgeLike&&<button onClick={()=>addDerived(f.field,"age","Age Group")} style={{fontSize:12,fontWeight:600,padding:"5px 12px",background:T.blueBg,color:T.blue,border:"1px solid "+T.blue+"40",borderRadius:7,cursor:"pointer"}}>+ Create Age Group field</button>}
                {isYobLike&&<button onClick={()=>addDerived(f.field,"yob","Generation")} style={{fontSize:12,fontWeight:600,padding:"5px 12px",background:T.purpleBg,color:T.purple,border:"1px solid "+T.purple+"40",borderRadius:7,cursor:"pointer"}}>+ Create Generation field</button>}
              </div>
            )}
          </div>);
        })()}
      </div>)}
      {(f.type==="id"||f.type==="ignore")&&<div style={{marginTop:10}}>{(()=>{const vals=f.values||(f.sample?[...new Set(f.sample)]:[])||(f.unique||[]);const shown=vals.slice(0,PREVIEW_COLS);const hidden=vals.length-PREVIEW_COLS;const isExpanded=!!expandedFields[f.field];return(<div><div style={{fontSize:12,color:T.textFaint,fontStyle:"italic",marginBottom:6}}>{f.type==="id"?"Identifier field — excluded":"Field excluded from analysis"}</div>{shown.length>0&&<div style={{display:"flex",flexWrap:"wrap",gap:5,marginTop:4}}>{(isExpanded?vals:shown).map(v=><span key={v} style={{fontSize:11,padding:"2px 8px",background:"#f9fafb",color:T.textFaint,borderRadius:5,border:"1px solid "+T.border}}>{v}</span>)}{!isExpanded&&hidden>0&&<button onClick={()=>toggleExpand(f.field)} style={{fontSize:11,padding:"2px 8px",background:T.accentBg,color:T.accent,borderRadius:5,border:"1px solid "+T.accentMid,cursor:"pointer",fontWeight:600}}>+{hidden} more</button>}{isExpanded&&<button onClick={()=>toggleExpand(f.field)} style={{fontSize:11,fontWeight:600,color:T.textMute,background:"transparent",border:"none",cursor:"pointer",padding:"2px 0"}}>▲ less</button>}</div>}</div>);})()} </div>}
    </Card>))}
    </div>
  </div>);
}

function SigBadge({p}){const s=sigLabel(p);return<span style={{fontSize:11,fontWeight:700,padding:"2px 8px",borderRadius:20,background:s.bg,color:s.color,border:"1px solid "+s.border}}>{s.stars}</span>;}
function BottomLine({text}){if(!text)return null;return<div style={{marginTop:18,background:T.accentBg,border:"1px solid "+T.accentMid,borderLeft:"3px solid "+T.accent,borderRadius:8,padding:"12px 16px",fontSize:13,lineHeight:1.7,color:T.textMid}}><div style={{fontSize:10,fontWeight:700,letterSpacing:".09em",textTransform:"uppercase",color:T.accent,marginBottom:4}}>◆ Bottom Line</div>{text}</div>;}
function StatRow({label,value,sub}){return<div style={{display:"flex",alignItems:"baseline",justifyContent:"space-between",padding:"6px 0",borderBottom:"1px solid "+T.border}}><span style={{fontSize:12,color:T.textMute}}>{label}</span><div style={{textAlign:"right"}}><span style={{fontSize:13,fontWeight:600,color:T.text,fontFamily:"monospace"}}>{value}</span>{sub&&<span style={{fontSize:11,color:T.textFaint,marginLeft:6}}>{sub}</span>}</div></div>;}
function StatPanelHeader({icon,title,desc}){return<div style={{marginBottom:24,paddingBottom:18,borderBottom:"1px solid "+T.border}}><div style={{display:"flex",alignItems:"center",gap:10}}><div style={{width:36,height:36,borderRadius:9,background:T.accentBg,display:"flex",alignItems:"center",justifyContent:"center",fontSize:16,color:T.accent,border:"1px solid "+T.accentMid,flexShrink:0}}>{icon}</div><div><h2 style={{fontSize:18,fontWeight:800,color:T.text,letterSpacing:"-.3px",margin:0}}>{title}</h2><p style={{fontSize:12,color:T.textMute,margin:"2px 0 0"}}>{desc}</p></div></div></div>;}
function StatsEmpty({icon,msg,sub}){return<div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"60px 40px",gap:12,color:T.textFaint}}><div style={{fontSize:40}}>{icon}</div><div style={{fontSize:15,fontWeight:700,color:T.textMid}}>{msg}</div>{sub&&<div style={{fontSize:13,color:T.textMute,textAlign:"center",maxWidth:360,lineHeight:1.6}}>{sub}</div>}</div>;}
function FieldPill({label,active,onClick}){return<button onClick={onClick} style={{padding:"5px 14px",fontSize:12,fontWeight:active?700:500,background:active?T.accentBg:"transparent",border:"1px solid "+(active?T.accent:T.border),color:active?T.accent:T.textMid,borderRadius:20,cursor:"pointer",transition:"all .12s",whiteSpace:"nowrap"}}>{label}</button>;}
function DSSelect({label,value,onChange,options,style}){return<div style={style}>{label&&<div style={{fontSize:11,fontWeight:700,color:T.textFaint,letterSpacing:".08em",textTransform:"uppercase",marginBottom:5}}>{label}</div>}<select value={value} onChange={e=>onChange(e.target.value)} style={{width:"100%",padding:"7px 10px",fontSize:13,border:"1px solid "+T.border,borderRadius:7,background:T.bgCard,color:T.text,outline:"none",cursor:"pointer"}}>{sortOpts(options).map(o=><option key={o.v} value={o.v}>{o.l}</option>)}</select></div>;}
const DSChart=memo(function DSChart({data,layout,style}){
  const ref=useRef();const mounted=useRef(false);
  useEffect(()=>{
    if(!ref.current)return;
    const base={paper_bgcolor:"transparent",plot_bgcolor:"transparent",font:{family:"Inter,system-ui,sans-serif",color:T.textMute,size:11},margin:{t:16,r:20,b:48,l:56},xaxis:{gridcolor:T.border,zerolinecolor:T.borderMid,linecolor:T.border,tickfont:{size:11}},yaxis:{gridcolor:T.border,zerolinecolor:T.borderMid,linecolor:T.border,tickfont:{size:11}}};
    const l={...base,...layout,xaxis:{...base.xaxis,...layout?.xaxis},yaxis:{...base.yaxis,...layout?.yaxis}};
    if(!mounted.current){Plotly.newPlot(ref.current,data,l,{displayModeBar:false,responsive:true});mounted.current=true;}
    else Plotly.react(ref.current,data,l,{displayModeBar:false,responsive:true});
    return()=>{try{if(ref.current&&mounted.current){Plotly.purge(ref.current);mounted.current=false;}}catch(e){}};
  },[data,layout]);
  return<div ref={ref} style={{width:"100%",...style}}/>;
});

// DESCRIPTIVES PANEL
// ─────────────────────────────────────────────────────────────────────────────
function DescriptivesPanel({schema,filteredData,selField,setSelField}){
  const numFields=schema.filter(f=>f.type==="numeric"&&f.status!=="ignored");
  const sel=selField;
  const setSel=setSelField;
  useEffect(()=>{if(!sel&&numFields.length)setSelField(numFields[0].field);},[numFields.length]);
  const stats=useMemo(()=>{
    if(!sel||!filteredData.length)return null;
    const vals=_getNum(sel,filteredData);if(!vals.length)return null;
    const mn=_mean(vals),med=_median(vals),sd_=_std(vals),q1=_quantile(vals,.25),q3=_quantile(vals,.75);
    const[vmin,vmax]=[Math.min(...vals),Math.max(...vals)];
    const skew=_skewness(vals),kurt=_kurtosis(vals),sw=_shapiroWilk(vals.slice(0,5000));
    return{n:vals.length,mn,med,sd:sd_,q1,q3,min:vmin,max:vmax,range:vmax-vmin,iqr:q3-q1,skew,kurt,sw,cv:Math.abs(mn)>0?sd_/Math.abs(mn)*100:NaN,vals};
  },[sel,filteredData]);
  if(!numFields.length)return<StatsEmpty icon="📊" msg="No numeric fields active" sub="Load data with numeric columns, or use the Schema tab to map categorical values to numbers (e.g. Likert scales)."/>;
  return<div className="fadein">
    {stats&&<BottomLine text={_descBL(sel,stats)}/>}
    <StatPanelHeader icon="∑" title="Descriptive Statistics" desc="Summary statistics, distribution shape, and normality tests for each numeric variable."/>
    <div style={{display:"flex",flexWrap:"wrap",gap:8,marginBottom:20}}>
      {numFields.map(f=><FieldPill key={f.field} label={f.field} active={sel===f.field} onClick={()=>setSel(f.field)}/>)}
    </div>
    {stats&&<div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:20}}>
      <Card style={{padding:0,overflow:"hidden"}}>
        <div style={{padding:"12px 18px",borderBottom:"1px solid "+T.border,fontSize:13,fontWeight:700,color:T.text}}>{sel} <span style={{fontWeight:400,color:T.textFaint,fontSize:11}}>— {stats.n} observations</span></div>
        <div style={{padding:"2px 16px 12px"}}>
          <StatRow label="Mean" value={fmtN(stats.mn)}/><StatRow label="Median" value={fmtN(stats.med)}/><StatRow label="Std. Dev." value={fmtN(stats.sd)}/><StatRow label="Variance" value={fmtN(stats.sd**2)}/><StatRow label="Min" value={fmtN(stats.min)}/><StatRow label="Max" value={fmtN(stats.max)}/><StatRow label="Range" value={fmtN(stats.range)}/><StatRow label="Q1 (25th pct)" value={fmtN(stats.q1)}/><StatRow label="Q3 (75th pct)" value={fmtN(stats.q3)}/><StatRow label="IQR" value={fmtN(stats.iqr)}/><StatRow label="CV (%)" value={isNaN(stats.cv)?"—":fmtN(stats.cv)+"%"}/><StatRow label="Skewness" value={fmtN(stats.skew)} sub={Math.abs(stats.skew)<0.5?"symmetric":stats.skew>0?"right tail":"left tail"}/><StatRow label="Excess Kurtosis" value={fmtN(stats.kurt)} sub={Math.abs(stats.kurt)<1?"mesokurtic":stats.kurt>0?"leptokurtic":"platykurtic"}/>
        </div>
        <div style={{padding:"10px 16px 14px",borderTop:"1px solid "+T.border,background:T.bg,borderBottomLeftRadius:12,borderBottomRightRadius:12}}>
          <div style={{fontSize:11,fontWeight:700,color:T.textFaint,letterSpacing:".08em",textTransform:"uppercase",marginBottom:8}}>Shapiro-Wilk Normality</div>
          {stats.sw&&!isNaN(stats.sw.W)?<div style={{display:"flex",alignItems:"center",gap:14,flexWrap:"wrap"}}>
            <StatRow label="W statistic" value={fmt4(stats.sw.W)}/><StatRow label={fmtP(stats.sw.p)} value={<SigBadge p={stats.sw.p}/>}/>
            <span style={{fontSize:12,fontWeight:700,color:stats.sw.p>0.05?T.green:T.red}}>{stats.sw.p>0.05?"✓ Normal":"✗ Non-normal"}</span>
          </div>:<div style={{fontSize:12,color:T.textFaint,fontStyle:"italic"}}>n &lt; 3</div>}
        </div>
      </Card>
      <div style={{display:"flex",flexDirection:"column",gap:16}}>
        <Card style={{padding:"14px 16px"}}>
          <div style={{fontSize:11,fontWeight:700,color:T.textFaint,letterSpacing:".08em",textTransform:"uppercase",marginBottom:8}}>Distribution</div>
          <DSChart data={[{x:stats.vals,type:"histogram",marker:{color:T.accent,opacity:.8,line:{color:T.accentMid,width:1}},nbinsx:Math.min(50,Math.ceil(Math.sqrt(stats.n)))}]} layout={{xaxis:{title:{text:sel,font:{size:11}}},yaxis:{title:{text:"Count",font:{size:11}}},bargap:.04,showlegend:false,margin:{t:10,r:16,b:44,l:48}}} style={{height:220}}/>
        </Card>
        <Card style={{padding:"14px 16px",background:T.bg}}>
          <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:10}}>
            {[{l:"Mean",v:fmtN(stats.mn),c:T.accent},{l:"Median",v:fmtN(stats.med),c:T.purple},{l:"SD",v:fmtN(stats.sd),c:T.amber},{l:"Skew",v:fmtN(stats.skew),c:Math.abs(stats.skew)<0.5?T.green:T.amber},{l:"Kurt",v:fmtN(stats.kurt),c:T.textMid},{l:"n",v:stats.n.toLocaleString(),c:T.blue}]
            .map(s=><div key={s.l} style={{textAlign:"center",padding:"10px 6px",background:T.bgCard,borderRadius:8,border:"1px solid "+T.border}}>
              <div style={{fontSize:17,fontWeight:800,color:s.c,fontFamily:"monospace"}}>{s.v}</div>
              <div style={{fontSize:10,color:T.textFaint,textTransform:"uppercase",letterSpacing:".07em",marginTop:3}}>{s.l}</div>
            </div>)}
          </div>
        </Card>
      </div>
    </div>}
  </div>;
}

// ─────────────────────────────────────────────────────────────────────────────
// CORRELATIONS PANEL
// ─────────────────────────────────────────────────────────────────────────────
function CorrelationsPanel({schema,filteredData,corrType,setCorrType,selCell,setSelCell}){
  const numFields=schema.filter(f=>f.type==="numeric"&&f.status!=="ignored");
  const matrix=useMemo(()=>{
    if(numFields.length<2)return null;
    const fields=numFields.map(f=>f.field),fn=corrType==="pearson"?_pearsonR:_spearmanR;
    return{fields,mat:fields.map(f1=>fields.map(f2=>{if(f1===f2)return{r:1,p:0,n:_getNum(f1,filteredData).length};const v1=_getNum(f1,filteredData),v2=_getNum(f2,filteredData),n=Math.min(v1.length,v2.length);return fn(v1.slice(0,n),v2.slice(0,n));}))};
  },[numFields,filteredData,corrType]);
  const scatter=useMemo(()=>{
    if(!selCell)return null;
    const{f1,f2}=selCell,v1=_getNum(f1,filteredData),v2=_getNum(f2,filteredData),n=Math.min(v1.length,v2.length);
    const x=v1.slice(0,n),y=v2.slice(0,n),mx=_mean(x),my=_mean(y);
    const slope=x.reduce((s,v,i)=>s+(v-mx)*(y[i]-my),0)/x.reduce((s,v)=>s+(v-mx)**2,0);
    const[xmn,xmx]=[Math.min(...x),Math.max(...x)];return{x,y,slope,int:my-slope*mx,xmn,xmx};
  },[selCell,filteredData]);
  function cellBg(r){if(isNaN(r)||r===1)return T.bg;const a=Math.abs(r);if(r>0)return`rgb(${Math.round(255-a*200)},${Math.round(240-a*100)},${Math.round(255-a*200)})`;return`rgb(${Math.round(255-a*10)},${Math.round(240-a*180)},${Math.round(235-a*180)})`;}
  if(numFields.length<2)return<StatsEmpty icon="⊞" msg="Need at least 2 numeric fields" sub="Activate more numeric fields, or map Likert scales to numbers in the Schema tab."/>;
  return<div className="fadein">
    <StatPanelHeader icon="⊕" title="Correlation Matrix" desc="Pearson r or Spearman ρ between all active numeric variables. Click any cell to see the scatter plot."/>
    {selCell&&<BottomLine text={_corrBL(selCell.f1,selCell.f2,selCell.r,selCell.p,selCell.n,corrType)}/>}
    <div style={{display:"flex",gap:8,marginBottom:18,alignItems:"center"}}>
      <span style={{fontSize:11,fontWeight:600,color:T.textMute,textTransform:"uppercase",letterSpacing:".07em"}}>Method:</span>
      {[["pearson","Pearson r"],["spearman","Spearman ρ"]].map(([v,l])=>(<FieldPill key={v} label={l} active={corrType===v} onClick={()=>{setCorrType(v);setSelCell(null);}}/>))}
    </div>
    <div style={{display:"grid",gridTemplateColumns:selCell?"1fr 1fr":"1fr",gap:20}}>
      <Card style={{padding:0,overflow:"auto"}}>
        <table style={{borderCollapse:"collapse",width:"100%"}}>
          <thead><tr><th style={{padding:"10px 12px",fontSize:10,color:T.textFaint,background:T.bg,minWidth:100,textAlign:"left"}}/>{matrix.fields.map(f=><th key={f} style={{padding:"10px 10px",fontSize:10,fontWeight:700,color:T.textMute,textTransform:"uppercase",background:T.bg,textAlign:"center",maxWidth:80,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}} title={f}>{f.slice(0,10)}</th>)}</tr></thead>
          <tbody>{matrix.fields.map((f1,i)=>(<tr key={f1}><td style={{padding:"8px 12px",fontSize:11,fontWeight:600,color:T.textMute,background:T.bg,borderRight:"1px solid "+T.border,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis",maxWidth:100}} title={f1}>{f1.slice(0,14)}</td>
            {matrix.fields.map((f2,j)=>{const cell=matrix.mat[i][j],isDiag=i===j,isSel=selCell&&selCell.i===i&&selCell.j===j;return<td key={f2} onClick={()=>!isDiag&&setSelCell({i,j,f1,f2,...cell})} style={{padding:"11px 10px",textAlign:"center",background:isDiag?T.bg:cellBg(cell.r),cursor:isDiag?"default":"pointer",outline:isSel?"2px solid "+T.accent:"none",outlineOffset:-2,transition:"filter .1s",userSelect:"none"}} onMouseEnter={e=>!isDiag&&(e.currentTarget.style.filter="brightness(.92)")} onMouseLeave={e=>e.currentTarget.style.filter=""}><div style={{fontSize:12,fontWeight:700,fontFamily:"monospace",color:isDiag?T.textFaint:T.text}}>{isDiag?"—":fmt2(cell.r)}</div>{!isDiag&&cell.p<0.05&&<div style={{fontSize:9,color:T.accent,marginTop:1}}>{sigLabel(cell.p).stars}</div>}</td>;})}
          </tr>))}</tbody>
        </table>
        <div style={{padding:"8px 14px",borderTop:"1px solid "+T.border,display:"flex",gap:14,alignItems:"center",flexWrap:"wrap"}}>
          {[["#c6efce","Strong +ve"],["#e2f0d9","Moderate +"],["#f4f5f7","Near 0"],["#fde68a","Moderate –"],["#fca5a5","Strong –ve"]].map(([c,l])=>(<div key={l} style={{display:"flex",alignItems:"center",gap:4}}><div style={{width:12,height:12,borderRadius:2,background:c,border:"1px solid "+T.border}}/><span style={{fontSize:10,color:T.textFaint}}>{l}</span></div>))}
        </div>
      </Card>
      {selCell&&scatter&&<div className="slidein">
        <Card style={{padding:"16px 18px",marginBottom:16}}>
          <div style={{fontSize:13,fontWeight:700,color:T.text,marginBottom:12}}>{selCell.f1} × {selCell.f2}</div>
          <div style={{display:"flex",gap:16,marginBottom:14,flexWrap:"wrap",alignItems:"center"}}>
            {[{l:corrType==="pearson"?"r":"ρ",v:fmt2(selCell.r),c:Math.abs(selCell.r)>0.5?T.green:T.amber},{l:"p",v:fmtP(selCell.p).replace("p = ","").replace("p < ","<"),c:selCell.p<0.05?T.green:T.textFaint},{l:"R²",v:fmt2(selCell.r**2),c:T.accent},{l:"n",v:selCell.n,c:T.textMid}].map(s=><div key={s.l} style={{textAlign:"center"}}><div style={{fontSize:17,fontWeight:800,fontFamily:"monospace",color:s.c}}>{s.v}</div><div style={{fontSize:10,color:T.textFaint,textTransform:"uppercase",letterSpacing:".07em"}}>{s.l}</div></div>)}
            <SigBadge p={selCell.p}/>
          </div>
          <DSChart data={[{x:scatter.x,y:scatter.y,mode:"markers",type:"scatter",marker:{color:T.accent,size:5,opacity:.5},name:"Data"},{x:[scatter.xmn,scatter.xmx],y:[scatter.int+scatter.slope*scatter.xmn,scatter.int+scatter.slope*scatter.xmx],mode:"lines",line:{color:T.red,width:2,dash:"dot"},showlegend:false}]} layout={{xaxis:{title:{text:selCell.f1,font:{size:11}}},yaxis:{title:{text:selCell.f2,font:{size:11}}},showlegend:false,margin:{t:8,r:12,b:46,l:50}}} style={{height:260}}/>
        </Card>
      </div>}
    </div>
  </div>;
}

// ─────────────────────────────────────────────────────────────────────────────
// GROUP TESTS PANEL
// ─────────────────────────────────────────────────────────────────────────────
function GroupTestsPanel({schema,filteredData,testType,setTestType,numF,setNumF,catF,setCatF,catF2,setCatF2}){
  const numFields=schema.filter(f=>f.type==="numeric"&&f.status!=="ignored");
  const catFields=schema.filter(f=>f.type==="categorical"&&f.status!=="ignored");
  useEffect(()=>{if(!numF&&numFields.length)setNumF(numFields[0].field);},[numFields.length]);
  useEffect(()=>{if(!catF&&catFields.length)setCatF(catFields[0].field);},[catFields.length]);
  const result=useMemo(()=>{
    try{
      if(testType==="chisq"){if(!catF||!catF2)return null;return{type:"chisq",res:_chiSquareStat(catF,catF2,filteredData)};}
      if(!numF||!catF)return null;
      const groups={};filteredData.forEach(r=>{const gv=String(r[catF]||"").trim(),nv=parseFloat(String(r[numF]||"").replace(/,/g,""));if(gv&&!isNaN(nv)){if(!groups[gv])groups[gv]=[];groups[gv].push(nv);}});
      const gKeys=Object.keys(groups).filter(k=>groups[k].length>=2);if(gKeys.length<2)return null;
      const eff=testType==="auto"?gKeys.length===2?"ttest":"anova":testType;
      if(eff==="mw"&&gKeys.length===2)return{type:"mw",res:_mannWhitneyU(groups[gKeys[0]],groups[gKeys[1]]),g1:gKeys[0],g2:gKeys[1],groups};
      if(eff==="ttest"&&gKeys.length===2)return{type:"ttest",res:_welchTTest(groups[gKeys[0]],groups[gKeys[1]]),g1:gKeys[0],g2:gKeys[1],groups};
      return{type:"anova",res:_oneWayANOVA(groups),groups};
    }catch{return null;}
  },[testType,numF,catF,catF2,filteredData]);
  const boxes=useMemo(()=>{if(!result||result.type==="chisq"||!result.groups)return null;const pal=[T.accent,T.blue,T.green,T.purple,T.amber,T.red];return Object.entries(result.groups).slice(0,10).map(([grp,vals],i)=>({y:vals,type:"box",name:grp.slice(0,20),marker:{color:pal[i%pal.length]},boxpoints:"outliers",jitter:.3,pointpos:-1.8}));},[result]);
  if(!catFields.length)return<StatsEmpty icon="⊗" msg="No categorical fields active"/>;
  if(!numFields.length&&testType!=="chisq")return<StatsEmpty icon="⊗" msg="No numeric fields active" sub="Select Chi-square to compare two categorical fields, or activate numeric fields for t-test / ANOVA."/>;
  return<div className="fadein">
    <StatPanelHeader icon="⊗" title="Group Tests" desc="Compare distributions across groups: Welch's t-test, one-way ANOVA, Mann-Whitney U, and Chi-square."/>
    {result&&<BottomLine text={result.type==="ttest"?_ttestBL(result.res,numF):result.type==="mw"?("Mann-Whitney U = "+fmtN(result.res.U)+", Z = "+fmt2(result.res.z)+", "+fmtP(result.res.p)+". "+(result.res.p<0.05?"Significant difference between groups in "+numF+".":"No significant difference between groups in "+numF+".")):result.type==="anova"?_anovaBL(result.res,numF):result.type==="chisq"?_chiBL(result.res,catF,catF2):""}/>}
    <Card style={{padding:"16px 20px",marginBottom:20}}>
      <div style={{display:"flex",gap:8,marginBottom:16,flexWrap:"wrap"}}>
        {[["auto","Auto-select"],["ttest","t-test"],["anova","ANOVA"],["mw","Mann-Whitney"],["chisq","Chi-square"]].map(([v,l])=>(<FieldPill key={v} label={l} active={testType===v} onClick={()=>setTestType(v)}/>))}
      </div>
      <div style={{display:"flex",gap:16,flexWrap:"wrap"}}>
        {testType!=="chisq"?<><DSSelect label="Outcome (numeric)" value={numF} onChange={setNumF} options={numFields.map(f=>({v:f.field,l:f.field}))} style={{flex:1,minWidth:150}}/><DSSelect label="Group by (categorical)" value={catF} onChange={setCatF} options={catFields.map(f=>({v:f.field,l:f.field}))} style={{flex:1,minWidth:150}}/></>:<><DSSelect label="Row variable" value={catF} onChange={setCatF} options={catFields.map(f=>({v:f.field,l:f.field}))} style={{flex:1,minWidth:150}}/><DSSelect label="Column variable" value={catF2} onChange={setCatF2} options={catFields.map(f=>({v:f.field,l:f.field}))} style={{flex:1,minWidth:150}}/></>}
      </div>
    </Card>
    {result?.type==="ttest"&&result.res&&<div className="slidein">
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16,marginBottom:16}}>
        <Card style={{padding:0,overflow:"hidden"}}>
          <div style={{padding:"11px 16px",borderBottom:"1px solid "+T.border,display:"flex",alignItems:"center",justifyContent:"space-between"}}><span style={{fontSize:13,fontWeight:700,color:T.text}}>Welch's t-test</span><SigBadge p={result.res.p}/></div>
          <div style={{padding:"4px 16px 12px"}}><StatRow label="t statistic" value={fmtN(result.res.t)}/><StatRow label="Degrees of freedom" value={fmt2(result.res.df)}/><StatRow label="p-value" value={<SigBadge p={result.res.p}/>}/><StatRow label="Cohen's d" value={fmt2(result.res.d)} sub={Math.abs(result.res.d)<0.2?"small":Math.abs(result.res.d)<0.8?"medium":"large"}/><StatRow label="Std. Error" value={fmtN(result.res.se)}/></div>
        </Card>
        <Card style={{padding:0,overflow:"hidden"}}>
          <div style={{padding:"11px 16px",borderBottom:"1px solid "+T.border}}><span style={{fontSize:13,fontWeight:700,color:T.text}}>Group Summary</span></div>
          <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}><thead><tr>{["Group","n","Mean","SD"].map(h=><th key={h} style={{padding:"7px 12px",textAlign:"left",fontSize:10,fontWeight:700,letterSpacing:".08em",textTransform:"uppercase",color:T.textFaint,background:T.bg,borderBottom:"1px solid "+T.border}}>{h}</th>)}</tr></thead>
          <tbody><tr>{[result.g1,result.res.na,fmtN(result.res.ma),fmtN(result.res.sa)].map((v,i)=><td key={i} style={{padding:"8px 12px",borderBottom:"1px solid "+T.border,fontFamily:i>0?"monospace":"inherit",fontSize:i>0?12:13,fontWeight:i===0?600:400,color:i===0?T.text:T.textMid}}>{v}</td>)}</tr><tr>{[result.g2,result.res.nb,fmtN(result.res.mb),fmtN(result.res.sb)].map((v,i)=><td key={i} style={{padding:"8px 12px",fontFamily:i>0?"monospace":"inherit",fontSize:i>0?12:13,fontWeight:i===0?600:400,color:i===0?T.text:T.textMid}}>{v}</td>)}</tr></tbody></table>
        </Card>
      </div>
      {boxes&&<Card style={{padding:"14px 16px",marginBottom:16}}><DSChart data={boxes} layout={{yaxis:{title:{text:numF,font:{size:11}}},showlegend:false,margin:{t:8,r:12,b:40,l:50}}} style={{height:270}}/></Card>}
    </div>}
    {result?.type==="mw"&&result.res&&<div className="slidein">
      <Card style={{padding:0,overflow:"hidden",marginBottom:16}}>
        <div style={{padding:"11px 16px",borderBottom:"1px solid "+T.border,display:"flex",alignItems:"center",justifyContent:"space-between"}}><span style={{fontSize:13,fontWeight:700,color:T.text}}>Mann-Whitney U</span><SigBadge p={result.res.p}/></div>
        <div style={{padding:"4px 16px 12px"}}><StatRow label="U statistic" value={fmtN(result.res.U)}/><StatRow label="Z (normal approx.)" value={fmt2(result.res.z)}/><StatRow label="p-value" value={<SigBadge p={result.res.p}/>}/><StatRow label={`n (${result.g1})`} value={result.res.na}/><StatRow label={`n (${result.g2})`} value={result.res.nb}/></div>
      </Card>
      {boxes&&<Card style={{padding:"14px 16px",marginBottom:16}}><DSChart data={boxes} layout={{yaxis:{title:{text:numF,font:{size:11}}},showlegend:false,margin:{t:8,r:12,b:40,l:50}}} style={{height:270}}/></Card>}
    </div>}
    {result?.type==="anova"&&result.res&&<div className="slidein">
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16,marginBottom:16}}>
        <Card style={{padding:0,overflow:"hidden"}}>
          <div style={{padding:"11px 16px",borderBottom:"1px solid "+T.border,display:"flex",alignItems:"center",justifyContent:"space-between"}}><span style={{fontSize:13,fontWeight:700,color:T.text}}>One-way ANOVA</span><SigBadge p={result.res.p}/></div>
          <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}><thead><tr>{["Source","SS","df","MS","F","p"].map(h=><th key={h} style={{padding:"7px 10px",textAlign:"left",fontSize:10,fontWeight:700,letterSpacing:".07em",textTransform:"uppercase",color:T.textFaint,background:T.bg,borderBottom:"1px solid "+T.border}}>{h}</th>)}</tr></thead>
          <tbody><tr>{["Between",fmtN(result.res.SSB),result.res.dfB,fmtN(result.res.MSB),fmtN(result.res.F),fmtP(result.res.p).replace("p ","")].map((v,i)=><td key={i} style={{padding:"8px 10px",borderBottom:"1px solid "+T.border,fontFamily:"monospace",fontSize:12,color:i===0?T.text:T.textMid,fontWeight:i===0?600:400}}>{v}</td>)}</tr><tr>{["Within",fmtN(result.res.SSW),result.res.dfW,fmtN(result.res.MSW),"—","—"].map((v,i)=><td key={i} style={{padding:"8px 10px",fontFamily:"monospace",fontSize:12,color:T.textMid}}>{v}</td>)}</tr></tbody></table>
          <div style={{padding:"8px 14px",borderTop:"1px solid "+T.border}}><StatRow label="η² (effect size)" value={fmt4(result.res.eta2)} sub={result.res.eta2<0.01?"negligible":result.res.eta2<0.06?"small":result.res.eta2<0.14?"medium":"large"}/></div>
        </Card>
        <Card style={{padding:0,overflow:"hidden"}}>
          <div style={{padding:"11px 16px",borderBottom:"1px solid "+T.border}}><span style={{fontSize:13,fontWeight:700,color:T.text}}>Group Means</span></div>
          <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}><thead><tr>{["Group","n","Mean","SD"].map(h=><th key={h} style={{padding:"7px 12px",textAlign:"left",fontSize:10,fontWeight:700,letterSpacing:".07em",textTransform:"uppercase",color:T.textFaint,background:T.bg,borderBottom:"1px solid "+T.border}}>{h}</th>)}</tr></thead>
          <tbody>{Object.entries(result.res.groupStats).map(([k,g],ri)=>(<tr key={k}>{[k,g.n,fmtN(g.mean),fmtN(g.sd)].map((v,ci)=><td key={ci} style={{padding:"8px 12px",borderBottom:"1px solid "+T.border,fontFamily:ci>0?"monospace":"inherit",fontSize:ci>0?12:13,fontWeight:ci===0?600:400,color:ci===0?T.text:T.textMid}}>{v}</td>)}</tr>))}</tbody>
        </table></Card>
      </div>
      {result.res.pairwise.length>0&&<Card style={{padding:0,overflow:"hidden",marginBottom:16}}>
        <div style={{padding:"11px 16px",borderBottom:"1px solid "+T.border}}><span style={{fontSize:13,fontWeight:700,color:T.text}}>Post-hoc Pairwise (Bonferroni-corrected)</span></div>
        <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}><thead><tr>{["Group A","Group B","Mean A","Mean B","t","p (adj.)",""].map(h=><th key={h} style={{padding:"7px 10px",textAlign:"left",fontSize:10,fontWeight:700,letterSpacing:".07em",textTransform:"uppercase",color:T.textFaint,background:T.bg,borderBottom:"1px solid "+T.border}}>{h}</th>)}</tr></thead>
        <tbody>{result.res.pairwise.map((pw,i)=>(<tr key={i} style={{background:pw.pAdj<0.05?T.greenBg:"transparent"}}>{[pw.a,pw.b,fmtN(pw.ma),fmtN(pw.mb),fmt2(pw.t),fmtP(pw.pAdj).replace("p ","")].map((v,ci)=><td key={ci} style={{padding:"8px 10px",borderBottom:"1px solid "+T.border,fontFamily:ci>1?"monospace":"inherit",fontSize:ci>1?12:13,fontWeight:ci<2?600:400,color:ci<2?T.text:T.textMid}}>{v}</td>).concat([<td key="sig" style={{padding:"8px 10px",borderBottom:"1px solid "+T.border}}><SigBadge p={pw.pAdj}/></td>])}</tr>))}</tbody>
        </table>
      </Card>}
      {boxes&&<Card style={{padding:"14px 16px",marginBottom:16}}><DSChart data={boxes} layout={{yaxis:{title:{text:numF,font:{size:11}}},showlegend:false,margin:{t:8,r:12,b:40,l:50}}} style={{height:280}}/></Card>}
    </div>}
    {result?.type==="chisq"&&result.res&&<div className="slidein">

// Two-proportion z-test (module-level, shared by CompareTab and BreakdownDist)
// k=matches in group, n=total in group, K=total matches globally, N=total globally
// Returns {dir:"over"|"under"|"ns", z, p1, p2} or null (insufficient data)
function sigTest(k,n,K,N){
  const rn=N-n; const rk=K-k;
  if(n<30||rn<30||K<5)return null;
  const p_pool=K/N;
  const se=Math.sqrt(p_pool*(1-p_pool)*(1/n+1/rn));
  if(se===0)return null;
  const p1=k/n; const p2=rk/rn;
  const z=Math.abs((p1-p2)/se);
  if(z<=1.96)return{dir:"ns",z,p1,p2};
  return{dir:p1>p2?"over":"under",z,p1,p2};
}
// Build a natural-language tooltip for a sig result
// label = the row label (theme name or group value), context = what it's being compared within
function sigTooltip(sig,groupName,themeName){
  // sig.p1 = mention rate for THIS group (= labelPct shown on screen / 100)
  // sig.p2 = mention rate for ALL OTHER groups combined
  // These are the same percentages shown as the primary metric — tooltip is consistent
  if(!sig||sig.dir==="ns")return"";
  const thisPct=Math.round(sig.p1*100);
  const restPct=Math.round(sig.p2*100);
  const z=sig.z.toFixed(1);
  if(sig.dir==="over"){
    return thisPct+"% of "+groupName+" mention "+themeName+", vs "+restPct+"% in all other groups — significantly over-represented (z="+z+", p<0.05)";
  } else {
    return thisPct+"% of "+groupName+" mention "+themeName+", vs "+restPct+"% in all other groups — significantly under-represented (z="+z+", p<0.05)";
  }
}
